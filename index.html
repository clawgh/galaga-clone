let player={x:cx,y:560,w:26,h:22,lives:3,invuln:0,cooldown:0,active:true,thrust:0,trail:[],drones:[],boostEnergy:100,teslaTimer:0,vx:0,weaponLevel:1,weaponXP:0,isCharging:false,chargeTime:0,mines:0,_spaceReleased:false,orbitProjs:[],overheat:0,overheatLock:0,secondaryPowerup:null,secondaryPowerupTimer:0,autoFire:false,phaseActive:false,phaseTimer:0,comboGlow:0};
let nextLifeScore=10000;

function resetPlayer(){
  player.x=cx;player.y=560;player.lives=3;player.invuln=0;player.cooldown=0;player.active=true;
  player.thrust=0;player.trail=[];player.drones=[];player.boostEnergy=100;
  player.teslaTimer=0;player.vx=0;player.weaponLevel=1;player.weaponXP=0;
  player.isCharging=false;player.chargeTime=0;player.mines=0;
  player.overheat=0;player.overheatLock=0;player.secondaryPowerup=null;player.secondaryPowerupTimer=0;
  powerup=null;powerupTimer=0;hasShield=false;shieldIsReflect=false;freezeTimer=0;
  teslaBolts=[];mines=[];nextLifeScore=10000;player.orbitProjs=[];
  beamActive=false;beamTargetY=0;blackHoles=[];player.secondaryPowerup=null;player.secondaryPowerupTimer=0;
  player.autoFire=false;player.phaseActive=false;player.phaseTimer=0;player.comboGlow=0;
}

function updatePlayer(dt){
  if(!player.active)return;

  // Auto-fire toggle
  if(K.KeyF){K.KeyF=0;player.autoFire=!player.autoFire;addPopup(cx,100,player.autoFire?'AUTO-FIRE ON':'AUTO-FIRE OFF','#0ff',10)}

  // Phase powerup timer
  if(player.phaseActive&&player.phaseTimer>0){player.phaseTimer-=dt;if(player.phaseTimer<=0){player.phaseActive=false;addPopup(player.x,player.y-40,'PHASE ENDED','#4ff',9)}}

  const boosting=K.ShiftLeft||K.ShiftRight;
  const overdriveActive=powerup==='overdrive'&&powerupTimer>0;
  const boostSpeed=boosting&&player.boostEnergy>0?2.5:1;
  const fireRateMult=overdriveActive?0.5:1;

  if(boosting&&player.boostEnergy>0){
    player.boostEnergy=Math.max(0,player.boostEnergy-dt*0.02);
    if(player.boostEnergy<=0&&Math.random()<0.1)playHit();
  }else{player.boostEnergy=Math.min(100,player.boostEnergy+dt*0.008)}

  const accel=0.35*boostSpeed,drag=0.88;
  if(K.ArrowLeft)player.vx-=accel;
  if(K.ArrowRight)player.vx+=accel;
  player.vx*=drag;player.vx=clamp(player.vx,-5*boostSpeed,5*boostSpeed);
  player.x+=player.vx;player.x=clamp(player.x,16,W-16);
  if(player.invuln>0)player.invuln-=dt;
  if(player.cooldown>0)player.cooldown-=dt;

  const wantFire=K.Space||player.autoFire;
  if(!powerup||powerup==='vampire'){
    if(wantFire&&!player.isCharging&&player.cooldown<=0&&player.chargeTime<=0){player.isCharging=true;player.chargeTime=0}
    if(K.Space&&player.isCharging){
    if(K.Space&&player.isCharging){
      player.chargeTime=Math.min(player.chargeTime+dt,2000);
      if(player.chargeTime>200&&Math.floor(player.chargeTime/400)!==Math.floor((player.chargeTime-dt)/400))playCharge();
    }
    if(player._spaceReleased&&player.isCharging){
      player._spaceReleased=false;
      if(player.chargeTime>150){
        const cl=Math.min(Math.floor((player.chargeTime-150)/400)+1,4);
        const spd=9+cl*2;
        const clColors=['#ff0','#fa0','#f60','#f00'];
        fireBullet(player.x,player.y-16,0,-spd,false,clColors[cl-1],{charged:true,chargeLevel:cl,damage:cl*2,pierce:true});
        player.cooldown=200+cl*50;
        playSound(300+cl*100,0.12,'sine',0.06+cl*0.02);
        shake(cl);flash(0.1+cl*0.05,'#ff0');
        spawnRing(player.x,player.y-16,clColors[cl-1],8,10+cl*5);
      }
      player.isCharging=false;player.chargeTime=0;
    }
    if(!player.isCharging&&player.chargeTime>0){player.chargeTime=0}
    if(!K.Space&&!player.isCharging)player._spaceReleased=false;
  }

  const exhaustRate=boosting&&player.boostEnergy>0?0.9:0.6;
  if(Math.random()<exhaustRate){
    particles.push({x:player.x+rand(-4,4),y:player.y+12,vx:rand(-0.5,0.5),vy:rand(0.8,2.5)*boostSpeed,
      life:rand(8,22),maxLife:22,color:boosting&&player.boostEnergy>0?'#fff':'#f80',
      size:rand(1,boosting&&player.boostEnergy>0?4:2),decay:0.96,spark:boosting,ring:false,glow:false});
  }
  if(boosting&&player.boostEnergy>0){
    for(let i=0;i<3;i++)particles.push({x:player.x+rand(-8,8),y:player.y+rand(8,14),
      vx:rand(-0.8,0.8),vy:rand(1,3),life:rand(5,12),maxLife:12,color:'#f60',
      size:rand(1,3),decay:0.95,spark:false,ring:false,glow:true});
  }

  player.trail.push({x:player.x+rand(-2,2),y:player.y+12});
  if(player.trail.length>8)player.trail.shift();

  if(player.overheatLock>0)player.overheatLock-=dt;
  const heatDecay=boosting?0.2:0.08;
  if(!K.Space&&!K.ArrowUp&&!player.isCharging)player.overheat=Math.max(0,player.overheat-heatDecay);
  if(player.overheatLock>0&&player.overheat>0)player.overheat=Math.max(0,player.overheat-0.05);
  const baseCd=powerup==='rapid'?120:powerup==='laser'?100:powerup==='homing'?200:powerup==='pierce'?200:powerup==='tesla'?150:powerup==='magnet'?130:powerup==='overdrive'?80:250;
  const cd=Math.max(60,baseCd*fireRateMult);
  if((K.Space||K.ArrowUp)&&player.cooldown<=0&&!player.isCharging&&player.overheatLock<=0){
    playerFire(player.x,player.y-16);player.cooldown=cd;
    if(!powerup||powerup!=='overdrive'){const heatAmt=(powerup==='rapid'?6:4);player.overheat=Math.min(100,player.overheat+heatAmt);}
    if(player.overheat>=100){player.overheatLock=800;playOverheat();addPopup(player.x,player.y-30,'OVERHEAT!','#f44',12)}
  }
  player.thrust+=dt*0.005;
  updateDrones(dt);

  if(overdriveActive&&Math.random()<0.01){
    player.weaponXP+=1;
    while(player.weaponLevel<5&&player.weaponXP>=WEAPON_XP[player.weaponLevel]){
      player.weaponLevel++;weaponUpgradeDisplay=2000;
      addPopup(cx,300,'WEAPON '+WEAPON_NAMES[player.weaponLevel-1]+'!','#ff0',16);
      playUpgrade();
    }
  }

  if(powerup==='tesla'&&powerupTimer>0){
    player.teslaTimer+=dt;
    if(player.teslaTimer>2000){player.teslaTimer=0;triggerTesla()}
  }

  if(powerup==='gravity'&&powerupTimer>0){
    for(let i=eBullets.length-1;i>=0;i--){
      const b=eBullets[i],d=dist(player.x,player.y,b.x,b.y);
      if(d<80&&d>5){const pull=0.08*(80-d)/80;b.vx+=(player.x-b.x)/d*pull;b.vy+=(player.y-b.y)/d*pull}
      if(d<12){eBullets.splice(i,1);spawnParticles(b.x,b.y,3,'#0f8',1,12,2)}
    }
  }

  if(K.KeyC&&player.active&&player.mines>0){K.KeyC=0;dropMine()}
  if(K.KeyQ&&player.active){
    K.KeyQ=0;
    if(player.secondaryPowerup==='blackhole'&&player.secondaryPowerupTimer>0&&blackHoles.length<2){
      spawnBlackHole(player.x,player.y-20);player.secondaryPowerupTimer=0;player.secondaryPowerup=null;
    }else if(powerup==='blackhole'&&powerupTimer>0&&blackHoles.length<2){
      spawnBlackHole(player.x,player.y-20);powerup=null;powerupTimer=0;
    }else if(player.secondaryPowerup==='reflect'&&player.secondaryPowerupTimer>0){
      hasShield=true;shieldIsReflect=true;spawnRing(player.x,player.y,'#0ff',20,50);
      player.secondaryPowerupTimer=0;player.secondaryPowerup=null;playReflect();
      addPopup(player.x,player.y-30,'REFLECT SHIELD!','#0ff');
    }else if(powerup==='reflect'&&powerupTimer>0){
      hasShield=true;shieldIsReflect=true;spawnRing(player.x,player.y,'#0ff',20,50);
      powerup=null;powerupTimer=0;playReflect();
      addPopup(player.x,player.y-30,'REFLECT SHIELD!','#0ff');
    }
  }
  if(K.KeyV&&player.secondaryPowerup&&(powerup||player.secondaryPowerup)){
    K.KeyV=0;
    const tmp=powerup,tmpT=powerupTimer;
    powerup=player.secondaryPowerup;powerupTimer=player.secondaryPowerupTimer;
    player.secondaryPowerup=tmp;player.secondaryPowerupTimer=tmpT;
    player.drones=[];
    if(powerup==='drone'){player.drones=[{angle:0,shootTimer:0},{angle:Math.PI,shootTimer:500}]}
    if(powerup==='tesla')player.teslaTimer=0;
    if(powerup==='freeze')freezeTimer=5000;
    addPopup(player.x,player.y-30,'SWAP: '+((powerup||'NONE').toUpperCase()),POWERUP_COLORS[powerup]||'#fff',10);
    playSound(800,0.08,'sine',0.05);
  }

  if(K.KeyX&&hasShield){
    K.KeyX=0;
    for(const e of enemies){
      if(!e.alive)continue;
      const d=dist(player.x,player.y,e.x,e.y);
      if(d<120){
        if(e.boss){e.bossHP-=5;spawnParticles(e.x,e.y,10,'#f44',4,20);playBossHit();if(e.bossHP<=0){e.alive=false;score+=e.pts;spawnExplosion(e.x,e.y,'#f44',40);shake(12);addPopup(e.x,e.y,'+'+e.pts,'#ff0');addPopup(e.x,e.y-20,'BOSS DEFEATED!','#f44')}}
        else{e.alive=false;score+=e.pts;spawnExplosion(e.x,e.y,e.color,20);shake(3)}
      }
    }
    eBullets=[];
    for(const a of asteroids){if(dist(player.x,player.y,a.x,a.y)<120){a.alive=false;spawnParticles(a.x,a.y,10,'#ba9',4,20);score+=Math.floor(a.pts/2)}}
    spawnRing(player.x,player.y,'#08f',30,120);spawnRing(player.x,player.y,'#fff',20,80);
    shake(6);hasShield=false;shieldIsReflect=false;playBomb();triggerHitStop(80);
    addPopup(player.x,player.y-20,'FORCE BURST!','#08f');
  }
}

function drawPlayer(){
  if(!player.active)return;
  if(player.invuln>0&&Math.floor(Date.now()/80)%2)return;
  const boosting=K.ShiftLeft||K.ShiftRight;
  const overdriveActive=powerup==='overdrive'&&powerupTimer>0;

  for(let i=0;i<player.trail.length;i++){
    const t=player.trail[i],alpha=(i/player.trail.length)*0.3;
    ctx.globalAlpha=alpha;ctx.fillStyle='#f80';
    ctx.beginPath();ctx.moveTo(t.x-(i/player.trail.length)*5,t.y);
    ctx.lineTo(t.x,t.y+(i/player.trail.length)*10);ctx.lineTo(t.x+(i/player.trail.length)*5,t.y);
    ctx.closePath();ctx.fill();
  }
  ctx.globalAlpha=1;

  ctx.save();ctx.translate(player.x,player.y);
  ctx.shadowBlur=overdriveActive?40:boosting?30:20;
  ctx.shadowColor=overdriveActive?'#f90':boosting?'#f80':'#0cf';

  const grad=ctx.createLinearGradient(0,-15,0,15);
  grad.addColorStop(0,overdriveActive?'#f90':'#0cf');
  grad.addColorStop(0.5,overdriveActive?'#f60':'#08e');
  grad.addColorStop(1,overdriveActive?'#a30':'#046');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.moveTo(0,-15);ctx.lineTo(-16,12);ctx.lineTo(-8,9);
  ctx.lineTo(-4,15);ctx.lineTo(0,12);ctx.lineTo(4,15);
  ctx.lineTo(8,9);ctx.lineTo(16,12);ctx.closePath();ctx.fill();

  ctx.strokeStyle=overdriveActive?'#fff':'#aff';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,-15);ctx.lineTo(-16,12);ctx.lineTo(-8,9);
  ctx.lineTo(-4,15);ctx.lineTo(0,12);ctx.lineTo(4,15);
  ctx.lineTo(8,9);ctx.lineTo(16,12);ctx.closePath();ctx.stroke();

  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath();ctx.arc(-4,-2,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(4,-2,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.beginPath();ctx.arc(0,-5,2,0,Math.PI*2);ctx.fill();

  if(boosting&&player.boostEnergy>0){
    ctx.shadowBlur=25;ctx.shadowColor='#f80';
    ctx.strokeStyle='rgba(255,136,0,0.3)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(-18,12);ctx.lineTo(-18,16);ctx.lineTo(18,16);ctx.lineTo(18,12);ctx.stroke();
  }

  if(overdriveActive){
    ctx.shadowBlur=30;ctx.shadowColor='#f90';
    ctx.strokeStyle='rgba(255,153,0,'+(0.3+0.3*Math.sin(Date.now()*0.008))+')';ctx.lineWidth=2;
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a=i*Math.PI/3+Date.now()*0.003,r=20+Math.sin(Date.now()*0.006+i)*3;
      i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath();ctx.stroke();
  }

  if(player.isCharging&&player.chargeTime>50){
    const cl=Math.min(Math.floor((player.chargeTime-50)/400)+1,4);
    const clColors=['#ff0','#fa0','#f60','#f00'];
    const pulse=0.5+0.5*Math.sin(Date.now()*0.01);
    const r=16+cl*4+pulse*4;
    ctx.shadowBlur=20;ctx.shadowColor=clColors[cl-1];
    ctx.strokeStyle=clColors[cl-1];ctx.lineWidth=2;
    ctx.globalAlpha=0.4+0.3*pulse;
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='#fff';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(0,0,r*0.7,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }

  const tf=boosting?0.8+0.4*Math.sin(player.thrust*6):0.5+0.5*Math.sin(player.thrust*3);
  const flameLen=boosting?12+20*tf:20*tf;
  const grad2=ctx.createLinearGradient(0,12,0,12+flameLen);
  grad2.addColorStop(0,boosting?'rgba(255,255,255,0.9)':'rgba(255,200,100,0.8)');
  grad2.addColorStop(0.5,boosting?'rgba(255,200,0,0.6)':'rgba(255,100,0,0.4)');
  grad2.addColorStop(1,'rgba(255,50,0,0)');
  ctx.shadowBlur=boosting?20:0;ctx.shadowColor='#f80';
  ctx.fillStyle=grad2;
  ctx.beginPath();ctx.moveTo(-6,12);ctx.lineTo(0,12+flameLen);ctx.lineTo(6,12);
  ctx.closePath();ctx.fill();ctx.shadowBlur=0;

  if(hasShield){
    ctx.strokeStyle='rgba(0,136,255,0.5)';ctx.lineWidth=2;
    ctx.shadowBlur=15;ctx.shadowColor='#08f';
    ctx.beginPath();ctx.arc(0,0,22,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(0,136,255,0.2)';
    ctx.beginPath();ctx.arc(0,0,24,0,Math.PI*2);ctx.stroke();
  }

  if(powerup==='gravity'&&powerupTimer>0){
    const pulse=0.5+0.5*Math.sin(Date.now()*0.005);
    ctx.strokeStyle='rgba(0,255,136,'+(0.15*pulse)+')';ctx.lineWidth=1.5;
    ctx.shadowBlur=10;ctx.shadowColor='#0f8';
    ctx.beginPath();ctx.arc(0,0,60+Math.sin(Date.now()*0.003)*8,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(0,255,136,'+(0.08*pulse)+')';
    ctx.beginPath();ctx.arc(0,0,40+Math.sin(Date.now()*0.004)*5,0,Math.PI*2);ctx.stroke();
  }

  if(powerup==='tesla'&&powerupTimer>0){
    const pulse=0.3+0.3*Math.sin(Date.now()*0.006);
    ctx.strokeStyle='rgba(255,238,0,'+pulse+')';ctx.lineWidth=1;
    ctx.shadowBlur=8;ctx.shadowColor='#fe0';
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a=i/6*Math.PI*2+Date.now()*0.002;
      const rx=Math.cos(a)*(28+Math.sin(Date.now()*0.005+i)*4);
      const ry=Math.sin(a)*(28+Math.sin(Date.now()*0.005+i)*4);
      i===0?ctx.moveTo(rx,ry):ctx.lineTo(rx,ry);
    }
    ctx.closePath();ctx.stroke();
  }

  ctx.shadowBlur=0;ctx.restore();
  drawDrones();
}

let upgradeOptions=[];
function generateUpgrades(){
  const pool=['rapid','spread','double','laser','shield','homing','drone','pierce','gravity','tesla','freeze','blackhole','reflect'];
  const shuffled=[...pool].sort(()=>Math.random()-0.5);
  upgradeOptions=shuffled.slice(0,3);
}

function drawUpgradeScreen(){
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);
  ctx.shadowBlur=20;ctx.shadowColor='#ff0';
  ctx.fillStyle='#ff0';ctx.font='bold 28px monospace';ctx.textAlign='center';

  ctx.shadowBlur=0;ctx.fillStyle='#aaa';ctx.font='13px monospace';

    laser:'HIGH SPEED LASER',shield:'ABSORB HITS',homing:'TRACKING SHOT',
    drone:'ORBITING DRONES',pierce:'PIERCING SHOT',gravity:'GRAVITY WELL',
    tesla:'CHAIN LIGHTNING',freeze:'SLOW TIME',mine:'PROXIMITY MINES',
    vampire:'LIFE STEAL',magnet:'ATTRACT ITEMS',overdrive:'FAST FIRE+XP',blackhole:'GRAVITY SINGULARITY',reflect:'BULLET DEFLECT',barrage:'WALL OF FIRE',phase:'INTANGIBLE FORM'};
  for(let i=0;i<3;i++){
    const t=upgradeOptions[i];const x=cx+(i-1)*140;const y=260;
    const col=POWERUP_COLORS[t]||'#fff';
    ctx.shadowBlur=20;ctx.shadowColor=col;
    ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(x-50,y-30,100,60);
    ctx.strokeRect(x-50,y-30,100,60);
    ctx.fillStyle='#fff';ctx.font='bold 13px monospace';ctx.textAlign='center';
    ctx.fillText(labels[i],x,y-8);
    ctx.fillStyle=col;ctx.font='bold 14px monospace';
    ctx.fillText(t.toUpperCase(),x,y+12);
    ctx.fillStyle='#888';ctx.font='9px monospace';
    ctx.fillText(descriptions[t]||'',x,y+28);

  }
  ctx.fillStyle='#666';ctx.font='10px monospace';

  else{ctx.fillStyle='#888';ctx.font='13px monospace';ctx.fillText('NONE',cx,388)}
}

let state='title',score=0,hi=parseInt(localStorage.getItem('galagaHi'))||0,wave=1;
let timeScale=1;
let goTimer=0,combo=0,comboTimer=0,lastKillTime=0;
let waveTransitionTimer=0,transitionProgress=0;
let bossEntranceFlash=0;
let weaponUpgradeDisplay=0;
let riskDisplay=0;
let nebulaTime=0,waveStartTime=0,speedBonus=0;

function startGame(){
  state='playing';score=0;wave=1;combo=0;comboTimer=0;
  resetPlayer();
  enemies=createEnemies(wave,false);
  pBullets=[];eBullets=[];particles=[];powerups=[];asteroids=[];mines=[];
  laserBeams=[];teslaBolts=[];shockwaves=[];
  formAngle=0;diveTimer=rand(1,3)*1000;
  formationPattern=0;formationPatternTimer=0;
  asteroidTimer=3000;transitionProgress=0;
  sideSpawnTimer=4000;swarmTimer=10000;bossEntranceFlash=0;
  freezeTimer=0;waveStartTime=Date.now();speedBonus=0;initPlanets();
}

function nextWave(){
  wave++;
  const isBoss=wave%3===0;
  if(isBoss){playBossWarn();addPopup(cx,200,'BOSS INCOMING!','#f44');bossEntranceFlash=20}
  enemies=createEnemies(wave,isBoss);
  pBullets=[];eBullets=[];formAngle=0;
  laserBeams=[];teslaBolts=[];
  diveTimer=isBoss?10000:rand(1,2)*1000;
  formationPattern=0;formationPatternTimer=0;
  sideSpawnTimer=4000;swarmTimer=10000;
  mines=[];shockwaves=[];
  state='playing';transitionProgress=0;waveStartTime=Date.now();speedBonus=0;
}

function update(dt,raw){
  raw=raw||dt;
  // Hit stop (unscaled)
  if(hitStopTimer>0){hitStopTimer=Math.max(0,hitStopTimer-raw);draw();requestAnimationFrame(loop);return}

  updateStars();updateShake(dt);updateFlash(dt);updatePopups();
  updateLaserBeams(dt);
  if(bossEntranceFlash>0)bossEntranceFlash-=dt*0.02;

  if(state==='title'){
    if(K.Space){K.Space=0;initAudio();startGame()}
    return;
  }
  if(state==='gameOver'){
    goTimer+=dt;
    if(goTimer>1000&&K.Space){K.Space=0;state='title';initStars()}
    return;
  }
  if(state==='upgrade'){
    if(K.Digit1||K.Numpad1){K.Digit1=0;K.Numpad1=0;applyUpgrade(0)}
    if(K.Digit2||K.Numpad2){K.Digit2=0;K.Numpad2=0;applyUpgrade(1)}
    if(K.Digit3||K.Numpad3){K.Digit3=0;K.Numpad3=0;applyUpgrade(2)}
    updateParticles();updatePowerups(dt);updateMines(dt);updateShockwaves(dt);
    if(player.secondaryPowerupTimer>0){player.secondaryPowerupTimer-=dt;if(player.secondaryPowerupTimer<=0){player.secondaryPowerup=null;player.secondaryPowerupTimer=0}}
    return;
  }
  if(state==='waveClear'){
    transitionProgress=Math.min(1,transitionProgress+dt*0.002);
    updateParticles();updatePowerups(dt);
    updateAsteroids(dt);updateMines(dt);updateShockwaves(dt);
    if(player.secondaryPowerupTimer>0){player.secondaryPowerupTimer-=dt;if(player.secondaryPowerupTimer<=0){player.secondaryPowerup=null;player.secondaryPowerupTimer=0}}
    waveTransitionTimer+=dt;
    if(waveTransitionTimer>1500){
      transitionProgress=0;generateUpgrades();state='upgrade';
      waveTransitionTimer=0;playUpgrade();
    }
    return;
  }

  updatePlayer(dt);
  updateBullets(dt);
  updateEnemies(dt,player.x,wave);
  updateParticles();
  updatePowerups(dt);
  updateAsteroids(dt);
  updateMines(dt);
  updateShockwaves(dt);
  updateBlackHoles(dt);
  if(weaponUpgradeDisplay>0)weaponUpgradeDisplay-=dt;

  // Risk display update
  if(state==='playing'){const rb=getRiskBonus();if(rb>1)riskDisplay=rb;else if(riskDisplay>0)riskDisplay=Math.max(1,riskDisplay-0.02)}

  while(score>=nextLifeScore){
    player.lives=Math.min(player.lives+1,5);
    nextLifeScore+=20000;
    addPopup(cx,300,'EXTRA LIFE!','#0cf');playPowerup();
  }

  for(let i=pBullets.length-1;i>=0;i--){
    const b=pBullets[i];let hit=false;
    for(const e of enemies){
      if(!e.alive)continue;
      const hitR=e.boss?28:e.type===4?10:e.type===5?10:e.type===6?14:e.type===7?8:e.type===8?12:e.type===11?14:e.type===12?10:e.type===13?12:e.type===14?10:14;
      if(Math.abs(b.x-e.x)<hitR&&Math.abs(b.y-e.y)<hitR){
        hit=true;
        if(e.boss){
          const bDmg=b.charged?b.damage||3:1;
          e.bossHP=Math.max(0,e.bossHP-bDmg);
          playBossHit();spawnParticles(b.x,b.y,5,b.charged?'#ff0':'#f44',3,15);
          if(e.bossHP<=0){
            e.alive=false;const pts=e.pts;score+=pts;
            spawnExplosion(e.x,e.y,'#f44',40);shake(12);playExplosion();
            flash(0.5,'#f44');addPopup(e.x,e.y,'+'+pts,'#ff0');
            addPopup(e.x,e.y-20,'BOSS DEFEATED!','#f44');
            powerups.push({x:e.x,y:e.y,type:'bomb',vy:0,life:200,size:12,pulse:0});
          }
        }else if(e.type===6){
          const sd=b.charged?b.damage||3:1;
          e.hp=(e.hp||3)-sd;spawnParticles(b.x,b.y,5,'#f8f',3,15);
          if(e.hp<=0){
            e.alive=false;const pts=e.pts;score+=pts;
            spawnExplosion(e.x,e.y,e.color||'#f8f',15);shake(4);playSplit();
            addPopup(e.x,e.y,'+'+pts,'#f8f');
            for(let s=0;s<2;s++)enemies.push({
              x:e.x+rand(-10,10),y:e.y+rand(-5,5),fx:0,fy:0,type:5,col:0,row:0,
              state:'dive',alive:true,diveP:e.diveP||0.3,
              startX:e.x+rand(-10,10),startY:e.y+rand(-5,5),
              targetX:player.x+rand(-80,80),targetY:H+40,
              amp:rand(20,40),diveSpd:0.0009,retP:0,retSpd:0,
              shootT:99999,pts:100,color:'#f4f',
              divePattern:randInt(0,2),wingPhase:0,formationOffset:{x:0,y:0}
            });
            spawnPowerup(e.x,e.y);
          }
          if(!b.pierce)break;continue;
        }else if(e.type===7){
          e.alive=false;spawnParticles(e.x,e.y,8,'#0f8',3,15,2);score+=e.pts;
          addPopup(e.x,e.y,'+'+e.pts,'#0f8');if(!b.pierce)break;continue;
        }else if(e.type===9){
          const nd=b.charged?b.damage||3:1;
          e.hp=(e.hp||5)-nd;spawnParticles(b.x,b.y,5,'#0ff',3,15);
          if(e.hp<=0){e.alive=false;score+=e.pts;spawnExplosion(e.x,e.y,'#0ff',20);shake(4);addPopup(e.x,e.y,'+'+e.pts,'#0ff');spawnPowerup(e.x,e.y)}
          if(!b.pierce)break;continue;
        }else if(e.type===10){
          const visible=Math.sin(Date.now()*0.003)>0||freezeTimer>0;
          if(!visible){if(!b.pierce)break;continue;}
          e.hp=(e.hp||3)-(b.charged?b.damage||3:1);spawnParticles(b.x,b.y,5,'#f4f',3,15);
          if(e.hp<=0){e.alive=false;score+=e.pts;spawnExplosion(e.x,e.y,'#f4f',20);shake(3);addPopup(e.x,e.y,'+'+e.pts,'#f4f');spawnPowerup(e.x,e.y)}
          if(!b.pierce)break;continue;
        }else if(e.type===11){
          const bd=b.charged?b.damage||3:1;
          e.hp=(e.hp||4)-bd;spawnParticles(b.x,b.y,5,'#f80',3,15);
          if(e.hp<=0){e.alive=false;score+=e.pts;spawnExplosion(e.x,e.y,'#f80',15);shake(3);addPopup(e.x,e.y,'+'+e.pts,'#f80');spawnPowerup(e.x,e.y)}
          if(!b.pierce)break;continue;
        }else if(e.type===12){
          e.alive=false;spawnParticles(e.x,e.y,8,'#f44',3,15);score+=Math.floor(e.pts*(getRiskBonus()));
          addPopup(e.x,e.y,'+'+Math.floor(e.pts*(getRiskBonus())),'#f44');if(!b.pierce)break;continue;
        }else if(e.type===13){
          const kd=b.charged?b.damage||3:1;
          e.hp=(e.hp||2)-kd;spawnParticles(b.x,b.y,5,'#f44',3,15);
          if(e.hp<=0){e.alive=false;score+=e.pts;spawnExplosion(e.x,e.y,'#f44',20);shake(4);addPopup(e.x,e.y,'+'+e.pts,'#f44');spawnPowerup(e.x,e.y)}
          if(!b.pierce)break;continue;
        }else if(e.type===14){
          const phaseVisible=Math.sin(Date.now()*0.004)>-0.2||freezeTimer>0;
          if(!phaseVisible){if(!b.pierce)break;continue;}
          const pd=b.charged?b.damage||3:1;
          e.hp=(e.hp||2)-pd;spawnParticles(b.x,b.y,5,'#8cf',3,15);
          if(e.hp<=0){e.alive=false;score+=e.pts;spawnExplosion(e.x,e.y,'#8cf',15);shake(3);addPopup(e.x,e.y,'+'+e.pts,'#8cf');spawnPowerup(e.x,e.y)}
          if(!b.pierce)break;continue;
        }else if(e.type===8){
          const bd=b.charged?b.damage||3:1;
          e.hp=(e.hp||3)-bd;spawnParticles(b.x,b.y,5,'#f4f',3,15);
          if(e.hp<=0){e.alive=false;score+=e.pts;spawnExplosion(e.x,e.y,'#f4f',15);shake(3);addPopup(e.x,e.y,'+'+e.pts,'#f4f');spawnPowerup(e.x,e.y)}
          if(!b.pierce)break;continue;
        }else{
          e.alive=false;
          const now=Date.now();
          if(now-lastKillTime<2000){combo++}else{combo=0}
          lastKillTime=now;
          const mult=1+combo*0.5;
          const rb=getRiskBonus();
          const totalPts=Math.floor(e.pts*mult*rb);
          score+=totalPts;
          if(combo>=2)addPopup(e.x,e.y-10,combo+'x COMBO!','#ff0');
          addPopup(e.x,e.y,'+'+totalPts,'#fff');
          spawnExplosion(e.x,e.y,e.color,20);
          shake(3);playExplosion();spawnPowerup(e.x,e.y);
          if(!b.charged){
            player.weaponXP+=Math.floor(e.pts*0.2)+1;
            while(player.weaponLevel<5&&player.weaponXP>=WEAPON_XP[player.weaponLevel]){
              player.weaponLevel++;weaponUpgradeDisplay=2000;
              addPopup(cx,300,'WEAPON '+WEAPON_NAMES[player.weaponLevel-1]+'!','#ff0',16);
              playUpgrade();
            }
          }
          if(powerup==='vampire'&&!hasShield){hasShield=true;addPopup(e.x,e.y-20,'LIFE STEAL!','#f4a')}
        }
        if(!b.pierce)break;
      }
    }
    if(hit&&!b.pierce)pBullets.splice(i,1);
  }

  // Near-miss detection
  if(player.active&&player.invuln<=0&&!nearMissActive){
    for(let i=eBullets.length-1;i>=0;i--){
      const b=eBullets[i];
      const d=Math.abs(b.x-player.x)+Math.abs(b.y-player.y);
      if(d<22&&d>10&&b.y<player.y+10&&b.y>player.y-10){
        nearMissStreak++;
        const bonus=Math.floor(50*nearMissStreak*getRiskBonus());
        score+=bonus;
        addPopup(b.x,b.y,'NEAR MISS x'+nearMissStreak+'!','#4ff',10);
        triggerNearMiss(250);
        spawnRing(b.x,b.y,'#4ff',6,15);
        spawnShockwave(player.x,player.y,'#4ff',30,2);
        playPowerup();
        break;
      }
    }
  }
  if(nearMissActive){
    nearMissTimer--;
    if(nearMissTimer<=0){nearMissActive=false;nearMissStreak=0}
  }

  if(player.active&&player.invuln<=0){
    for(let i=eBullets.length-1;i>=0;i--){
      const b=eBullets[i];
      if(Math.abs(b.x-player.x)<12&&Math.abs(b.y-player.y)<14){
        if(hasShield){
          if(shieldIsReflect){
            fireBullet(b.x,b.y,-b.vx*1.5,-b.vy*1.5,false,'#0ff');
            spawnParticles(b.x,b.y,5,'#0ff',2,10,2);
          }
          eBullets.splice(i,1);
          hasShield=false;shieldIsReflect=false;spawnParticles(player.x,player.y,10,'#08f',4,20);playHit();addPopup(player.x,player.y-20,'SHIELD BROKEN!','#f44');break;
        }
        eBullets.splice(i,1);
        playerHit();break;
      }
    }
  }

  if(player.active&&player.invuln<=0){
    for(const e of enemies){
      if(!e.alive||e.state==='formation')continue;
      if(Math.abs(e.x-player.x)<16&&Math.abs(e.y-player.y)<16){
        if(hasShield){hasShield=false;shieldIsReflect=false;spawnParticles(player.x,player.y,10,'#08f',4,20);e.alive=false;spawnParticles(e.x,e.y,10,e.color,3,25);playHit();addPopup(player.x,player.y-20,'SHIELD BROKEN!','#f44');break;}
        spawnParticles(e.x,e.y,10,e.color,3,25);e.alive=false;playerHit();break;
      }
    }
  }

  if(player.active&&enemies.length>0&&!enemies.some(e=>e.alive)){
    const waveTime=Date.now()-waveStartTime;
    speedBonus=Math.max(0,Math.floor((30000-waveTime)/100)*5);
    if(speedBonus<0)speedBonus=0;
    state='waveClear';waveTransitionTimer=0;transitionProgress=0;
    spawnRing(cx,200,'#ff0',30,80);spawnRing(cx,200,'#fff',20,100);
    addPopup(cx,160,'WAVE CLEAR!','#0f0');
    addPopup(cx,180,'+'+1000*wave,'#ff0');
    if(speedBonus>0)addPopup(cx,200,'SPEED BONUS +'+speedBonus,'#0ff');
    score+=1000*wave+speedBonus;shake(6);flash(0.3,'#0f0');
  }
}

function applyUpgrade(idx){
  const t=upgradeOptions[idx];
  if(t==='mine'){player.mines=Math.min(player.mines+5,15);addPopup(cx,420,'MINES!','#fa0',18);playPowerup();transitionProgress=0;nextWave();return;}
  if(t==='vampire'){powerup='vampire';powerupTimer=10000;player.drones=[];addPopup(cx,420,'VAMPIRE!','#f4a',18);playPowerup();transitionProgress=0;nextWave();return;}
  if(t==='blackhole'){player.secondaryPowerup=t;player.secondaryPowerupTimer=6000;addPopup(cx,420,'BLACK HOLE!','#80f',18);playPowerup();transitionProgress=0;nextWave();return;}
  if(t==='reflect'){player.secondaryPowerup=t;player.secondaryPowerupTimer=5000;addPopup(cx,420,'REFLECT!','#0ff',18);playPowerup();transitionProgress=0;nextWave();return;}
  powerup=t;powerupTimer=powerup==='drone'?10000:8000;
  if(t==='freeze')freezeTimer=5000;
  if(t==='drone'){player.drones=[{angle:0,shootTimer:0},{angle:Math.PI,shootTimer:500}]}else{player.drones=[]}
  if(t==='tesla')player.teslaTimer=0;
  if(t==='shield')hasShield=true;
  addPopup(cx,420,t.toUpperCase()+'!',POWERUP_COLORS[t],18);
  playPowerup();transitionProgress=0;nextWave();
}

function playerHit(){
  if(!player.active||player.invuln>0)return;
  player.lives--;spawnExplosion(player.x,player.y,'#0cf',25);
  shake(8);flash(0.3,'#f44');playHit();player.trail=[];player.drones=[];
  player.secondaryPowerup=null;player.secondaryPowerupTimer=0;player.overheat=0;player.overheatLock=0;
  if(player.lives<=0){player.active=false;setTimeout(()=>{state='gameOver';if(score>hi){hi=score;try{localStorage.setItem('galagaHi',hi)}catch(e){}}goTimer=0},1500)}
  else{player.invuln=2000;player.x=cx;pBullets=[]}
}

// ===================== DRAW =====================
function draw(){
  // Animated nebula overlay
  nebulaTime+=0.005;
  ctx.drawImage(nebCanvas,0,0);

  // Animated nebula pulse
  const np=0.5+0.5*Math.sin(nebulaTime);
  ctx.fillStyle='rgba(0,0,0,'+(0.08*np)+')';
  ctx.fillRect(0,0,W,H);

  drawPlanets();
  ctx.fillStyle='rgba(0,0,0,0.12)';
  ctx.fillRect(0,0,W,H);
  drawStars();

  ctx.save();ctx.translate(shakeX,shakeY);

  if(flashAlpha>0){
    ctx.fillStyle=flashColor;ctx.globalAlpha=flashAlpha*0.3;
    ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
  }

  if(bossEntranceFlash>0){
    const a=clamp(bossEntranceFlash/20,0,1);
    ctx.fillStyle='rgba(255,0,0,'+(a*0.15)+')';ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(255,68,68,'+(a*0.5)+')';ctx.lineWidth=3;
    ctx.strokeRect(4,4,W-8,H-8);
  }

  if(state==='title'){drawTitle();ctx.restore();crtOverlay();return}
  if(state==='gameOver'){drawHUD();drawEnemies();drawParticles();drawPowerups();drawAsteroids();drawLaserBeams();drawShockwaves();drawMines();drawBlackHoles();drawGO();ctx.restore();crtOverlay();return}
  if(state==='upgrade'){drawHUD();drawEnemies();drawParticles();drawPowerups();drawAsteroids();drawLaserBeams();drawShockwaves();drawMines();drawBlackHoles();drawUpgradeScreen();ctx.restore();crtOverlay();return}
  if(state==='waveClear'){
    drawHUD();drawEnemies();drawParticles();drawPowerups();drawAsteroids();drawLaserBeams();drawShockwaves();drawMines();drawBlackHoles();
    drawWarpTransition();drawWC();ctx.restore();crtOverlay();return;
  }

  drawHUD();drawPlayer();drawBullets();drawEnemies();
  drawParticles();drawPowerups();drawPopups();drawAsteroids();
  drawLaserBeams();drawTeslaBolts();drawShockwaves();drawMines();drawBlackHoles();

  ctx.restore();
  crtOverlay();
}

function crtOverlay(){
  ctx.fillStyle='rgba(0,0,0,0.03)';
  for(let i=0;i<H;i+=3){ctx.fillRect(0,i,W,1)}
  const vg=ctx.createRadialGradient(cx,cy,H*0.4,cx,cy,H*0.7);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.3)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
}

function drawWarpTransition(){
  if(transitionProgress<=0)return;
  ctx.save();const p=transitionProgress;
  ctx.globalAlpha=p*0.5;ctx.strokeStyle='#0ff';ctx.lineWidth=2;
  for(let i=0;i<20;i++){
    const t=i/20,sx=cx+Math.cos(t*Math.PI*2)*W,sy=cy+Math.sin(t*Math.PI*2)*H;
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(lerp(sx,cx,p),lerp(sy,cy,p));ctx.stroke();
  }
  ctx.globalAlpha=1;ctx.restore();
}

function drawHUD(){
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';
  ctx.font='bold 14px monospace';
  ctx.textAlign='left';ctx.fillText('SCORE: '+score,10,22);
  ctx.textAlign='right';ctx.fillText('HI: '+hi,W-10,22);
  ctx.textAlign='left';ctx.fillText('WAVE '+wave,10,40);

  if(combo>=2){
    ctx.fillStyle='#ff0';ctx.textAlign='left';ctx.font='bold 12px monospace';
    ctx.fillText(combo+'x COMBO',10,56);
  }

  ctx.textAlign='left';
  ctx.fillStyle=weaponUpgradeDisplay>0?'#fff':'#ff0';
  ctx.font='bold 10px monospace';
  if(weaponUpgradeDisplay>0){ctx.shadowBlur=15;ctx.shadowColor='#ff0'}
  ctx.fillText('WPN: '+WEAPON_NAMES[player.weaponLevel-1],10,56);
  ctx.shadowBlur=0;
  if(player.weaponLevel<5){
    const current=player.weaponXP,need=WEAPON_XP[player.weaponLevel];
    ctx.fillStyle='rgba(255,255,0,0.3)';ctx.fillRect(10,58,60,3);
    ctx.fillStyle='#ff0';ctx.fillRect(10,58,Math.min(60,60*(current/need)),3);
  }else{ctx.fillStyle='#ff0';ctx.font='7px monospace';ctx.fillText('MAX',10,60)}

  // Risk display
  if(riskDisplay>1.5){
    ctx.fillStyle='#f80';ctx.textAlign='center';
    ctx.font='bold 9px monospace';
    ctx.fillText('x'+riskDisplay.toFixed(1)+' RISK!',cx,56);
  }

  if(player.mines>0){
    ctx.textAlign='left';ctx.fillStyle='#fa0';
    ctx.font='bold 10px monospace';ctx.fillText('MINES: '+player.mines+' [C]',10,70);
  }

  if(powerup&&powerupTimer>0){
    const maxDur=powerup==='drone'?10000:powerup==='magnet'?12000:powerup==='overdrive'?6000:8000;
    const pct=powerupTimer/maxDur;
    ctx.fillStyle=POWERUP_COLORS[powerup];ctx.textAlign='center';ctx.font='bold 11px monospace';
    ctx.fillText(powerup.toUpperCase()+' '+Math.ceil(powerupTimer/1000)+'s',cx,40);
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(cx-40,42,80,3);
    ctx.fillStyle=POWERUP_COLORS[powerup];ctx.fillRect(cx-40,42,80*pct,3);
  }

  if(freezeTimer>0){
    ctx.fillStyle='#8cf';ctx.textAlign='center';ctx.font='bold 10px monospace';
    ctx.fillText('SLOW '+Math.ceil(freezeTimer/1000)+'s',cx,86);
  }

  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(10,H-20,W-20,8);
  const boostPct=player.boostEnergy/100;
  ctx.fillStyle=boostPct>0.3?'#f80':boostPct>0.1?'#f44':'#f00';
  ctx.fillRect(10,H-20,(W-20)*boostPct,8);
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;
  ctx.strokeRect(10,H-20,W-20,8);
  ctx.fillStyle='#fff';ctx.font='7px monospace';ctx.textAlign='center';
  ctx.fillText('BOOST [SHIFT]',cx,H-13);

  const ohPct=player.overheat/100;
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(10,H-32,W-20,6);
  ctx.fillStyle=ohPct>0.8?'#f44':ohPct>0.5?'#fa0':'#ff0';
  ctx.fillRect(10,H-32,(W-20)*ohPct,6);
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
  ctx.strokeRect(10,H-32,W-20,6);
  ctx.fillStyle='#fff';ctx.font='6px monospace';ctx.textAlign='left';
  ctx.fillText('HEAT',12,H-28);
  if(player.overheatLock>0){
    ctx.fillStyle='#f44';ctx.font='bold 6px monospace';ctx.textAlign='right';
    ctx.fillText('LOCK',W-12,H-28);
  }

  if(player.secondaryPowerup&&player.secondaryPowerupTimer>0){
    const spCol=POWERUP_COLORS[player.secondaryPowerup]||'#fff';
    ctx.fillStyle=spCol;ctx.textAlign='right';ctx.font='bold 9px monospace';
    ctx.fillText('['+player.secondaryPowerup.toUpperCase()+'] [Q]',W-10,56);
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(W-70,58,60,3);
    ctx.fillStyle=spCol;ctx.fillRect(W-70,58,60*(player.secondaryPowerupTimer/(player.secondaryPowerup==='blackhole'?6000:5000)),3);
  }

  if(hasShield){
    ctx.fillStyle='#08f';ctx.textAlign='right';ctx.font='bold 11px monospace';
    ctx.fillText('SHIELD [X]',W-10,86);
  }

  ctx.textAlign='right';ctx.fillStyle='#0cf';
  for(let i=0;i<player.lives;i++){
    const lx=W-16-i*22,ly=568;
    ctx.beginPath();ctx.moveTo(lx,ly-8);ctx.lineTo(lx-8,ly+4);
    ctx.lineTo(lx+8,ly+4);ctx.closePath();ctx.fill();
  }
  ctx.shadowBlur=0;
}

function drawTitle(){
  ctx.shadowBlur=30;ctx.shadowColor='#f44';
  ctx.fillStyle='#f44';ctx.font='bold 60px monospace';ctx.textAlign='center';
  ctx.fillText('GALAGA',cx,170);
  ctx.shadowBlur=20;ctx.shadowColor='#f84';
  ctx.fillStyle='#f84';ctx.font='bold 60px monospace';
  ctx.fillText('GALAGA',cx-2,169);
  ctx.shadowBlur=15;ctx.shadowColor='#0cf';
  ctx.fillStyle='#0cf';ctx.font='bold 14px monospace';
  ctx.fillText('ENHANCED EDITION',cx,198);
  ctx.shadowBlur=0;
  ctx.fillStyle='#0cf';ctx.font='16px monospace';
  const blink=Math.sin(Date.now()*0.004)>0;
  if(blink)ctx.fillText('PRESS SPACE TO START',cx,290);
  ctx.fillStyle='#888';ctx.font='12px monospace';
  ctx.fillText('ARROWS: MOVE | SPACE: HOLD=CHARGE/TAP=FIRE',cx,330);
  ctx.fillText('C: MINE | X: BURST | Q: POWERUP | V: SWAP | SHIFT: BOOST',cx,348);
  ctx.fillStyle='#666';ctx.font='10px monospace';
  ctx.fillText('20 POWERUPS | 5 BOSS TYPES | BLACK HOLE + REFLECT',cx,370);
  ctx.fillText('OVERHEAT SYSTEM | SPEED BONUS | MEGA BOSS',cx,386);

  ctx.save();ctx.translate(cx,480);
  const grad=ctx.createLinearGradient(0,-15,0,15);
  grad.addColorStop(0,'#0cf');grad.addColorStop(0.5,'#08e');grad.addColorStop(1,'#046');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.moveTo(0,-15);ctx.lineTo(-16,12);ctx.lineTo(-8,9);
  ctx.lineTo(-4,15);ctx.lineTo(0,12);ctx.lineTo(4,15);
  ctx.lineTo(8,9);ctx.lineTo(16,12);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#aff';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,-15);ctx.lineTo(-16,12);ctx.lineTo(-8,9);
  ctx.lineTo(-4,15);ctx.lineTo(0,12);ctx.lineTo(4,15);
  ctx.lineTo(8,9);ctx.lineTo(16,12);ctx.closePath();ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.beginPath();ctx.arc(-4,-2,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(4,-2,3,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=15;ctx.shadowColor='#f80';
  ctx.fillStyle='rgba(255,200,100,0.6)';
  ctx.beginPath();ctx.moveTo(-6,12);ctx.lineTo(0,12+12+6*Math.sin(Date.now()*0.005));ctx.lineTo(6,12);
  ctx.closePath();ctx.fill();ctx.shadowBlur=0;
  ctx.restore();
  ctx.fillStyle='#444';ctx.font='9px monospace';ctx.fillText('v6.0',cx,570);
}

function drawGO(){
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,200,W,130);
  ctx.shadowBlur=20;ctx.shadowColor='#f44';
  ctx.fillStyle='#f44';ctx.font='bold 50px monospace';ctx.textAlign='center';
  ctx.fillText('GAME OVER',cx,275);
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='18px monospace';
  ctx.fillText('SCORE: '+score,cx,310);
  ctx.fillStyle='#888';ctx.font='12px monospace';
  ctx.fillText('WAVE REACHED: '+wave,cx,330);
  if(goTimer>1000){
    const blink2=Math.sin(Date.now()*0.005)>0;
    if(blink2){ctx.fillStyle='#0cf';ctx.font='14px monospace';ctx.fillText('PRESS SPACE TO RESTART',cx,355)}
  }
}

function drawWC(){
  ctx.shadowBlur=20;ctx.shadowColor='#0f0';
  ctx.fillStyle='#0f0';ctx.font='bold 40px monospace';ctx.textAlign='center';
  ctx.fillText('WAVE CLEAR!',cx,300);
  ctx.shadowBlur=0;
}

// ===================== MAIN LOOP =====================
let lastTime=0;
function loop(t){
  const raw=t-lastTime;lastTime=t;
  timeScale=nearMissActive?0.2:1;
  const dt=raw*timeScale;
  if(raw<100&&raw>0){update(dt,raw);draw()}
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
