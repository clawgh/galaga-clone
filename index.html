<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaga - Enhanced</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:monospace}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=480,H=640,cx=W/2;
c.width=W;c.height=H;

function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H);
  c.style.width=(W*s)+'px';c.style.height=(H*s)+'px';
}
window.addEventListener('resize',resize);resize();

const K={};
document.addEventListener('keydown',e=>{if(!K[e.code])K[e.code]=1;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyX','KeyZ','KeyC','ShiftLeft','ShiftRight','KeyV','KeyQ','Escape','KeyP'].includes(e.code))e.preventDefault()});
document.addEventListener('keyup',e=>{K[e.code]=0;if(e.code==='Space')player._spaceReleased=true});
document.addEventListener('mousedown',()=>{if(!audioCtx)initAudio()});

function rand(a,b){return Math.random()*(b-a)+a}
function randInt(a,b){return Math.floor(rand(a,b+1))}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function lerp(a,b,t){return a+(b-a)*t}
function dist(x1,y1,x2,y2){return Math.hypot(x2-x1,y2-y1)}

const WEAPON_XP=[0,60,180,360,600];
const WEAPON_NAMES=['MK-I','MK-II','MK-III','MK-IV','MK-V'];

// ===================== HIT STOP & NEAR MISS =====================
let hitStopTimer=0;
let nearMissTimer=0,nearMissActive=false,nearMissStreak=0;
function triggerHitStop(dur){hitStopTimer=Math.max(hitStopTimer,dur||150)}
function triggerNearMiss(dur){
  nearMissTimer=Math.max(nearMissTimer,dur||300);
  nearMissActive=true;
}

// ===================== BACKGROUND NEBULA =====================
const nebCanvas=document.createElement('canvas');
nebCanvas.width=W;nebCanvas.height=H;
const nebCtx=nebCanvas.getContext('2d');
(function(){
  for(let i=0;i<12;i++){
    const g=nebCtx.createRadialGradient(rand(0,W),rand(0,H),0,rand(0,W),rand(0,H),rand(200,400));
    const palettes=[
      ['rgba(80,10,70,0.1)','rgba(10,30,80,0.06)','rgba(0,0,0,0)'],
      ['rgba(60,30,10,0.08)','rgba(20,10,50,0.05)','rgba(0,0,0,0)'],
      ['rgba(10,60,90,0.08)','rgba(40,5,30,0.05)','rgba(0,0,0,0)'],
      ['rgba(70,5,30,0.07)','rgba(5,40,70,0.05)','rgba(0,0,0,0)'],
      ['rgba(30,80,50,0.06)','rgba(60,10,40,0.04)','rgba(0,0,0,0)'],
      ['rgba(80,60,10,0.06)','rgba(10,20,60,0.04)','rgba(0,0,0,0)'],
      ['rgba(50,10,80,0.08)','rgba(10,40,60,0.05)','rgba(0,0,0,0)'],
      ['rgba(80,20,30,0.07)','rgba(20,50,10,0.04)','rgba(0,0,0,0)'],
      ['rgba(10,80,50,0.06)','rgba(50,10,60,0.04)','rgba(0,0,0,0)'],
      ['rgba(60,5,80,0.09)','rgba(5,20,60,0.05)','rgba(0,0,0,0)'],
      ['rgba(80,50,10,0.06)','rgba(10,10,50,0.04)','rgba(0,0,0,0)'],
      ['rgba(40,70,20,0.05)','rgba(60,10,30,0.04)','rgba(0,0,0,0)']
    ];
    const ci=i%palettes.length;
    g.addColorStop(0,palettes[ci][0]);g.addColorStop(0.5,palettes[ci][1]);g.addColorStop(1,palettes[ci][2]);
    nebCtx.fillStyle=g;nebCtx.fillRect(0,0,W,H);
  }
  for(let i=0;i<40;i++){
    const g=nebCtx.createRadialGradient(rand(0,W),rand(0,H),0,rand(0,W),rand(0,H),rand(10,60));
    g.addColorStop(0,'rgba(255,255,255,0.04)');g.addColorStop(1,'rgba(0,0,0,0)');
    nebCtx.fillStyle=g;nebCtx.fillRect(0,0,W,H);
  }
})();

// ===================== STARS =====================
let stars=[];
function initStars(){
  stars=[];
  for(let i=0;i<80;i++)stars.push({x:rand(0,W),y:rand(0,H),s:rand(0.5,1.2),v:rand(0.08,0.2),b:rand(0.15,0.35),l:0});
  for(let i=0;i<50;i++)stars.push({x:rand(0,W),y:rand(0,H),s:rand(1,2),v:rand(0.25,0.5),b:rand(0.3,0.55),l:1});
  for(let i=0;i<25;i++)stars.push({x:rand(0,W),y:rand(0,H),s:rand(2,3.5),v:rand(0.6,1.2),b:rand(0.5,0.9),l:2,t:rand(0,Math.PI*2)});
  for(let i=0;i<4;i++)stars.push({x:rand(0,W),y:rand(0,H),s:rand(1,2.5),v:rand(4,8),b:1,l:3,t:rand(-0.4,0.4),a:0});
}
initStars();
initPlanets();

function updateStars(){
  for(const s of stars){
    if(s.l===3){
      s.x+=Math.cos(s.t)*s.v;s.y+=Math.sin(s.t)*s.v;
      s.a+=0.015;
      if(s.a>1||s.x<-50||s.x>W+50||s.y<-50||s.y>H+50){s.x=rand(0,W);s.y=rand(-100,-20);s.t=rand(-0.5,0.5);s.a=0;}
      continue;
    }
    s.y+=s.v*(1+s.l*0.25);
    if(s.y>H+5){s.y=-5;s.x=rand(0,W)}
    if(s.l===2)s.t+=0.015;
  }
}

function drawStars(){
  for(const s of stars){
    if(s.l===3){
      const alpha=Math.sin(s.a*Math.PI)*0.7;
      ctx.globalAlpha=alpha;ctx.shadowBlur=8;ctx.shadowColor='#aaf';
      ctx.strokeStyle='#aaf';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-Math.cos(s.t)*s.v*5,s.y-Math.sin(s.t)*s.v*5);ctx.stroke();
      ctx.shadowBlur=0;ctx.globalAlpha=1;continue;
    }
    const twinkle=s.l===2?0.5+0.5*Math.sin(s.t):1;
    ctx.globalAlpha=clamp((0.15+s.b*0.5)*twinkle,0,1);
    if(s.l===2){ctx.shadowBlur=6;ctx.shadowColor='#aef';ctx.fillStyle='#aef'}else{ctx.fillStyle='#fff'}
    ctx.fillRect(s.l===2?s.x-s.s/2:s.x,s.l===2?s.y-s.s/2:s.y,s.s,s.s);
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
}

// ===================== PLANET BACKGROUND =====================
let planets=[];
function createPlanet(x,y,r,color1,color2,hasRing){
  const pc=document.createElement('canvas');
  pc.width=r*2+24;pc.height=r*2+24;
  const pctx=pc.getContext('2d');
  const g=pctx.createRadialGradient(r+12,r+12,r*0.2,r+12,r+12,r+12);
  g.addColorStop(0,color1);g.addColorStop(0.6,color2);g.addColorStop(1,'rgba(0,0,0,0)');
  pctx.fillStyle=g;
  pctx.beginPath();pctx.arc(r+12,r+12,r,0,Math.PI*2);pctx.fill();
  for(let i=0;i<5+randInt(0,4);i++){
    const cx=rand(5,r*2-5),cy=rand(5,r*2-5);
    if(dist(cx,cy,r+12,r+12)>r*0.65)continue;
    const cg=pctx.createRadialGradient(cx,cy,0,cx,cy,rand(3,10));
    cg.addColorStop(0,'rgba(0,0,0,0.25)');cg.addColorStop(1,'rgba(0,0,0,0)');
    pctx.fillStyle=cg;
    pctx.beginPath();pctx.arc(cx,cy,rand(3,10),0,Math.PI*2);pctx.fill();
  }
  if(hasRing){
    pctx.strokeStyle='rgba(200,180,150,0.15)';pctx.lineWidth=3;
    pctx.beginPath();pctx.ellipse(r+12,r+12,r+8,r/3,0.3,0,Math.PI*2);pctx.stroke();
  }
  return{canvas:pc,x,y,r,speed:rand(0.015,0.05),alpha:rand(0.25,0.5)};
}

function initPlanets(){
  planets=[];
  planets.push(createPlanet(rand(50,W-50),rand(-100,-30),rand(35,55),'rgba(200,130,90,0.5)','rgba(100,60,30,0.2)'));
  planets.push(createPlanet(rand(50,W-50),rand(120,220),rand(22,38),'rgba(100,160,210,0.4)','rgba(30,60,100,0.15)'));
  planets.push(createPlanet(rand(50,W-50),rand(350,480),rand(28,48),'rgba(210,100,160,0.35)','rgba(80,30,60,0.15)',true));
  planets.push(createPlanet(rand(50,W-50),rand(550,650),rand(18,30),'rgba(150,200,100,0.3)','rgba(50,80,30,0.12)'));
}

function drawPlanets(){
  for(const p of planets){
    p.y+=p.speed;
    if(p.y>H+p.r){p.y=-p.r;p.x=rand(50,W-50)}
    ctx.globalAlpha=p.alpha;
    ctx.drawImage(p.canvas,p.x-p.r-12,p.y-p.r-12);
  }
  ctx.globalAlpha=1;
}

// ===================== AUDIO =====================
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playSound(freq,dur,type='square',vol=0.08){
  if(!audioCtx)return;
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type;o.frequency.setValueAtTime(freq,audioCtx.currentTime);
    g.gain.setValueAtTime(Math.min(vol,0.15),audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

function playExplosion(){playSound(180,0.25,'sawtooth',0.06);playSound(90,0.35,'square',0.04)}
function playPowerup(){playSound(660,0.08,'sine',0.06);setTimeout(()=>playSound(880,0.08,'sine',0.06),80);setTimeout(()=>playSound(1100,0.1,'sine',0.06),160)}

function playGravity(){playSound(160,0.4,'sine',0.04)}
function playSplit(){playSound(500,0.06,'square',0.05);playSound(400,0.1,'triangle',0.04)}

function playZap(){playSound(2200,0.06,'square',0.03);playSound(1800,0.08,'sawtooth',0.04)}

function playSwarm(){playSound(1400,0.04,'square',0.03)}
function playCharge(){playSound(600+rand(0,200),0.08,'sine',0.02)}

function playBeam(){playSound(1800,0.15,'sawtooth',0.03)}

function playReflect(){playSound(1500,0.06,'sine',0.05);playSound(2000,0.04,'sine',0.04)}
function playOverheat(){playSound(400,0.15,'sawtooth',0.06)}
function playNova(){playSound(200,0.4,'sawtooth',0.08);setTimeout(()=>playSound(150,0.3,'sawtooth',0.06),100);setTimeout(()=>playSound(100,0.5,'sawtooth',0.1),200)}
function playEcho(){playSound(1800,0.06,'sine',0.04);setTimeout(()=>playSound(2000,0.05,'sine',0.03),80)}
function playWarp(){playSound(400,0.3,'sine',0.06);setTimeout(()=>playSound(600,0.25,'sine',0.05),200);setTimeout(()=>playSound(800,0.2,'sine',0.04),400)}

// ===================== SCREEN EFFECTS =====================
let shakeX=0,shakeY=0,shakeI=0;
function shake(v){shakeI=Math.max(shakeI,v)}
function updateShake(dt){
  if(shakeI>0.5){shakeX=rand(-shakeI,shakeI);shakeY=rand(-shakeI,shakeI);shakeI*=0.88}
  else{shakeX=0;shakeY=0;shakeI=0}
}

let flashAlpha=0,flashColor='#fff';
function flash(v,color){flashAlpha=Math.max(flashAlpha,v);flashColor=color||'#fff'}
function updateFlash(dt){flashAlpha*=0.92;if(flashAlpha<0.01)flashAlpha=0}

let shockwaves=[];
function spawnShockwave(x,y,color='#fff',maxR=100,width=3){
  shockwaves.push({x,y,r:5,maxR,color,width,life:1,maxLife:1});
}
function updateShockwaves(dt){
  for(let i=shockwaves.length-1;i>=0;i--){
    const sw=shockwaves[i];sw.r+=(sw.maxR-sw.r)*0.1;
    sw.life-=dt*0.0008;
    if(sw.life<=0)shockwaves.splice(i,1);
  }
}
function drawShockwaves(){
  for(const sw of shockwaves){
    const a=clamp(sw.life/sw.maxLife,0,1)*0.6;
    ctx.globalAlpha=a;ctx.shadowBlur=20;ctx.shadowColor=sw.color;
    ctx.strokeStyle=sw.color;ctx.lineWidth=sw.width*a;
    ctx.beginPath();ctx.arc(sw.x,sw.y,sw.r,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
}

// ===================== PARTICLES =====================
let particles=[];
function spawnParticles(x,y,count,color,speed=3,life=40,size=3,spread=1){
  for(let i=0;i<count;i++){
    const a=rand(0,Math.PI*2),spd=rand(0.3,speed*spread);
    const c=Array.isArray(color)?color[randInt(0,color.length-1)]:color;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:rand(life*0.4,life),maxLife:life,color:c,size:rand(size*0.4,size),decay:rand(0.92,0.98),spark:Math.random()<0.2,glow:Math.random()<0.15});
  }
}

function spawnRing(x,y,color,count=20,maxR=40){
  for(let i=0;i<count;i++){
    const a=(Math.PI*2/count)*i;
    particles.push({x,y,vx:0,vy:0,life:30,maxLife:30,color,size:2.5,ring:true,angle:a,radius:5,maxR});
  }
}

function spawnExplosion(x,y,color,count=30){
  spawnParticles(x,y,count,color,5,35,3);
  spawnParticles(x,y,count*0.5,['#fff','#ff0'],4,25,2);
  spawnRing(x,y,color,15,30);
  spawnRing(x,y,'#fff',10,40);
  particles.push({x,y,vx:0,vy:0,life:8,maxLife:8,color:'rgba(255,255,255,0.3)',size:1,decay:1,spark:false,ring:false,glow:true,burst:true,burstR:0,maxR:50});
  spawnShockwave(x,y,color,80,3);
  spawnShockwave(x,y,'#fff',50,1.5);
}

function spawnDebris(x,y,color){
  for(let i=0;i<3;i++){
    particles.push({x,y,vx:rand(-2,2),vy:rand(-2,2),life:50,maxLife:50,color,size:rand(2,5),decay:0.98,spark:false,ring:false,glow:false,rot:rand(0,Math.PI*2),rSpd:rand(-0.05,0.05)});
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    if(p.burst){p.burstR+=(p.maxR-p.burstR)*0.15;continue;}
    if(p.rot!==undefined)p.rot+=p.rSpd||0;
    if(!p.ring){p.vy+=0.04;p.vx*=p.decay;p.vy*=p.decay}
    else{p.radius+=(p.maxR-p.radius)*0.08}
    p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}

function drawParticles(){
  for(const p of particles){
    const alpha=clamp(p.life/p.maxLife,0,1);
    ctx.globalAlpha=alpha;
    if(p.glow===true&&p.burst){
      ctx.shadowBlur=20;ctx.shadowColor='#fff';
      ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(p.x,p.y,p.burstR,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;
    }else if(p.ring){
      ctx.shadowBlur=8;ctx.shadowColor=p.color;
      ctx.strokeStyle=p.color;ctx.lineWidth=p.size*alpha;
      ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;
    }else if(p.spark){
      ctx.shadowBlur=8;ctx.shadowColor='#fff';
      ctx.fillStyle='#fff';
      ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size*2,p.size*0.5);
      ctx.shadowBlur=0;
    }else if(p.glow){
      ctx.shadowBlur=12;ctx.shadowColor=p.color;
      ctx.fillStyle=p.color;
      ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
      ctx.shadowBlur=0;
    }else if(p.rot!==undefined){
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.fillStyle=p.color;ctx.globalAlpha=alpha*0.6;
      ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
      ctx.restore();
    }else{
      ctx.fillStyle=p.color;
      ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    }
  }
  ctx.globalAlpha=1;
}

// ===================== SCORE POPUPS =====================
let popups=[];
function addPopup(x,y,text,color='#ff0',size=14){
  popups.push({x,y,text,color,life:50,maxLife:50,vy:-2,size});
}
function updatePopups(){
  for(let i=popups.length-1;i>=0;i--){
    const p=popups[i];
    p.y+=p.vy;p.life--;p.vy*=0.97;
    if(p.life<=0)popups.splice(i,1);
  }
}
function drawPopups(){
  for(const p of popups){
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.shadowBlur=10;ctx.shadowColor=p.color;
    ctx.fillStyle=p.color;ctx.font=`bold ${p.size}px monospace`;ctx.textAlign='center';
    ctx.fillText(p.text,p.x,p.y);
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
}

// ===================== MINES =====================
let mines=[];
function dropMine(){
  if(!player.active||player.mines<=0)return;
  player.mines--;playMine();
  const m={x:player.x,y:player.y+20,alive:true,armTime:500,life:8000,r:5,triggerR:50,blastR:70};
  mines.push(m);spawnRing(player.x,player.y+20,'#fa0',6,12);
}
function updateMines(dt){
  const fm=freezeTimer>0?0.3:1;
  for(let i=mines.length-1;i>=0;i--){
    const m=mines[i];m.armTime-=dt*fm;m.life-=dt*fm;
    if(m.life<=0){mines.splice(i,1);spawnParticles(m.x,m.y,5,'#fa0',2,15,2);continue;}
    if(m.armTime>0)continue;
    for(const e of enemies){
      if(!e.alive)continue;
      if(dist(m.x,m.y,e.x,e.y)<m.triggerR){
        spawnExplosion(m.x,m.y,'#fa0',20);shake(6);playBomb();triggerHitStop(80);
        for(const e2 of enemies){
          if(!e2.alive)continue;
          if(dist(m.x,m.y,e2.x,e2.y)<m.blastR){
            if(e2.boss){e2.bossHP=Math.max(0,e2.bossHP-5);spawnParticles(e2.x,e2.y,10,'#fa0',4,15);}
            else{e2.alive=false;score+=e2.pts;spawnParticles(e2.x,e2.y,15,e2.color,4,25);addPopup(e2.x,e2.y,'+'+e2.pts,'#fa0');}
          }
        }
        mines.splice(i,1);break;
      }
    }
  }
}
function drawMines(){
  for(const m of mines){
    const armed=m.armTime<=0;
    const pulse=armed?0.6+0.4*Math.sin(Date.now()*0.005):0.3;
    ctx.globalAlpha=pulse;ctx.save();ctx.translate(m.x,m.y);
    ctx.shadowBlur=armed?15:5;ctx.shadowColor=armed?'#fa0':'#666';
    ctx.fillStyle=armed?'#fa0':'#888';
    ctx.beginPath();ctx.arc(0,0,m.r,0,Math.PI*2);ctx.fill();
    if(armed){
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,2,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(255,170,0,0.3)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(0,0,m.triggerR,0,Math.PI*2);ctx.stroke();
    }
    ctx.shadowBlur=0;ctx.restore();ctx.globalAlpha=1;
  }
}

// ===================== BULLETS =====================
let pBullets=[],eBullets=[];
let freezeTimer=0;

function fireBullet(x,y,vx,vy,isEnemy,color,opts){
  const b={x,y,vx,vy,w:isEnemy?4:3,h:isEnemy?8:10,isEnemy,color:color||(isEnemy?'#f44':'#0ff'),trail:[]};
  b.age=0;
  if(opts){
    if(opts.homing)b.homing=true,b.turnRate=opts.turnRate||0.06,b.homingTarget=null;
    if(opts.gravity)b.gravity=true,b.gravityStrength=opts.gravityStrength||0.0004;
    if(opts.charged)b.charged=true,b.chargeLevel=opts.chargeLevel||1,b.damage=opts.damage||2;
    if(opts.pierce)b.pierce=true;
    if(opts.beam)b.beam=true;
  }
  isEnemy?eBullets.push(b):pBullets.push(b);
  if(!isEnemy&&!opts?.silent)playShoot();
  return b;
}

function playerFire(x,y){
  if(freezeTimer>0&&powerup==='freeze'){freezeTimer=0;powerup=null;powerupTimer=0;return}
  if(powerup==='spread'){
    fireBullet(x,y,0,-9,false,'#0ff');
    fireBullet(x-6,y-2,-1.2,-8.5,false,'#0ff');
    fireBullet(x+6,y-2,1.2,-8.5,false,'#0ff');
    fireBullet(x-12,y-4,-2.4,-7,false,'#0ff');
    fireBullet(x+12,y-4,2.4,-7,false,'#0ff');
  }else if(powerup==='double'){
    fireBullet(x-7,y,0,-9,false,'#0ff');
    fireBullet(x+7,y,0,-9,false,'#0ff');
  }else if(powerup==='laser'){
    fireBullet(x,y,0,-14,false,'#f0f');
    fireBullet(x,y,0,-14,false,'#f0f');
  }else if(powerup==='homing'){
    fireBullet(x-4,y,0,-6,false,'#f80',{homing:true,turnRate:0.08});
    fireBullet(x+4,y,0,-6,false,'#f80',{homing:true,turnRate:0.08});
    playHoming();
  }else if(powerup==='pierce'){
    fireBullet(x,y,0,-10,false,'#ff8',{pierce:true});
    playPierce();
  }else if(powerup==='tesla'){
    fireBullet(player.x,player.y,0,-10,false,'#fe0');
    fireBullet(player.x-6,player.y-1,-0.8,-9.5,false,'#fe0');
    fireBullet(player.x+6,player.y-1,0.8,-9.5,false,'#fe0');
  }else if(powerup==='beam'){
    fireBullet(player.x,player.y,0,-16,false,'#f0f',{pierce:true,beam:true});
    playBeam();
  }else if(powerup==='orbit'){
    if(!player.orbitProjs)player.orbitProjs=[];
    if(player.orbitProjs.length<3){
      const a=player.orbitProjs.length*(Math.PI*2/3);
      player.orbitProjs.push({angle:a,speed:0.004,shootTimer:0,active:true});
    }
    fireBullet(player.x,player.y,0,-9,false,'#0ff');
    playOrbit();
  }else if(powerup==='magnet'){
    fireBullet(x-8,y,0,-8,false,'#0fa');
    fireBullet(x+8,y,0,-8,false,'#0fa');
    fireBullet(x,y,0,-8,false,'#0fa');
    fireBullet(x-4,y-2,-0.8,-8.5,false,'#0fa');
    fireBullet(x+4,y-2,0.8,-8.5,false,'#0fa');
  }else if(powerup==='overdrive'){
    fireBullet(x-12,y,-1.2,-9,false,'#f90');
    fireBullet(x-7,y,-0.6,-9,false,'#f90');
    fireBullet(x,y,0,-9,false,'#f90');
    fireBullet(x+7,y,0.6,-9,false,'#f90');
    fireBullet(x+12,y,1.2,-9,false,'#f90');
  }else if(powerup==='barrage'){
    for(let i=-4;i<=4;i++)fireBullet(x+i*10,y-2,i*0.3,-9,false,'#ff4');
    playSound(1200,0.06,'sawtooth',0.04);
  }else if(powerup==='echo'){
    for(let i=0;i<3;i++){
      const angle=-0.3+i*0.3;
      const b=fireBullet(x+Math.sin(angle)*20,y,Math.sin(angle)*3,-9,false,'#0f0');
      if(b)pBullets[pBullets.length-1].echo=true;
    }
    playEcho();
  }else if(powerup==='phase'){
    fireBullet(x-6,y,0,-10,false,'#4ff');
    fireBullet(x+6,y,0,-10,false,'#4ff');
  }else{
    fireBullet(player.x,player.y,0,-8,false,'#0ff');
  }
}

function bossFirePattern(x,y,pattern,bossPhase,px,py,bossType){
  const spd=2.5+bossPhase*0.5;
  bossType=bossType||0;
  if(bossType===1){
    if(pattern===0){
      const dx=px-x,dy=py-y,len=Math.hypot(dx,dy);
      if(len>0)fireBullet(x,y,(dx/len)*spd*0.8,(dy/len)*spd*0.8,true,'#f80');
    }else if(pattern===1){
      const count=8+bossPhase*2;
      for(let i=0;i<count;i++){
        const a=(Math.PI*2/count)*i+Date.now()*0.003;
        fireBullet(x,y,Math.cos(a)*spd*0.6,Math.sin(a)*spd*0.6,true,'#fa0',{gravity:true,gravityStrength:0.0003});
      }
    }else if(pattern===2){
      const count=5+bossPhase;
      for(let i=0;i<count;i++){
        const a=-0.5+0.25*i+Math.sin(Date.now()*0.004)*0.5;
        fireBullet(x,y,Math.sin(a)*spd*1.2,Math.cos(a)*spd*1.2,true,'#f80');
      }
    }else if(pattern===3){
      const count=8+bossPhase*3;
      for(let i=0;i<count;i++){
        const a=(Math.PI*2/count)*i+Math.sin(Date.now()*0.002)*0.3;
        fireBullet(x,y,Math.cos(a)*spd*0.7,Math.sin(a)*spd*0.7,true,'#f0f',{gravity:true,gravityStrength:0.0004});
      }
    }
    return;
  }
  if(bossType===3){
    if(pattern===0){
      const dx=px-x,dy=py-y,len=Math.hypot(dx,dy);
      if(len>0)fireBullet(x,y,(dx/len)*spd*1.2,(dy/len)*spd*1.2,true,'#0ff');
    }else if(pattern===1){
      const count=6+bossPhase*2;
      for(let i=0;i<count;i++){
        const a=(Math.PI*2/count)*i+Date.now()*0.002;
        fireBullet(x,y,Math.cos(a)*spd*0.8,Math.sin(a)*spd*0.8,true,'#f0f');
      }
    }else if(pattern===2){
      for(let i=0;i<3;i++){
        const a=i*Math.PI*2/3+Date.now()*0.003;
        fireBullet(x,y,Math.cos(a)*spd*1.5,Math.sin(a)*spd*1.5,true,'#0ff',{homing:true,turnRate:0.02});
      }
    }else if(pattern===3){
      const count=8+bossPhase*2;
      for(let i=0;i<count;i++){
        const a=(Math.PI*2/count)*i+Date.now()*0.004;
        const r=spd*(0.5+0.5*Math.sin(Date.now()*0.005));
        fireBullet(x,y,Math.cos(a)*r,Math.sin(a)*r,true,'#f0f');
      }
    }
    return;
  }
  if(bossType===4){
    if(pattern===0){
      const count=12+bossPhase*3;
      for(let i=0;i<count;i++){
        const a=(Math.PI*2/count)*i+Date.now()*0.001;
        fireBullet(x,y,Math.cos(a)*spd*0.7,Math.sin(a)*spd*0.7,true,'#f0f',{gravity:true,gravityStrength:0.0002});
      }
    }else if(pattern===1){
      for(let i=0;i<4+bossPhase;i++){
        const a=-0.3+i*0.2;
        fireBullet(x,y,Math.sin(a)*spd*1.5,Math.cos(a)*spd*1.5,true,'#f44');
        fireBullet(x,y,Math.sin(-a)*spd*1.5,Math.cos(-a)*spd*1.5,true,'#f44');
      }
    }else if(pattern===2){
      const dx=px-x,dy=py-y,len=Math.hypot(dx,dy);
      if(len>0){
        for(let i=0;i<3+bossPhase;i++){
          const off=(i-(1+bossPhase)/2)*0.15;
          fireBullet(x,y,(dx/len+off)*spd*1.2,(dy/len+off)*spd*1.2,true,'#fa0');
        }
      }
    }else if(pattern===3){
      for(let i=0;i<6+bossPhase*3;i++){
        const a=(Math.PI*2/(6+bossPhase*3))*i+Date.now()*0.003;
        const r=spd*(0.5+0.5*Math.sin(Date.now()*0.004+i*0.5));
        fireBullet(x,y,Math.cos(a)*r,Math.sin(a)*r,true,'#f0f',{homing:true,turnRate:0.01});
      }
    }
    return;
  }
  if(pattern===0){
    const dx=px-x,dy=py-y,len=Math.hypot(dx,dy);
    if(len>0)fireBullet(x,y,(dx/len)*spd,(dy/len)*spd,true,'#f44',{gravity:true,gravityStrength:0.0003+bossPhase*0.0001});
  }else if(pattern===1){
    const count=6+bossPhase*2;
    for(let i=0;i<count;i++){
      const a=(Math.PI*2/count)*i+Date.now()*0.002;
      fireBullet(x,y,Math.cos(a)*spd,Math.sin(a)*spd,true,'#fa0');
    }
  }else if(pattern===2){
    for(let i=0;i<3+bossPhase;i++){
      const a=-0.4+0.4*i+Math.sin(Date.now()*0.005)*0.3;
      fireBullet(x,y,Math.sin(a)*spd,Math.cos(a)*spd,true,'#f44',{gravity:true,gravityStrength:0.0005});
    }
  }else if(pattern===3){
    for(let i=0;i<12+bossPhase*3;i++){
      const a=(Math.PI*2/(12+bossPhase*3))*i;
      fireBullet(x,y,Math.cos(a)*1.5,Math.sin(a)*1.5+1,true,'#f0f',{gravity:true,gravityStrength:0.0002});
    }
  }
}

function updateBullets(dt){
  const freezeMult=freezeTimer>0?0.3:1;
  for(let i=pBullets.length-1;i>=0;i--){
    const b=pBullets[i];
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>(b.charged?12:6))b.trail.shift();
    if(b.homing){
      if(!b.homingTarget||!b.homingTarget.alive){
        let best=null,bestD=Infinity;
        for(const e of enemies){
          if(!e.alive)continue;
          const d=dist(b.x,b.y,e.x,e.y);
          if(d<bestD){bestD=d;best=e;}
        }
        b.homingTarget=best;
      }
      if(b.homingTarget){
        const dx=b.homingTarget.x-b.x,dy=b.homingTarget.y-b.y;
        const len=Math.hypot(dx,dy);
        if(len>1){
          const tx=dx/len,ty=dy/len;
          const spd=Math.hypot(b.vx,b.vy);
          const cvx=b.vx/spd||0,cvy=b.vy/spd||0;
          b.vx+=(tx-cvx)*b.turnRate*dt*0.1;
          b.vy+=(ty-cvy)*b.turnRate*dt*0.1;
          const nSpd=Math.hypot(b.vx,b.vy);
          if(nSpd>0){b.vx=b.vx/nSpd*Math.min(spd+0.5,7);b.vy=b.vy/nSpd*Math.min(spd+0.5,7);}
        }
      }
    }
    if(b.echo){
      if(b.x<0||b.x>W){b.vx=-b.vx;b.bounces=(b.bounces||0)+1;b.x=clamp(b.x,2,W-2)}
      if(b.y<-20){b.vy=-b.vy;b.bounces=(b.bounces||0)+1;b.y=-10}
      if((b.bounces||0)>3||b.y>H+20)pBullets.splice(i,1);
    }
    b.x+=b.vx;b.y+=b.vy;b.age+=dt;
    if(!b.echo&&(b.y<-20||b.x<-20||b.x>W+20))pBullets.splice(i,1);
  }
  for(let i=eBullets.length-1;i>=0;i--){
    const b=eBullets[i];
    if(b.gravity&&player.active){
      const dx=player.x-b.x,dy=player.y-b.y;
      const d2=dx*dx+dy*dy;
      if(d2>100){
        const dist=Math.sqrt(d2);
        b.vx+=dx/dist*b.gravityStrength*dt*freezeMult;
        b.vy+=dy/dist*b.gravityStrength*dt*freezeMult;
      }
    }
    b.x+=b.vx*freezeMult;b.y+=b.vy*freezeMult;
    if(b.y>H+20||b.x<-20||b.x>W+20)eBullets.splice(i,1);
  }
}

function drawBullets(){
  for(const b of pBullets){
    for(let i=0;i<b.trail.length;i++){
      const t=b.trail[i],alpha=(i/b.trail.length)*0.4;
      ctx.globalAlpha=alpha;
      ctx.fillStyle=b.charged?'#ff0':b.color;
      const tw=b.charged?b.w*2:b.w*0.6;
      const th=b.charged?b.h*2:b.h*0.6;
      ctx.fillRect(t.x-tw/2,t.y-th/2,tw,th);
    }
    ctx.globalAlpha=1;
    const bs=b.charged?b.w*2:b.w;
    const bh=b.charged?b.h*2:b.h;
    const grad=ctx.createLinearGradient(b.x,b.y-bh/2,b.x,b.y+bh/2);
    grad.addColorStop(0,'rgba(255,255,255,0)');
    grad.addColorStop(0.3,b.color);
    grad.addColorStop(0.7,b.color);
    grad.addColorStop(1,'rgba(255,255,255,0)');
    ctx.shadowBlur=b.charged?25:12;ctx.shadowColor=b.charged?'#fff':b.color;
    ctx.fillStyle=grad;
    ctx.fillRect(b.x-bs/2,b.y-bh/2,bs,bh);
    ctx.shadowBlur=0;
  }
  for(const b of eBullets){
    ctx.shadowBlur=8;ctx.shadowColor=b.color;
    if(freezeTimer>0){
      ctx.fillStyle='#8cf';ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;continue;
    }
    ctx.fillStyle=b.color;
    ctx.beginPath();
    if(b.gravity){
      ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fillStyle='#fa0';ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(b.x,b.y,2,0,Math.PI*2);ctx.fill();
    }else{
      ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;
  }
}

// ===================== ASTEROIDS =====================
let asteroids=[];
let asteroidTimer=3000;
function spawnAsteroid(wave){
  const sizes=[{r:8,pts:50,speed:1},{r:14,pts:100,speed:0.8},{r:22,pts:200,speed:0.6}];
  const s=sizes[randInt(0,Math.min(2,Math.floor(wave/2)))];
  const vertCount=6+randInt(0,2);const verts=[];
  for(let i=0;i<vertCount;i++)verts.push(s.r*(i%2===0?1:0.8+rand(-0.1,0.1)));
  asteroids.push({
    x:rand(20,W-20),y:-20,r:s.r,vx:rand(-0.5,0.5),vy:s.speed+rand(0,0.3)+wave*0.02,
    pts:s.pts,rotation:rand(0,Math.PI*2),rotSpeed:rand(-0.02,0.02),
    hp:Math.ceil(s.r/6),alive:true,color:s.r>15?'#876':'#987',verts,vertCount
  });
}
function updateAsteroids(dt){
  const freezeMult=freezeTimer>0?0.3:1;
  asteroidTimer-=dt*freezeMult;
  if(asteroidTimer<=0&&asteroids.length<8&&enemies.some(e=>e.alive)){
    spawnAsteroid(wave);asteroidTimer=rand(3000,8000)-wave*100;
    if(asteroidTimer<1500)asteroidTimer=1500;
  }
  for(let i=asteroids.length-1;i>=0;i--){
    const a=asteroids[i];
    if(!a.alive){asteroids.splice(i,1);continue;}
    a.x+=a.vx;a.y+=a.vy*freezeMult;a.rotation+=a.rotSpeed;
    if(a.y>H+30||a.x<-30||a.x>W+30){asteroids.splice(i,1);continue;}
    for(let j=pBullets.length-1;j>=0;j--){
      const b=pBullets[j];
      if(dist(b.x,b.y,a.x,a.y)<a.r+5){
        if(!b.pierce){pBullets.splice(j,1);}
        a.hp--;spawnParticles(a.x,a.y,5,'#ba9',2,15,2);
        if(a.hp<=0){a.alive=false;score+=a.pts;spawnDebris(a.x,a.y,'#ba9');spawnParticles(a.x,a.y,15,'#ba9',4,25,3);spawnRing(a.x,a.y,'#ba9',8,20);addPopup(a.x,a.y,'+'+a.pts,'#ba9');playAsteroidHit();}
        break;
      }
    }
    if(player.active&&player.invuln<=0&&dist(a.x,a.y,player.x,player.y)<a.r+12){
      if(hasShield){hasShield=false;shieldIsReflect=false;spawnParticles(player.x,player.y,10,'#08f',4,20);playHit();addPopup(player.x,player.y-20,'SHIELD BROKEN!','#f44');a.alive=false;spawnParticles(a.x,a.y,10,'#ba9',3,20);continue;}
      spawnParticles(a.x,a.y,10,'#ba9',3,20);a.alive=false;playerHit();
    }
  }
}
function drawAsteroids(){
  for(const a of asteroids){
    if(!a.alive)continue;
    ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rotation);
    ctx.shadowBlur=10;ctx.shadowColor='rgba(150,120,100,0.5)';
    ctx.fillStyle=freezeTimer>0?'#8af':a.color;
    ctx.beginPath();
    for(let i=0;i<a.vertCount;i++){
      const ang=(Math.PI*2/a.vertCount)*i,rad=a.verts[i];
      i===0?ctx.moveTo(Math.cos(ang)*rad,Math.sin(ang)*rad):ctx.lineTo(Math.cos(ang)*rad,Math.sin(ang)*rad);
    }
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(200,180,160,0.3)';ctx.lineWidth=1;ctx.stroke();
    ctx.shadowBlur=0;ctx.restore();
  }
}

// ===================== BLACK HOLES =====================
let blackHoles=[];
function spawnBlackHole(x,y){
  playBlackHole();shake(6);flash(0.3,'#80f');
  const bh={x,y,life:4000,maxLife:4000,r:8,maxR:60,alive:true,pulse:0};
  blackHoles.push(bh);
  spawnRing(x,y,'#80f',30,40);spawnRing(x,y,'#a4f',20,60);
  for(let i=0;i<30;i++){
    const a=rand(0,Math.PI*2),d=rand(0,60);
    particles.push({x:x+Math.cos(a)*d,y:y+Math.sin(a)*d,vx:0,vy:0,life:rand(20,40),maxLife:40,color:'#80f',
      size:rand(1,3),decay:0.96,spark:false,ring:false,glow:true,ring2:true,angle:a,radius:d,maxR:60});
  }
}
function updateBlackHoles(dt){
  const fm=freezeTimer>0?0.3:1;
  for(let i=blackHoles.length-1;i>=0;i--){
    const bh=blackHoles[i];
    bh.life-=dt*fm;bh.pulse+=dt*0.006*fm;
    bh.r=8+(bh.maxR-8)*(1-Math.pow(1-bh.life/bh.maxLife,0.7));
    if(bh.life<=0){
      spawnRing(bh.x,bh.y,'#a4f',25,50);spawnParticles(bh.x,bh.y,30,'#80f',5,30,3);
      blackHoles.splice(i,1);continue;
    }
    const pullR=bh.r*1.8;
    for(const e of enemies){
      if(!e.alive)continue;
      const d=dist(bh.x,bh.y,e.x,e.y);
      if(d<pullR&&d>5){
        const str=0.04*(1-d/pullR);
        e.x+=(bh.x-e.x)/d*str*dt*fm;
        e.y+=(bh.y-e.y)/d*str*dt*fm;
        if(d<bh.r*0.8&&Math.random()<0.02*fm){
          e.alive=false;const pts=e.boss?Math.floor(e.pts*0.3):e.pts;
          score+=pts;addPopup(e.x,e.y,'+'+pts,'#a4f');
          spawnParticles(e.x,e.y,10,'#80f',3,20,2);playExplosion();
          if(Math.random()<0.2)spawnPowerup(e.x,e.y);
        }
      }
    }
    for(let j=eBullets.length-1;j>=0;j--){
      const b=eBullets[j],d=dist(bh.x,bh.y,b.x,b.y);
      if(d<pullR){b.vx+=(bh.x-b.x)/d*0.05;b.vy+=(bh.y-b.y)/d*0.05}
      if(d<bh.r*0.5){eBullets.splice(j,1);spawnParticles(b.x,b.y,3,'#80f',1,10,1)}
    }
    if(player.active&&dist(bh.x,bh.y,player.x,player.y)<pullR*0.8){
      const d=dist(bh.x,bh.y,player.x,player.y)||1;
      player.vx+=(bh.x-player.x)/d*0.008;
      player.y+=(bh.y-player.y)/d*0.015;
      player.y=clamp(player.y,520,580);
    }
  }
}
function drawBlackHoles(){
  for(const bh of blackHoles){
    const lifeRatio=bh.life/bh.maxLife;
    const a=clamp(lifeRatio,0,1);
    ctx.save();ctx.translate(bh.x,bh.y);
    const grad=ctx.createRadialGradient(0,0,0,0,0,bh.r);
    grad.addColorStop(0,'rgba(200,150,255,'+(0.5*a)+')');
    grad.addColorStop(0.4,'rgba(120,50,200,'+(0.3*a)+')');
    grad.addColorStop(0.7,'rgba(80,0,160,'+(0.15*a)+')');
    grad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grad;ctx.beginPath();ctx.arc(0,0,bh.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=30;ctx.shadowColor='#80f';
    ctx.fillStyle='rgba(180,120,255,'+(0.6*a)+')';
    ctx.beginPath();ctx.arc(0,0,bh.r*0.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,'+(0.8*a)+')';
    ctx.beginPath();ctx.arc(0,0,bh.r*0.1,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(150,100,255,'+(0.2*a+0.1*Math.sin(bh.pulse))+')';
    ctx.lineWidth=2;
    ctx.beginPath();
    for(let i=0;i<12;i++){
      const ang=i*Math.PI/6+bh.pulse,r=bh.r*(0.6+0.4*Math.sin(bh.pulse+i));
      i===0?ctx.moveTo(Math.cos(ang)*r,Math.sin(ang)*r):ctx.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);
    }
    ctx.closePath();ctx.stroke();
    ctx.shadowBlur=0;ctx.restore();
  }
}

// ===================== POWERUPS =====================
const POWERUP_TYPES=['rapid','spread','double','laser','shield','bomb','homing','drone','pierce','gravity','tesla','freeze','mine','vampire','beam','orbit','magnet','overdrive','blackhole','reflect','barrage','phase','nova','echo','timewarp'];
const POWERUP_COLORS={rapid:'#ff0',spread:'#0ff',double:'#0f0',laser:'#f0f',shield:'#08f',bomb:'#f44',homing:'#f80',drone:'#0fa',pierce:'#ff8',gravity:'#0f8',tesla:'#fe0',freeze:'#8cf',mine:'#fa0',vampire:'#f4a',beam:'#f0f',orbit:'#0ff',magnet:'#0fa',overdrive:'#f90',blackhole:'#80f',reflect:'#0ff',barrage:'#ff4',phase:'#4ff',nova:'#f80',echo:'#0f0',timewarp:'#4ff'};
let powerups=[];
let powerup=null,powerupTimer=0;
let hasShield=false,shieldIsReflect=false;

function spawnPowerup(x,y){
  if(Math.random()>0.15)return;
  const type=POWERUP_TYPES[randInt(0,POWERUP_TYPES.length-1)];
  powerups.push({x,y,type,vy:1.2,life:600,size:12,pulse:0});
}

function updatePowerups(dt){
  const freezeMult=freezeTimer>0?0.3:1;
  const magnetActive=powerup==='magnet'&&powerupTimer>0;
  for(let i=powerups.length-1;i>=0;i--){
    const pu=powerups[i];
    pu.y+=pu.vy*freezeMult;pu.life--;pu.pulse+=dt*0.005;
    if(pu.y>H+20||pu.life<=0){powerups.splice(i,1);continue;}
    const magnetPull=magnetActive?200:120;
    if(player.active&&dist(pu.x,pu.y,player.x,player.y)<magnetPull){
      const dx=player.x-pu.x,dy=player.y-pu.y;
      const d=Math.hypot(dx,dy)||1;
      const pull=magnetActive?0.08*(200-d)/200:0.04*(120-d)/120;
      pu.x+=dx/d*pull;pu.y+=dy/d*pull;
    }
    if(player.active&&dist(pu.x,pu.y,player.x,player.y)<35){
      collectPowerup(pu);powerups.splice(i,1);continue;
    }
  }
  if(powerupTimer>0){
    powerupTimer-=dt;
    if(powerupTimer<=0){
      if(powerup==='freeze')freezeTimer=0;
      powerup=null;powerupTimer=0;player.drones=[];
    }
  }
  if(player.secondaryPowerupTimer>0){
    player.secondaryPowerupTimer-=dt;
    if(player.secondaryPowerupTimer<=0){player.secondaryPowerup=null;player.secondaryPowerupTimer=0}
  }
  if(freezeTimer>0){freezeTimer-=dt;if(freezeTimer<=0)freezeTimer=0}
}

function collectPowerup(pu){
  playPowerup();
  const t=pu.type;
  if(t==='nova'){
    playNova();triggerHitStop(150);shake(15);flash(0.5,'#f80');
    for(const e of enemies){if(e.alive){
      if(e.boss){e.bossHP=Math.max(0,e.bossHP-8);spawnParticles(e.x,e.y,15,e.color,6,30,4);score+=Math.floor(e.pts*0.1)}
      else{e.alive=false;spawnParticles(e.x,e.y,20,e.color,5,30);score+=e.pts}
    }}
    for(const a of asteroids){a.alive=false;spawnParticles(a.x,a.y,15,'#ba9',4,25);score+=a.pts}
    eBullets=[];
    for(let i=0;i<60;i++){
      const a=rand(0,Math.PI*2),spd=rand(2,8);
      particles.push({x:pu.x+rand(-20,20),y:pu.y+rand(-20,20),vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:rand(15,35),maxLife:35,color:'#f80',size:rand(2,5),decay:0.95,spark:false,ring:false,glow:true});
    }
    spawnRing(pu.x,pu.y,'#f80',30,80);spawnRing(pu.x,pu.y,'#ff0',20,120);
    addPopup(pu.x,pu.y,'NOVA BURST!','#f80');return;
  }
  if(t==='echo'){powerup=t;powerupTimer=10000;player.drones=[];addPopup(pu.x,pu.y,'ECHO!',POWERUP_COLORS[t]);playEcho();return;}
  if(t==='timewarp'){powerup=t;powerupTimer=8000;freezeTimer=6000;player.drones=[];playWarp();addPopup(pu.x,pu.y,'TIME WARP!',POWERUP_COLORS[t]);return;}
  if(t==='shield'){hasShield=true;addPopup(pu.x,pu.y,'SHIELD!','#08f');return}
  if(t==='barrage'){powerup=t;powerupTimer=7000;player.drones=[];addPopup(pu.x,pu.y,'BARRAGE!',POWERUP_COLORS[t]);return;}
  if(t==='phase'){powerup=t;powerupTimer=6000;player.phaseActive=true;player.phaseTimer=6000;player.drones=[];playFreeze();addPopup(pu.x,pu.y,'PHASE!',POWERUP_COLORS[t]);return;}
  if(t==='bomb'){
    playBomb();triggerHitStop(100);
    for(const e of enemies){if(e.alive){e.alive=false;spawnParticles(e.x,e.y,15,e.color,5,30);score+=e.pts;}}
    eBullets=[];for(const a of asteroids){a.alive=false;spawnParticles(a.x,a.y,10,'#ba9',3,20);score+=a.pts;}
    shake(10);flash(0.4,'#f44');addPopup(pu.x,pu.y,'BOMB!','#f44');return;
  }
  if(t==='drone'){powerup=t;powerupTimer=10000;player.drones=[{angle:0,shootTimer:0},{angle:Math.PI,shootTimer:500}];addPopup(pu.x,pu.y,'DRONES!',POWERUP_COLORS[t]);return;}
  if(t==='gravity'){powerup=t;powerupTimer=8000;player.drones=[];playGravity();addPopup(pu.x,pu.y,'GRAVITY!',POWERUP_COLORS[t]);return;}
  if(t==='tesla'){powerup=t;powerupTimer=8000;player.drones=[];player.teslaTimer=0;addPopup(pu.x,pu.y,'TESLA!',POWERUP_COLORS[t]);return;}
  if(t==='freeze'){powerup=t;powerupTimer=8000;freezeTimer=5000;player.drones=[];playFreeze();addPopup(pu.x,pu.y,'FREEZE!',POWERUP_COLORS[t]);return;}
  if(t==='mine'){player.mines=Math.min(player.mines+5,15);addPopup(pu.x,pu.y,'MINES!',POWERUP_COLORS[t]);if(powerup!=='mine'){powerup=null;powerupTimer=0;player.drones=[];}return;}
  if(t==='vampire'){powerup=t;powerupTimer=10000;player.drones=[];addPopup(pu.x,pu.y,'VAMPIRE!',POWERUP_COLORS[t]);return;}
  if(t==='magnet'){powerup=t;powerupTimer=12000;player.drones=[];addPopup(pu.x,pu.y,'MAGNET!',POWERUP_COLORS[t]);return;}
  if(t==='overdrive'){powerup=t;powerupTimer=6000;player.drones=[];addPopup(pu.x,pu.y,'OVERDRIVE!',POWERUP_COLORS[t]);return;}
  if(t==='blackhole'){if(powerup&&player.secondaryPowerup){powerup=null;powerupTimer=0}if(player.secondaryPowerup){powerup=t;powerupTimer=6000}else{player.secondaryPowerup=t;player.secondaryPowerupTimer=6000}addPopup(pu.x,pu.y,'BLACK HOLE!',POWERUP_COLORS[t]);player.drones=[];return;}
  if(t==='reflect'){if(powerup&&player.secondaryPowerup){powerup=null;powerupTimer=0}if(player.secondaryPowerup){powerup=t;powerupTimer=5000}else{player.secondaryPowerup=t;player.secondaryPowerupTimer=5000}addPopup(pu.x,pu.y,'REFLECT!',POWERUP_COLORS[t]);player.drones=[];return;}
  powerup=t;powerupTimer=8000;player.drones=[];
  addPopup(pu.x,pu.y,t.toUpperCase()+'!',POWERUP_COLORS[t]);
}

function drawPowerups(){
  for(const pu of powerups){
    const s=pu.size+Math.sin(pu.pulse)*3;
    const col=POWERUP_COLORS[pu.type];
    ctx.save();ctx.translate(pu.x,pu.y);
    ctx.shadowBlur=15;ctx.shadowColor=col;
    ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=col;ctx.globalAlpha=0.3;
    ctx.beginPath();ctx.arc(0,0,s-2,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    ctx.fillStyle='#fff';ctx.font='bold 10px monospace';ctx.textAlign='center';
    const labels={pierce:'P',gravity:'G',tesla:'T',freeze:'F',magnet:'M',overdrive:'O',blackhole:'B',reflect:'R',barrage:'*',phase:'~'};
    ctx.fillText(labels[pu.type]||pu.type[0].toUpperCase(),0,4);
    ctx.shadowBlur=0;ctx.restore();
  }
}

// ===================== DRONES =====================
function updateDrones(dt){
  if(!player.active||!player.drones||player.drones.length===0)return;
  for(const d of player.drones){
    d.angle+=dt*0.003;d.shootTimer-=dt;
    if(d.shootTimer<=0){
      let best=null,bestD=Infinity;
      for(const e of enemies){
        if(!e.alive)continue;
        const dd=dist(player.x,player.y,e.x,e.y);
        if(dd<bestD){bestD=dd;best=e;}
      }
      if(best){
        const dx=best.x-(player.x+Math.cos(d.angle)*30);
        const dy=best.y-(player.y+Math.sin(d.angle)*30);
        const len=Math.hypot(dx,dy);
        if(len>0)fireBullet(player.x+Math.cos(d.angle)*30,player.y+Math.sin(d.angle)*30,(dx/len)*5,(dy/len)*5,false,'#0fa',{silent:true});
        playDroneFire();
      }
      d.shootTimer=600;
    }
  }
}

function drawDrones(){
  if(!player.active||!player.drones||player.drones.length===0)return;
  for(const d of player.drones){
    const dx=player.x+Math.cos(d.angle)*30,dy=player.y+Math.sin(d.angle)*30;
    ctx.save();ctx.translate(dx,dy);
    ctx.shadowBlur=12;ctx.shadowColor='#0fa';
    ctx.fillStyle='#0fa';
    ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.beginPath();ctx.arc(-1,-1,2,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
  }
}

}

function updateEnemies(dt,px,wave){
  const freezeMult=freezeTimer>0?0.4:1;
  formAngle+=dt*0.001*freezeMult;
  const fOff=Math.sin(formAngle)*30;
  formationPatternTimer+=dt*freezeMult;
  if(formationPatternTimer>5000){
    formationPattern=(formationPattern+1)%4;
    formationPatternTimer=0;
  }

  const diving=enemies.some(e=>e.alive&&e.state==='dive');

  sideSpawnTimer-=dt*freezeMult;
  if(sideSpawnTimer<=0&&!diving&&wave>=2&&enemies.some(e=>e.alive&&e.state==='formation')){
    if(Math.random()<0.4)spawnSideEnemies(wave,px);
    sideSpawnTimer=rand(4000,8000)-wave*200;
    if(sideSpawnTimer<2000)sideSpawnTimer=2000;
  }

  if(wave>=3&&!diving){
    swarmTimer-=dt*freezeMult;
    if(swarmTimer<=0&&enemies.some(e=>e.alive&&e.state==='formation')){
      if(Math.random()<0.3)spawnSwarm(wave,px);
      swarmTimer=rand(8000,15000)-wave*300;
      if(swarmTimer<5000)swarmTimer=5000;
    }
  }

  if(wave>=5&&!diving&&!enemies.some(e=>e.beamer)){
    if(Math.random()<0.002*freezeMult)spawnBeamer(wave);
  }

  if(wave>=6&&!diving){
    if(Math.random()<0.001*freezeMult&&!enemies.some(e=>e.alive&&e.type===10)){
      const side=Math.random()>0.5?1:-1;
      enemies.push({
        x:side===1?W+20:-20,y:rand(100,250),fx:0,fy:0,type:10,col:0,row:0,
        state:'dive',alive:true,diveP:0,
        startX:side===1?W+20:-20,startY:rand(100,250),
        targetX:clamp(player.x+rand(-80,80),40,W-40),targetY:H+40,
        amp:rand(30,60),diveSpd:0.0007+wave*0.00003,retP:0,retSpd:0,
        shootT:99999,pts:250,color:'#f4f',divePattern:randInt(1,2),
        wingPhase:0,formationOffset:{x:0,y:0},hp:3,phantom:true
      });
    }
  }

  for(let e of enemies){
    if(!e.alive)continue;
    e.wingPhase+=dt*0.004*freezeMult;

    if(e.boss){
      if(e.state==='enter'){
        e.enterP=Math.min(1,e.enterP+dt*0.0008);
        e.y=lerp(-60,80,e.enterP*e.enterP);
        if(e.enterP>=1)e.state='formation';
        continue;
      }
      const hpRatio=e.bossHP/e.bossMaxHP;
      e.bossPhase=hpRatio>0.66?0:hpRatio>0.33?1:2;

      if(e.bossType===3){
        e.shieldAngle=(e.shieldAngle||0)+dt*0.003*freezeMult;
        e.bossTimer+=dt*freezeMult;
        if(e.bossTimer>(1500-e.bossPhase*300)){
          const patterns=e.bossPhase===0?[0,1]:e.bossPhase===1?[1,2]:[0,1,2,3];
          bossFirePattern(e.x,e.y,patterns[randInt(0,patterns.length-1)],e.bossPhase,px,player.y,3);
          e.bossTimer=0;
        }
        if(e.bossPhase>=1&&Math.random()<0.003*freezeMult){
          spawnPowerup(e.x+rand(-50,50),e.y+rand(-20,20));
        }
        const yOff=Math.sin(e.bossTimer*0.004*freezeMult)*15;
        e.y=e.fy+Math.sin(e.bossTimer*0.003*freezeMult)*20+yOff;
        continue;
      }

      if(e.bossType===2){
        e.teleportTimer+=dt*freezeMult;
        if(e.bossPhase===0&&e.teleportTimer>3000){
          const spots=[{x:cx-100,y:120},{x:cx+100,y:120},{x:cx,y:200},{x:cx-80,y:160},{x:cx+80,y:160}];
          const spot=spots[randInt(0,spots.length-1)];
          spawnRing(e.x,e.y,'#a0f',15,40);spawnParticles(e.x,e.y,20,'#a0f',5,20,3);
          e.x=spot.x;e.y=spot.y;
          spawnRing(e.x,e.y,'#a0f',15,50);spawnParticles(e.x,e.y,20,'#a0f',5,30,4);
          e.teleportTimer=0;playSound(300,0.3,'sawtooth',0.08);
        }
        if(e.bossPhase>=1&&e.teleportTimer>2000){
          const spot={x:rand(60,W-60),y:rand(80,220)};
          spawnRing(e.x,e.y,'#a0f',20,50);spawnParticles(e.x,e.y,30,'#a0f',6,25,4);
          e.x=spot.x;e.y=spot.y;
          spawnRing(e.x,e.y,'#a0f',20,60);spawnParticles(e.x,e.y,30,'#a0f',6,35,5);
          e.teleportTimer=0;shake(4);playSound(200,0.4,'sawtooth',0.1);
        }
        if(e.bossPhase>=2){
          for(let i=eBullets.length-1;i>=0;i--){
            const b=eBullets[i],d=dist(e.x,e.y,b.x,b.y);
            if(d<100&&d>3){b.vx+=(e.x-b.x)/d*0.03;b.vy+=(e.y-b.y)/d*0.03}
          }
          for(const a of asteroids){
            if(!a.alive)continue;
            const d=dist(e.x,e.y,a.x,a.y);
            if(d<120){a.vx+=(e.x-a.x)/d*0.004;a.vy+=(e.y-a.y)/d*0.004}
          }
        }
      }

      if(e.bossType===4){
        e.bossTimer+=dt*freezeMult;
        const yOff=Math.sin(e.bossTimer*0.003*freezeMult)*25;
        e.y=e.fy+Math.sin(e.bossTimer*0.002*freezeMult)*30+yOff;
        e.x=lerp(e.x,cx+Math.sin(e.bossTimer*0.0015)*50,0.02);
        if(e.bossTimer>(1200-e.bossPhase*200)){
          const patterns=e.bossPhase===0?[0,1]:e.bossPhase===1?[1,2,3]:[0,1,2,3];
          bossFirePattern(e.x,e.y,patterns[randInt(0,patterns.length-1)],e.bossPhase,px,player.y,4);
          e.bossTimer=0;
        }
        if(e.bossPhase>=1){
          e.minionTimer=(e.minionTimer||2000)-dt*freezeMult;
          if(e.minionTimer<=0&&(e.megaMinions||0)<4){
            e.megaMinions=(e.megaMinions||0)+1;
            e.minionTimer=2000-e.bossPhase*300;
            const bType=randInt(0,1)===0?1:2;
            enemies.push({
              x:e.x+rand(-60,60),y:e.y+30,fx:0,fy:0,type:bType===1?5:0,col:0,row:0,
              state:'dive',alive:true,diveP:0,
              startX:e.x+rand(-60,60),startY:e.y+30,
              targetX:px+rand(-80,80),targetY:H+40,
              amp:rand(30,50),diveSpd:0.0008,retP:0,retSpd:0,
              shootT:99999,pts:200,color:bType===1?'#fa0':'#f64',
              divePattern:randInt(0,3),wingPhase:0,formationOffset:{x:0,y:0}
            });
          }
        }
        if(e.bossPhase>=2&&Math.random()<0.003*freezeMult){
          if(eBullets.length<20){
            const side=Math.random()>0.5?1:-1;
            enemies.push({
              x:e.x+side*80,y:e.y+20,fx:0,fy:0,type:11,col:0,row:0,
              state:'dive',alive:true,diveP:0,
              startX:e.x+side*80,startY:e.y+20,
              targetX:px+rand(-60,60),targetY:H+40,
              amp:0,diveSpd:0.001,retP:0,retSpd:0,
              shootT:99999,pts:350,color:'#f80',
              divePattern:3,wingPhase:0,formationOffset:{x:0,y:0},hp:4
            });
          }
        }
        if(e.bossPhase===0&&Math.random()<0.002*freezeMult)spawnPowerup(e.x+rand(-40,40),e.y+rand(-20,20));
        continue;
      }

      e.bossTimer+=dt*freezeMult;
      if(e.bossTimer>(1200-e.bossPhase*200)){
        const patterns=e.bossType===2?(e.bossPhase===0?[0,1]:e.bossPhase===1?[1,2]:[0,1,2,3]):(e.bossPhase===0?[0,1]:e.bossPhase===1?[0,1,2]:[0,1,2,3]);
        bossFirePattern(e.x,e.y,patterns[randInt(0,patterns.length-1)],e.bossPhase,px,player.y,e.bossType);
        e.bossTimer=0;
        if(e.bossPhase>=1&&e.bossType!==2){
          e.minionTimer-=dt*freezeMult;
          if(e.minionTimer<=0){
            e.minionTimer=(3000-e.bossPhase*800);
            enemies.push({
              x:e.x+rand(-40,40),y:e.y+20,fx:0,fy:0,type:4,col:0,row:0,
              state:'dive',alive:true,diveP:0,
              startX:e.x+rand(-40,40),startY:e.y+20,
              targetX:px+rand(-60,60),targetY:H+50,
              amp:rand(20,40),diveSpd:0.0008,retP:0,retSpd:0,
              shootT:2000,pts:200,color:e.bossType===1?'#fa0':'#f80',
              divePattern:randInt(0,2),wingPhase:0,formationOffset:{x:0,y:0}
            });
            playCarrierSpawn();
          }
        }
      }
      const yOff=e.bossPhase===0?0:e.bossPhase===1?Math.sin(e.bossTimer*0.005*freezeMult)*15:Math.sin(e.bossTimer*0.008*freezeMult)*25;
      e.y=e.fy+Math.sin(e.bossTimer*0.003*freezeMult)*20+yOff;
      continue;
    }

    if(e.state==='formation'){
      const fp=formationPattern;
      let ox=0,oy=0;
      if(fp===1){ox=Math.sin(formationPatternTimer*0.002+e.col*0.5)*20}
      else if(fp===2){
        const a=formationPatternTimer*0.001+(e.row*0.8+e.col*0.6);
        ox=Math.cos(a)*25;oy=Math.sin(a)*15;
      }else if(fp===3){
        const t=formationPatternTimer*0.0015;
        ox=Math.sin(t+e.col*1.2)*15+Math.cos(t*1.3+e.row*0.9)*10;
        oy=Math.sin(t*0.8+e.row*1.1)*10+Math.cos(t+e.col*0.7)*8;
      }
      e.x=e.fx+fOff+ox;
      e.y=e.fy+oy;

      if(e.carrier){
        e.minionTimer-=dt*freezeMult;
        if(e.minionTimer<=0&&e.minionCount<5){
          e.minionTimer=3000;e.minionCount++;
          enemies.push({
            x:e.x+rand(-15,15),y:e.y+10,fx:0,fy:0,type:4,col:0,row:0,
            state:'dive',alive:true,diveP:0,
            startX:e.x+rand(-15,15),startY:e.y+10,
            targetX:px+rand(-40,40),targetY:H+20,
            amp:rand(20,40),diveSpd:0.0008,retP:0,retSpd:0,
            shootT:2000,pts:150,color:'#fa0',divePattern:2,wingPhase:0,formationOffset:{x:0,y:0}
          });
          playCarrierSpawn();
        }
      }
    }
    else if(e.state==='dive'){
      e.diveP+=e.diveSpd*dt*freezeMult;
      if(e.diveP>=1){
        e.diveP=1;
        if(e.type===4||e.type===5||e.type===7||e.type===12||e.type===13||e.type===14){e.alive=false;continue;}
        if(e.beamer||e.type===11){e.retP=0;e.startX=e.x;e.startY=e.y;e.state='return';continue;}
        e.retP=0;e.startX=e.x;e.startY=e.y;
        e.state='return';continue;
      }
      const t=e.diveP;
      if(e.type===12){
        e.x=lerp(e.startX,e.targetX,t);
        e.y=lerp(e.startY,e.targetY,t);
        if(player.active&&dist(e.x,e.y,player.x,player.y)<18){
          if(hasShield){hasShield=false;shieldIsReflect=false;spawnParticles(player.x,player.y,10,'#08f',4,20);playHit();addPopup(player.x,player.y-20,'SHIELD BROKEN!','#f44');e.alive=false;spawnParticles(e.x,e.y,15,'#f44',4,25);continue;}
          spawnParticles(e.x,e.y,15,'#f44',4,25);e.alive=false;playerHit();
        }
        continue;
      }
      if(e.type===13){
        e.targetX=lerp(e.targetX,player.x,0.03);
        e.targetY=lerp(e.targetY,player.y,0.03);
        e.x=lerp(e.startX,e.targetX,t)+Math.sin(t*Math.PI*6)*15;
        e.y=lerp(e.startY,e.targetY,t);
        if(player.active&&dist(e.x,e.y,player.x,player.y)<20){
          if(hasShield){hasShield=false;shieldIsReflect=false;spawnParticles(player.x,player.y,10,'#08f',4,20);playHit();addPopup(player.x,player.y-20,'SHIELD BROKEN!','#f44');e.alive=false;spawnExplosion(e.x,e.y,'#f44',15);shake(4);continue;}
          spawnExplosion(e.x,e.y,'#f44',20);e.alive=false;playerHit();
        }
        if(Math.random()<0.005){fireBullet(e.x,e.y,0,2,true,'#f44')}
        continue;
      }
      if(e.type===14){
        e.x=lerp(e.startX,e.targetX,t)+Math.cos(t*Math.PI*3)*40;
        e.y=lerp(e.startY,e.targetY,t)-Math.sin(t*Math.PI*2)*20;
        e.phaseShift=(e.phaseShift||0)+dt*0.003;
        if(e.phaseShift>1)e.phaseShift=0;
        if(t>0.2&&t<0.8&&eBullets.length<10){
          e.shootT=(e.shootT||2000)-dt*freezeMult;
          if(e.shootT<=0){
            for(let h=0;h<4;h++){
              const ha=(Math.PI*2/4)*h+Date.now()*0.004;
              fireBullet(e.x,e.y,Math.cos(ha)*2.5,Math.sin(ha)*2.5,true,'#8cf');
            }
            e.shootT=2000;
          }
        }
        continue;
      }
      if(e.type===11){
        e.x=lerp(e.startX,e.targetX,t)+Math.sin(t*Math.PI*4)*30;
        e.y=lerp(e.startY,e.targetY,t)-Math.sin(t*Math.PI)*20;
        continue;
      }
      if(e.divePattern===0){
        e.x=e.startX+(e.targetX-e.startX)*t+Math.sin(t*Math.PI*2)*e.amp*(1-t*0.8);
        e.y=e.startY+(e.targetY-e.startY)*t*t;
      }else if(e.divePattern===1){
        e.x=e.startX+(e.targetX-e.startX)*t+Math.sin(t*Math.PI*4)*e.amp*0.6*(1-t);
        e.y=e.startY+(e.targetY-e.startY)*t+Math.sin(t*Math.PI*2)*40*(1-t);
      }else if(e.divePattern===2){
        e.x=e.startX+(e.targetX-e.startX)*t+Math.sin(t*Math.PI*8)*e.amp*0.4;
        e.y=e.startY+(e.targetY-e.startY)*t*t;
      }else if(e.divePattern===3){
        const arc=1-Math.cos(t*Math.PI*0.5);
        e.x=e.startX+(e.targetX-e.startX)*arc;
        e.y=e.startY+(e.targetY-e.startY)*t-Math.sin(t*Math.PI)*50;
      }

      if(e.beamer){
        e.targetX=player.x;
        if(t>0.3&&t<0.9){
          e.chargeT+=dt*freezeMult;
          if(!e.charging&&e.chargeT>1500){e.charging=true;e.chargeT=0}
          if(e.charging){
            e.chargeT+=dt*freezeMult;
            if(e.chargeT>300){spawnLaserBeam(e.x,e.y,player.x,player.y,'#f4f');e.chargeT=0;e.charging=false}
          }
        }
        continue;
      }

      if(e.type===9&&t>0.3&&t<0.8&&eBullets.length<12){
        e.shootT=(e.shootT||1500)-dt*freezeMult;
        if(e.shootT<=0){
          for(let h=0;h<6;h++){
            const ha=(Math.PI*2/6)*h+Date.now()*0.005;
            fireBullet(e.x,e.y,Math.cos(ha)*2.5,Math.sin(ha)*2.5,true,'#0ff');
          }
          e.shootT=1500-Math.min(wave*50,600);
        }
        continue;
      }

      if(e.type===10&&t>0.4&&t<0.85){
        const visible=Math.sin(Date.now()*0.003)>0;
        if(visible){
          e.shootT=(e.shootT||2000)-dt*freezeMult;
          if(e.shootT<=0&&eBullets.length<10){
            const dx=player.x-e.x,dy=player.y-e.y,len=Math.hypot(dx,dy);
            if(len>0)fireBullet(e.x,e.y,(dx/len)*2.5+rand(-0.3,0.3),(dy/len)*2.5+rand(-0.3,0.3),true,'#f4f',{gravity:true,gravityStrength:0.0003});
            e.shootT=2000;
          }
        }
        continue;
      }

      if(e.swarm&&t<0.1){e.targetX=player.x+rand(-80,80);e.targetY=player.y+rand(-50,50)}

      if(e.type!==4&&e.type!==5&&e.type!==6&&e.type!==7&&e.type!==8&&e.type!==11&&e.type!==12&&eBullets.length<8&&t>0.15&&t<0.85){
        e.shootT-=dt*freezeMult;
        if(e.shootT<=0){fireBullet(e.x,e.y+8,rand(-0.5,0.5),2.5+wave*0.2,true,'#f44');e.shootT=rand(0.8,2)*1000}
      }else if(e.type===5&&t>0.3){e.targetX=player.x;e.targetY=player.y}
    }
    else if(e.state==='return'){
      e.retP+=e.retSpd*dt*freezeMult;
      if(e.retP>=1){e.retP=1;e.x=e.fx+fOff;e.y=e.fy;e.state='formation';e.diveP=0;continue}
      e.x=lerp(e.startX,e.fx+fOff,t=e.retP);
      e.y=lerp(e.startY,e.fy,t);
    }
  }

  diveTimer-=dt*freezeMult;
  if(!diving&&diveTimer<=0&&!enemies.some(e=>e.boss)){
    const ava=enemies.filter(e=>e.alive&&e.state==='formation'&&!e.carrier&&!e.shieldGuard);
    if(ava.length>0){
      const cnt=Math.min(1+(wave>1&&Math.random()<0.4?1:0)+(wave>3&&Math.random()<0.3?1:0),ava.length);
      for(let i=0;i<cnt;i++){
        if(ava.length===0)break;
        const idx=randInt(0,ava.length-1);
        startDive(ava[idx],px);
        ava.splice(idx,1);
      }
      diveTimer=rand(1.5,4)*1000;
    }
  }
}

// ===================== TESLA EFFECT =====================
let teslaBolts=[];
function triggerTesla(){
  if(powerup!=='tesla'||!player.active)return;
  const targets=[];
  for(const e of enemies){if(!e.alive)continue;if(dist(player.x,player.y,e.x,e.y)<150)targets.push(e)}
  if(targets.length===0)return;
  const hit=targets.slice(0,3);
  for(const e of hit){
    const pts=Math.floor(e.pts*0.3);score+=pts;
    if(e.boss){e.bossHP=Math.max(0,e.bossHP-2);spawnParticles(e.x,e.y,8,'#fe0',3,15)}
    else{e.alive=false;spawnExplosion(e.x,e.y,'#fe0',12);shake(2)}
    addPopup(e.x,e.y-10,'+'+pts,'#fe0');
    teslaBolts.push({x1:player.x,y1:player.y-16,x2:e.x,y2:e.y,life:8,maxLife:8});
    playZap();
  }
  flash(0.2,'#fe0');
}

function drawTeslaBolts(){
  for(let i=teslaBolts.length-1;i>=0;i--){
    const tb=teslaBolts[i];tb.life--;
    const alpha=tb.life/tb.maxLife;
    ctx.globalAlpha=alpha;ctx.shadowBlur=15;ctx.shadowColor='#fe0';
    ctx.strokeStyle='#fe0';ctx.lineWidth=2*alpha;
    ctx.beginPath();ctx.moveTo(tb.x1,tb.y1);
    for(let s=1;s<=5;s++){
      const t=s/5;
      ctx.lineTo(tb.x1+(tb.x2-tb.x1)*t+rand(-10,10)*(1-t),tb.y1+(tb.y2-tb.y1)*t+rand(-10,10)*(1-t));
    }
    ctx.stroke();ctx.strokeStyle='#fff';ctx.lineWidth=1*alpha;
    ctx.beginPath();ctx.moveTo(tb.x1,tb.y1);
    for(let s=1;s<=5;s++){
      const t=s/5;
      ctx.lineTo(tb.x1+(tb.x2-tb.x1)*t+rand(-10,10)*(1-t),tb.y1+(tb.y2-tb.y1)*t+rand(-10,10)*(1-t));
    }
    ctx.stroke();ctx.shadowBlur=0;ctx.globalAlpha=1;
    if(tb.life<=0)teslaBolts.splice(i,1);
  }
}

// ===================== RISK BONUS =====================
function getRiskBonus(){
  if(!player.active)return 1;
  let minDist=Infinity;
  for(const e of enemies){
    if(!e.alive)continue;
    const d=dist(player.x,player.y,e.x,e.y);
    if(d<minDist)minDist=d;
  }
  if(minDist<50)return 3;
  if(minDist<100)return 2;
  if(minDist<180)return 1.5;
  return 1;
}

// ===================== ENEMY DRAWING =====================
function drawEnemies(){
  for(const e of enemies){
    if(!e.alive)continue;
    if(freezeTimer>0&&e.state!=='formation'){
      ctx.fillStyle='rgba(136,200,255,0.08)';ctx.fillRect(e.x-16,e.y-16,32,32);
    }
    ctx.save();ctx.translate(e.x,e.y);

    if(e.boss){
      if(e.bossType===4)drawMegaBoss(e);
      else if(e.bossType===3)drawCrystalBoss(e);
      else if(e.bossType===2)drawVoidBoss(e);
      else if(e.bossType===1)drawHiveBoss(e);
      else drawNormalBoss(e);
      ctx.restore();continue;
    }

    if(e.type===11){
      const col=freezeTimer>0?'#8cf':'#f80';
      ctx.shadowBlur=15;ctx.shadowColor=col;ctx.fillStyle=col;
      ctx.beginPath();
      ctx.moveTo(0,-12);ctx.lineTo(-10,4);ctx.lineTo(-8,12);
      ctx.lineTo(-3,8);ctx.lineTo(3,8);ctx.lineTo(8,12);
      ctx.lineTo(10,4);ctx.closePath();ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(-10,4);ctx.lineTo(-8,12);
      ctx.lineTo(-3,8);ctx.lineTo(3,8);ctx.lineTo(8,12);ctx.lineTo(10,4);
      ctx.closePath();ctx.stroke();
      ctx.strokeStyle='rgba(255,136,0,'+(0.2+0.2*Math.sin(Date.now()*0.005))+')';
      ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,16,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;ctx.restore();continue;
    }

    if(e.type===12){
      const col=freezeTimer>0?'#8cf':'#f44';
      ctx.shadowBlur=12;ctx.shadowColor=col;
      const pulse=0.8+0.3*Math.sin(Date.now()*0.008);
      ctx.fillStyle=col;
      ctx.beginPath();
      ctx.moveTo(0,-10*pulse);ctx.lineTo(-8,6);ctx.lineTo(-3,10);
      ctx.lineTo(3,10);ctx.lineTo(8,6);
      ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.beginPath();ctx.arc(0,2,2,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;ctx.restore();continue;
    }

    if(e.type===13){
      const col=freezeTimer>0?'#8cf':'#f44';
      ctx.shadowBlur=20;ctx.shadowColor=col;
      ctx.fillStyle=col;
      const r=0.8+0.3*Math.sin(Date.now()*0.01);
      ctx.beginPath();
      ctx.moveTo(0,-12*r);ctx.lineTo(-10,8);ctx.lineTo(-5,12*r);
      ctx.lineTo(5,12*r);ctx.lineTo(10,8);
      ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,200,0,0.6)';
      ctx.beginPath();ctx.arc(0,2,3,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;ctx.restore();continue;
    }

    if(e.type===14){
      const col=freezeTimer>0?'#8cf':'#8cf';
      const visible=Math.sin(Date.now()*0.004)>-0.2||freezeTimer>0;
      if(!visible){ctx.globalAlpha=0.1;ctx.restore();continue;}
      ctx.shadowBlur=15;ctx.shadowColor=col;
      ctx.fillStyle=col;
      ctx.globalAlpha=0.7+0.3*Math.sin(Date.now()*0.005);
      ctx.beginPath();
      for(let i=0;i<6;i++){
        const a=(Math.PI/3)*i+Date.now()*0.003,r=8+Math.sin(Date.now()*0.006+i*2)*3;
        i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }
      ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
      ctx.shadowBlur=0;ctx.restore();continue;
    }

    if(e.type===4){
      ctx.fillStyle=freezeTimer>0?'#8cf':'#fa0';ctx.shadowBlur=8;ctx.shadowColor=freezeTimer>0?'#8cf':'#fa0';
      ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(-6,4);ctx.lineTo(0,6);ctx.lineTo(6,4);
      ctx.closePath();ctx.fill();ctx.shadowBlur=0;ctx.restore();continue;
    }

    if(e.type===5){
      ctx.fillStyle=freezeTimer>0?'#8cf':(e.color||'#fa0');ctx.shadowBlur=10;ctx.shadowColor=freezeTimer>0?'#8cf':(e.color||'#fa0');
      ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(-8,-2);ctx.lineTo(-6,8);
      ctx.lineTo(-2,6);ctx.lineTo(0,10);ctx.lineTo(2,6);
      ctx.lineTo(6,8);ctx.lineTo(8,-2);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(-2,-2,4,4);
      ctx.shadowBlur=0;ctx.restore();continue;
    }

    if(e.type===6){
      ctx.fillStyle=freezeTimer>0?'#8cf':(e.color||'#f8f');ctx.shadowBlur=12;ctx.shadowColor=freezeTimer>0?'#8cf':(e.color||'#f8f');
      ctx.beginPath();const wf=Math.sin(e.wingPhase)*2;
      ctx.moveTo(0,-14-wf);ctx.lineTo(-12,0);ctx.lineTo(-10,10);
      ctx.lineTo(-4,8);ctx.lineTo(0,12);ctx.lineTo(4,8);
      ctx.lineTo(10,10);ctx.lineTo(12,0);ctx.closePath();ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,-14-wf);ctx.lineTo(-12,0);ctx.lineTo(-10,10);
      ctx.lineTo(-4,8);ctx.lineTo(0,12);ctx.lineTo(4,8);
      ctx.lineTo(10,10);ctx.lineTo(12,0);ctx.closePath();ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(-2,-3,4,6);
      if(e.hp>1){ctx.fillStyle='#fff';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText(e.hp+'',0,4)}
      ctx.shadowBlur=0;ctx.restore();continue;
    }

    if(e.type===7){
      ctx.fillStyle=freezeTimer>0?'#8cf':'#0f8';ctx.shadowBlur=8;ctx.shadowColor=freezeTimer>0?'#8cf':'#0f8';
      ctx.beginPath();ctx.moveTo(0,-7);ctx.lineTo(-5,4);ctx.lineTo(-2,6);ctx.lineTo(2,6);ctx.lineTo(5,4);
      ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(0,1,2,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;ctx.restore();continue;
    }

    if(e.type===8){
      const col=freezeTimer>0?'#8cf':'#f4f';
      ctx.fillStyle=col;ctx.shadowBlur=12;ctx.shadowColor=col;
      ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(-8,6);ctx.lineTo(-3,12);ctx.lineTo(3,12);ctx.lineTo(8,6);
      ctx.closePath();ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(-8,6);ctx.lineTo(-3,12);ctx.lineTo(3,12);ctx.lineTo(8,6);
      ctx.closePath();ctx.stroke();
      if(e.charging){ctx.fillStyle='#fff';ctx.globalAlpha=0.5+0.5*Math.sin(Date.now()*0.01);ctx.beginPath();ctx.arc(0,3,4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(-2,0,4,6);
      if(e.hp>1){ctx.fillStyle='#fff';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText(e.hp+'',0,14)}
      ctx.shadowBlur=0;ctx.restore();continue;
    }

    if(e.type===9){
      const col=freezeTimer>0?'#8cf':'#0ff';
      ctx.shadowBlur=15;ctx.shadowColor=col;ctx.fillStyle=col;
      ctx.rotate(Date.now()*0.003);
      for(let i=0;i<12;i++){
        const a=(Math.PI/6)*i,rad=i%2===0?12:7;
        i===0?ctx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad):ctx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
      }
      ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();
      ctx.rotate(-Date.now()*0.003);
      ctx.shadowBlur=0;ctx.restore();continue;
    }

    if(e.type===10){
      const visible=Math.sin(Date.now()*0.003)>0||freezeTimer>0;
      if(!visible){ctx.globalAlpha=0.15;ctx.restore();continue;}
      const col=freezeTimer>0?'#8cf':'#f4f';
      ctx.shadowBlur=12;ctx.shadowColor=col;ctx.fillStyle=col;
      ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(-8,6);ctx.lineTo(-4,10);ctx.lineTo(4,10);ctx.lineTo(8,6);
      ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;ctx.restore();continue;
    }

    const col=freezeTimer>0?'#8cf':e.color;
    ctx.shadowBlur=10;ctx.shadowColor=col;
    ctx.fillStyle=col;ctx.strokeStyle='#fff';ctx.lineWidth=1;
    const wf=Math.sin(e.wingPhase)*3;

    if(e.elite){
      ctx.shadowBlur=25;ctx.shadowColor='#fd0';
      ctx.strokeStyle='rgba(255,221,0,0.5)';ctx.lineWidth=1.5;
      for(let i=0;i<3;i++){
        const a=(e._eliteAngle||0)+Math.PI*2/3*i+Date.now()*0.002;
        ctx.beginPath();ctx.moveTo(Math.cos(a)*18,Math.sin(a)*18);
        ctx.lineTo(Math.cos(a)*22,Math.sin(a)*22);ctx.stroke();
      }
    }

    if(e.shieldGuard){
      ctx.shadowBlur=15;ctx.shadowColor='#f80';ctx.fillStyle='#f80';
      ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(-8,4);ctx.lineTo(-6,10);
      ctx.lineTo(-2,7);ctx.lineTo(2,7);ctx.lineTo(6,10);ctx.lineTo(8,4);
      ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,136,0,0.2)';ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(255,136,0,0.4)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.stroke();
      if(e.hp>1){ctx.fillStyle='#fff';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText(e.hp+'',0,4)}
      ctx.shadowBlur=0;ctx.restore();continue;
    }

    if(e.carrier){
      ctx.fillStyle=freezeTimer>0?'#8cf':'#8f0';ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(-14,0);ctx.lineTo(-16,12);
      ctx.lineTo(-10,8);ctx.lineTo(-6,14);ctx.lineTo(-3,10);
      ctx.lineTo(3,10);ctx.lineTo(6,14);ctx.lineTo(10,8);
      ctx.lineTo(16,12);ctx.lineTo(14,0);ctx.closePath();ctx.fill();ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(-6,-4,12,8);
      ctx.fillStyle='#0f0';ctx.shadowBlur=4;ctx.shadowColor='#0f0';
      ctx.fillRect(-8,14,4,2);ctx.fillRect(4,14,4,2);
      ctx.shadowBlur=0;ctx.restore();continue;
    }

    if(e.type===0){
      ctx.beginPath();ctx.moveTo(0,-16);ctx.lineTo(-10-wf,4);ctx.lineTo(-14,8);
      ctx.lineTo(-7,6);ctx.lineTo(-5,14);ctx.lineTo(-2,10);ctx.lineTo(2,10);
      ctx.lineTo(5,14);ctx.lineTo(7,6);ctx.lineTo(14,8);ctx.lineTo(10+wf,4);
      ctx.closePath();ctx.fill();ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();
    }else if(e.type===1){
      ctx.beginPath();ctx.moveTo(0,-14-wf);ctx.lineTo(-12,2);ctx.lineTo(-10,12);
      ctx.lineTo(-4,8);ctx.lineTo(4,8);ctx.lineTo(10,12);ctx.lineTo(12,2);
      ctx.closePath();ctx.fill();ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.25)';ctx.fillRect(-2,-4,4,6);
    }else{
      ctx.beginPath();ctx.moveTo(0,-12-wf);ctx.lineTo(-10,4);ctx.lineTo(-8,10);
      ctx.lineTo(-3,6);ctx.lineTo(3,6);ctx.lineTo(8,10);ctx.lineTo(10,4);
      ctx.closePath();ctx.fill();ctx.stroke();
    }
    ctx.shadowBlur=0;ctx.restore();
  }
}

  ctx.fillRect(-32,40,64,6);ctx.strokeRect(-32,40,64,6);
  ctx.fillStyle=hpRatio>0.5?'#0f0':hpRatio>0.25?'#ff0':'#f00';
  ctx.fillRect(-31,41,62*hpRatio,4);
  ctx.fillStyle='#fff';ctx.font='8px monospace';ctx.textAlign='center';
  ctx.fillText('MEGA BOSS PHASE '+(phase+1),0,54);
}
