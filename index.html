<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaga - Enhanced</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:monospace}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=480,H=640,cx=W/2;
c.width=W;c.height=H;

function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H);
  c.style.width=(W*s)+'px';c.style.height=(H*s)+'px';
}
window.addEventListener('resize',resize);resize();

const K={};
document.addEventListener('keydown',e=>{K[e.code]=1;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyX','KeyZ','ShiftLeft','ShiftRight'].includes(e.code))e.preventDefault()});
document.addEventListener('keyup',e=>K[e.code]=0);
document.addEventListener('mousedown',()=>{if(!audioCtx)initAudio()});

function rand(a,b){return Math.random()*(b-a)+a}
function randInt(a,b){return Math.floor(rand(a,b+1))}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function lerp(a,b,t){return a+(b-a)*t}
function dist(x1,y1,x2,y2){return Math.hypot(x2-x1,y2-y1)}

// ===================== PLANET BACKGROUND =====================
let planets=[];
function createPlanet(x,y,r,color1,color2){
  const pc=document.createElement('canvas');
  pc.width=r*2+20;pc.height=r*2+20;
  const pctx=pc.getContext('2d');
  const g=pctx.createRadialGradient(r+10,r+10,r*0.3,r+10,r+10,r+10);
  g.addColorStop(0,color1);g.addColorStop(0.7,color2);g.addColorStop(1,'rgba(0,0,0,0)');
  pctx.fillStyle=g;
  pctx.beginPath();pctx.arc(r+10,r+10,r,0,Math.PI*2);pctx.fill();
  for(let i=0;i<3+randInt(0,3);i++){
    const cx=rand(5,r*2-5),cy=rand(5,r*2-5);
    if(dist(cx,cy,r+10,r+10)>r*0.7)continue;
    const cg=pctx.createRadialGradient(cx,cy,0,cx,cy,rand(3,8));
    cg.addColorStop(0,'rgba(0,0,0,0.3)');cg.addColorStop(1,'rgba(0,0,0,0)');
    pctx.fillStyle=cg;
    pctx.beginPath();pctx.arc(cx,cy,rand(3,8),0,Math.PI*2);pctx.fill();
  }
  return{canvas:pc,x,y,r,speed:rand(0.02,0.06),alpha:rand(0.3,0.6)};
}

function initPlanets(){
  planets=[];
  planets.push(createPlanet(rand(50,W-50),rand(-80,-20),rand(30,50),'rgba(180,120,80,0.5)','rgba(100,60,30,0.2)'));
  planets.push(createPlanet(rand(50,W-50),rand(100,200),rand(20,35),'rgba(100,150,200,0.4)','rgba(30,60,100,0.15)'));
  planets.push(createPlanet(rand(50,W-50),rand(300,450),rand(25,45),'rgba(200,100,150,0.35)','rgba(80,30,60,0.15)'));
}

// ===================== AUDIO =====================
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playSound(freq,dur,type='square',vol=0.08){
  if(!audioCtx)return;
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type;o.frequency.setValueAtTime(freq,audioCtx.currentTime);
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function playShoot(){playSound(900,0.06,'square',0.04)}
function playExplosion(){playSound(180,0.25,'sawtooth',0.06);playSound(90,0.35,'square',0.04)}
function playPowerup(){playSound(660,0.08,'sine',0.06);setTimeout(()=>playSound(880,0.08,'sine',0.06),80);setTimeout(()=>playSound(1100,0.1,'sine',0.06),160)}
function playHit(){playSound(250,0.12,'sawtooth',0.08)}
function playBomb(){playSound(70,0.5,'sawtooth',0.1)}
function playBossWarn(){playSound(400,0.15,'square',0.08);setTimeout(()=>playSound(300,0.25,'square',0.08),200)}
function playBossHit(){playSound(220,0.08,'sawtooth',0.06)}
function playHoming(){playSound(1200,0.04,'sine',0.04);setTimeout(()=>playSound(1400,0.04,'sine',0.03),50)}
function playDroneFire(){playSound(1500,0.03,'sine',0.02)}
function playAsteroidHit(){playSound(140,0.15,'triangle',0.05)}
function playCarrierSpawn(){playSound(350,0.12,'square',0.05)}
function playUpgrade(){playSound(440,0.1,'sine',0.05);setTimeout(()=>playSound(660,0.1,'sine',0.05),100);setTimeout(()=>playSound(880,0.15,'sine',0.06),200)}
function playGravity(){playSound(160,0.4,'sine',0.04)}
function playSplit(){playSound(500,0.06,'square',0.05);playSound(400,0.1,'triangle',0.04)}
function playPierce(){playSound(2000,0.05,'sine',0.03)}
function playZap(){playSound(2200,0.06,'square',0.03);playSound(1800,0.08,'sawtooth',0.04)}
function playBoost(){playSound(350,0.12,'sine',0.05);playSound(520,0.1,'sine',0.04)}
function playFreeze(){playSound(600,0.15,'sine',0.04);setTimeout(()=>playSound(400,0.2,'sine',0.04),100)}
function playSwarm(){playSound(1400,0.04,'square',0.03)}

// ===================== BACKGROUND =====================
const nebCanvas=document.createElement('canvas');
nebCanvas.width=W;nebCanvas.height=H;
const nebCtx=nebCanvas.getContext('2d');
(function(){
  for(let i=0;i<8;i++){
    const g=nebCtx.createRadialGradient(rand(0,W),rand(0,H),0,rand(0,W),rand(0,H),rand(200,350));
    const colors=[['rgba(80,10,60,0.08)','rgba(10,30,80,0.05)','rgba(0,0,0,0)'],['rgba(60,30,10,0.06)','rgba(20,10,50,0.04)','rgba(0,0,0,0)'],['rgba(10,60,80,0.06)','rgba(40,5,30,0.04)','rgba(0,0,0,0)'],['rgba(70,5,30,0.05)','rgba(5,40,70,0.04)','rgba(0,0,0,0)'],['rgba(30,80,50,0.04)','rgba(60,10,40,0.03)','rgba(0,0,0,0)'],['rgba(80,60,10,0.04)','rgba(10,20,50,0.03)','rgba(0,0,0,0)'],['rgba(50,10,80,0.06)','rgba(10,40,60,0.04)','rgba(0,0,0,0)'],['rgba(80,20,30,0.05)','rgba(20,50,10,0.03)','rgba(0,0,0,0)']];
    const ci=i%colors.length;
    g.addColorStop(0,colors[ci][0]);g.addColorStop(0.5,colors[ci][1]);g.addColorStop(1,colors[ci][2]);
    nebCtx.fillStyle=g;nebCtx.fillRect(0,0,W,H);
  }
  for(let i=0;i<30;i++){
    const g=nebCtx.createRadialGradient(rand(0,W),rand(0,H),0,rand(0,W),rand(0,H),rand(10,50));
    g.addColorStop(0,'rgba(255,255,255,0.03)');g.addColorStop(1,'rgba(0,0,0,0)');
    nebCtx.fillStyle=g;nebCtx.fillRect(0,0,W,H);
  }
})();

let stars=[];
function initStars(){
  stars=[];
  for(let i=0;i<60;i++)stars.push({x:rand(0,W),y:rand(0,H),s:rand(0.5,1),v:rand(0.1,0.25),b:rand(0.2,0.4),l:0});
  for(let i=0;i<40;i++)stars.push({x:rand(0,W),y:rand(0,H),s:rand(1,1.8),v:rand(0.3,0.6),b:rand(0.3,0.6),l:1});
  for(let i=0;i<20;i++)stars.push({x:rand(0,W),y:rand(0,H),s:rand(1.8,3),v:rand(0.7,1.3),b:rand(0.5,0.9),l:2,t:rand(0,Math.PI*2)});
  // Shooting stars
  for(let i=0;i<3;i++)stars.push({x:rand(0,W),y:rand(0,H),s:rand(1,2),v:rand(3,6),b:1,l:3,t:rand(0,Math.PI*2),a:0});
}
initStars();
initPlanets();

function updateStars(){
  for(const s of stars){
    if(s.l===3){
      s.x+=Math.cos(s.t)*s.v;s.y+=Math.sin(s.t)*s.v;
      s.a+=0.02;
      if(s.a>1||s.x<-50||s.x>W+50||s.y<-50||s.y>H+50){s.x=rand(0,W);s.y=rand(-100,-20);s.t=rand(-0.5,0.5);s.a=0;}
      continue;
    }
    s.y+=s.v*(1+s.l*0.3);
    if(s.y>H+5){s.y=-5;s.x=rand(0,W);s.t=rand(0,Math.PI*2)}
    if(s.l===2)s.t+=0.02;
  }
}

function drawStars(){
  for(const s of stars){
    if(s.l===3){
      const alpha=Math.sin(s.a*Math.PI)*0.6;
      ctx.globalAlpha=alpha;
      ctx.strokeStyle='#aaf';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-Math.cos(s.t)*s.v*6,s.y-Math.sin(s.t)*s.v*6);ctx.stroke();
      ctx.globalAlpha=1;
      continue;
    }
    const twinkle=s.l===2?0.6+0.4*Math.sin(s.t):1;
    ctx.globalAlpha=clamp((0.2+s.b*0.5)*twinkle,0,1);
    if(s.l===2){ctx.shadowBlur=6;ctx.shadowColor='#fff';ctx.fillStyle='#aef';}else{ctx.fillStyle='#fff'}
    ctx.fillRect(s.l===2?s.x-s.s/2:s.x,s.l===2?s.y-s.s/2:s.y,s.s,s.s);
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
}

function drawPlanets(){
  for(const p of planets){
    p.y+=p.speed;
    if(p.y>H+p.r){p.y=-p.r;p.x=rand(50,W-50)}
    ctx.globalAlpha=p.alpha;
    ctx.drawImage(p.canvas,p.x-p.r-10,p.y-p.r-10);
  }
  ctx.globalAlpha=1;
}

// ===================== SCREEN SHAKE =====================
let shakeX=0,shakeY=0,shakeI=0;
function shake(v){shakeI=Math.max(shakeI,v)}
function updateShake(dt){
  if(shakeI>0.5){shakeX=rand(-shakeI,shakeI);shakeY=rand(-shakeI,shakeI);shakeI*=0.88}
  else{shakeX=0;shakeY=0;shakeI=0}
}

// ===================== SCREEN FLASH =====================
let flashAlpha=0,flashColor='#fff';
function flash(v,color){flashAlpha=Math.max(flashAlpha,v);flashColor=color||'#fff'}
function updateFlash(dt){flashAlpha*=0.92;if(flashAlpha<0.01)flashAlpha=0}

// ===================== PARTICLES =====================
let particles=[];

function spawnParticles(x,y,count,color,speed=3,life=40,size=3,spread=1){
  for(let i=0;i<count;i++){
    const a=rand(0,Math.PI*2),spd=rand(0.3,speed*spread);
    const c=Array.isArray(color)?color[randInt(0,color.length-1)]:color;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:rand(life*0.4,life),maxLife:life,color:c,size:rand(size*0.4,size),decay:rand(0.92,0.98),spark:Math.random()<0.2,glow:Math.random()<0.15});
  }
}

function spawnRing(x,y,color,count=20,maxR=40){
  for(let i=0;i<count;i++){
    const a=(Math.PI*2/count)*i;
    particles.push({x,y,vx:0,vy:0,life:30,maxLife:30,color,size:2.5,ring:true,angle:a,radius:5,maxR});
  }
}

function spawnExplosion(x,y,color,count=30){
  spawnParticles(x,y,count,color,5,35,3);
  spawnParticles(x,y,count*0.5,['#fff','#ff0'],4,25,2);
  spawnRing(x,y,color,15,30);
  spawnRing(x,y,'#fff',10,40);
  // Glow burst
  particles.push({x,y,vx:0,vy:0,life:8,maxLife:8,color:'rgba(255,255,255,0.3)',size:1,decay:1,spark:false,ring:false,glow:true,burst:true,burstR:0,maxR:50});
}

function spawnDebris(x,y,color){
  for(let i=0;i<3;i++){
    particles.push({x,y,vx:rand(-2,2),vy:rand(-2,2),life:50,maxLife:50,color,size:rand(2,5),decay:0.98,spark:false,ring:false,glow:false,rot:rand(0,Math.PI*2),rSpd:rand(-0.05,0.05)});
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    if(p.burst){p.burstR+=(p.maxR-p.burstR)*0.15;ctx.globalAlpha=p.life/p.maxLife;continue;}
    if(p.rot!==undefined)p.rot+=p.rSpd||0;
    if(!p.ring){p.vy+=0.04;p.vx*=p.decay;p.vy*=p.decay}
    else{p.radius+=(p.maxR-p.radius)*0.08}
    p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}

function drawParticles(){
  for(const p of particles){
    const alpha=clamp(p.life/p.maxLife,0,1);
    ctx.globalAlpha=alpha;
    if(p.glow&&p.glow===true&&p.burst){
      ctx.shadowBlur=20;ctx.shadowColor='#fff';
      ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(p.x,p.y,p.burstR,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;
    }else if(p.ring){
      ctx.shadowBlur=8;ctx.shadowColor=p.color;
      ctx.strokeStyle=p.color;ctx.lineWidth=p.size*alpha;
      ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;
    }else if(p.spark){
      ctx.shadowBlur=8;ctx.shadowColor='#fff';
      ctx.fillStyle='#fff';
      ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size*2,p.size*0.5);
      ctx.shadowBlur=0;
    }else if(p.glow){
      ctx.shadowBlur=12;ctx.shadowColor=p.color;
      ctx.fillStyle=p.color;
      ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
      ctx.shadowBlur=0;
    }else if(p.rot!==undefined){
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.fillStyle=p.color;ctx.globalAlpha=alpha*0.6;
      ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
      ctx.restore();
    }else{
      ctx.fillStyle=p.color;
      ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    }
  }
  ctx.globalAlpha=1;
}

// ===================== SCORE POPUPS =====================
let popups=[];
function addPopup(x,y,text,color='#ff0',size=14){
  popups.push({x,y,text,color,life:50,maxLife:50,vy:-2,size});
}
function updatePopups(){
  for(let i=popups.length-1;i>=0;i--){
    const p=popups[i];
    p.y+=p.vy;p.life--;p.vy*=0.97;
    if(p.life<=0)popups.splice(i,1);
  }
}
function drawPopups(){
  for(const p of popups){
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.shadowBlur=10;ctx.shadowColor=p.color;
    ctx.fillStyle=p.color;ctx.font=`bold ${p.size}px monospace`;ctx.textAlign='center';
    ctx.fillText(p.text,p.x,p.y);
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
}

// ===================== BULLETS =====================
let pBullets=[],eBullets=[];
let freezeTimer=0;

function fireBullet(x,y,vx,vy,isEnemy,color,opts){
  const b={x,y,vx,vy,w:isEnemy?4:3,h:isEnemy?8:10,isEnemy,color:color||(isEnemy?'#f44':'#0ff'),trail:[]};
  b.age=0;
  if(opts){
    if(opts.homing)b.homing=true,b.turnRate=opts.turnRate||0.06,b.homingTarget=null;
    if(opts.gravity)b.gravity=true,b.gravityStrength=opts.gravityStrength||0.0004;
  }
  isEnemy?eBullets.push(b):pBullets.push(b);
  if(!isEnemy&&!opts?.silent)playShoot();
}

function playerFire(x,y){
  if(freezeTimer>0&&powerup==='freeze'){freezeTimer=0;powerup=null;powerupTimer=0;return}
  if(powerup==='spread'){
    fireBullet(x,y,0,-9,false,'#0ff');
    fireBullet(x-6,y-2,-1.2,-8.5,false,'#0ff');
    fireBullet(x+6,y-2,1.2,-8.5,false,'#0ff');
    fireBullet(x-12,y-4,-2.4,-7,false,'#0ff');
    fireBullet(x+12,y-4,2.4,-7,false,'#0ff');
  }else if(powerup==='double'){
    fireBullet(x-7,y,0,-9,false,'#0ff');
    fireBullet(x+7,y,0,-9,false,'#0ff');
  }else if(powerup==='laser'){
    fireBullet(x,y,0,-14,false,'#f0f');
    fireBullet(x,y,0,-14,false,'#f0f');
  }else if(powerup==='homing'){
    fireBullet(x-4,y,0,-6,false,'#f80',{homing:true,turnRate:0.08});
    fireBullet(x+4,y,0,-6,false,'#f80',{homing:true,turnRate:0.08});
    playHoming();
  }else if(powerup==='pierce'){
    fireBullet(x,y,0,-10,false,'#ff8',{pierce:true});
    playPierce();
  }else if(powerup==='tesla'){
    fireBullet(x,y,0,-10,false,'#fe0');
    fireBullet(x-6,y-1,-0.8,-9.5,false,'#fe0');
    fireBullet(x+6,y-1,0.8,-9.5,false,'#fe0');
  }else{
    fireBullet(x,y,0,-8,false,'#0ff');
  }
}

function bossFirePattern(x,y,pattern,bossPhase,px,py,bossType){
  const spd=2.5+bossPhase*0.5;
  bossType=bossType||0;
  if(bossType===1){
    // Hive boss pattern
    if(pattern===0){
      const dx=px-x,dy=py-y,len=Math.hypot(dx,dy);
      if(len>0)fireBullet(x,y,(dx/len)*spd*0.8,(dy/len)*spd*0.8,true,'#f80');
    }else if(pattern===1){
      const count=8+bossPhase*2;
      for(let i=0;i<count;i++){
        const a=(Math.PI*2/count)*i+Date.now()*0.003;
        fireBullet(x,y,Math.cos(a)*spd*0.6,Math.sin(a)*spd*0.6,true,'#fa0',{gravity:true,gravityStrength:0.0003});
      }
    }else if(pattern===2){
      const count=5+bossPhase;
      for(let i=0;i<count;i++){
        const a=-0.5+0.25*i+Math.sin(Date.now()*0.004)*0.5;
        fireBullet(x,y,Math.sin(a)*spd*1.2,Math.cos(a)*spd*1.2,true,'#f80');
      }
    }else if(pattern===3){
      const count=8+bossPhase*3;
      for(let i=0;i<count;i++){
        const a=(Math.PI*2/count)*i+Math.sin(Date.now()*0.002)*0.3;
        fireBullet(x,y,Math.cos(a)*spd*0.7,Math.sin(a)*spd*0.7,true,'#f0f',{gravity:true,gravityStrength:0.0004});
      }
    }
    return;
  }
  // Original boss pattern
  if(pattern===0){
    const dx=px-x,dy=py-y,len=Math.hypot(dx,dy);
    if(len>0)fireBullet(x,y,(dx/len)*spd,(dy/len)*spd,true,'#f44',{gravity:true,gravityStrength:0.0003+bossPhase*0.0001});
  }else if(pattern===1){
    const count=6+bossPhase*2;
    for(let i=0;i<count;i++){
      const a=(Math.PI*2/count)*i+Date.now()*0.002;
      fireBullet(x,y,Math.cos(a)*spd,Math.sin(a)*spd,true,'#fa0');
    }
  }else if(pattern===2){
    for(let i=0;i<3+bossPhase;i++){
      const a=-0.4+0.4*i+Math.sin(Date.now()*0.005)*0.3;
      fireBullet(x,y,Math.sin(a)*spd,Math.cos(a)*spd,true,'#f44',{gravity:true,gravityStrength:0.0005});
    }
  }else if(pattern===3){
    for(let i=0;i<12+bossPhase*3;i++){
      const a=(Math.PI*2/(12+bossPhase*3))*i;
      fireBullet(x,y,Math.cos(a)*1.5,Math.sin(a)*1.5+1,true,'#f0f',{gravity:true,gravityStrength:0.0002});
    }
  }
}

function updateBullets(dt){
  const freezeMult=freezeTimer>0?0.3:1;
  for(let i=pBullets.length-1;i>=0;i--){
    const b=pBullets[i];
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>6)b.trail.shift();

    if(b.homing){
      if(!b.homingTarget||!b.homingTarget.alive){
        let best=null,bestD=Infinity;
        for(const e of enemies){
          if(!e.alive)continue;
          const d=dist(b.x,b.y,e.x,e.y);
          if(d<bestD){bestD=d;best=e;}
        }
        b.homingTarget=best;
      }
      if(b.homingTarget){
        const dx=b.homingTarget.x-b.x,dy=b.homingTarget.y-b.y;
        const len=Math.hypot(dx,dy);
        if(len>1){
          const tx=dx/len,ty=dy/len;
          const spd=Math.hypot(b.vx,b.vy);
          const cvx=b.vx/spd||0,cvy=b.vy/spd||0;
          b.vx+=(tx-cvx)*b.turnRate*dt*0.1;
          b.vy+=(ty-cvy)*b.turnRate*dt*0.1;
          const nSpd=Math.hypot(b.vx,b.vy);
          if(nSpd>0){b.vx=b.vx/nSpd*Math.min(spd+0.5,7);b.vy=b.vy/nSpd*Math.min(spd+0.5,7);}
        }
      }
    }

    b.x+=b.vx;b.y+=b.vy;b.age+=dt;
    if(b.y<-20||b.x<-20||b.x>W+20)pBullets.splice(i,1);
  }
  for(let i=eBullets.length-1;i>=0;i--){
    const b=eBullets[i];
    if(b.gravity&&player.active){
      const dx=player.x-b.x,dy=player.y-b.y;
      const d2=dx*dx+dy*dy;
      if(d2>100){
        const dist=Math.sqrt(d2);
        b.vx+=dx/dist*b.gravityStrength*dt*freezeMult;
        b.vy+=dy/dist*b.gravityStrength*dt*freezeMult;
      }
    }
    b.x+=b.vx*freezeMult;b.y+=b.vy*freezeMult;
    if(b.y>H+20||b.x<-20||b.x>W+20)eBullets.splice(i,1);
  }
}

function drawBullets(){
  for(const b of pBullets){
    for(let i=0;i<b.trail.length;i++){
      const t=b.trail[i],alpha=(i/b.trail.length)*0.4;
      ctx.globalAlpha=alpha;
      ctx.fillStyle=b.color;
      ctx.fillRect(t.x-b.w/2,t.y-b.h/2,b.w*0.6,b.h*0.6);
    }
    ctx.globalAlpha=1;
    const grad=ctx.createLinearGradient(b.x,b.y-5,b.x,b.y+5);
    grad.addColorStop(0,'rgba(255,255,255,0)');
    grad.addColorStop(0.3,b.color);
    grad.addColorStop(0.7,b.color);
    grad.addColorStop(1,'rgba(255,255,255,0)');
    ctx.shadowBlur=12;ctx.shadowColor=b.color;
    ctx.fillStyle=grad;
    ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
    ctx.shadowBlur=0;
  }
  for(const b of eBullets){
    ctx.shadowBlur=8;ctx.shadowColor=b.color;
    if(freezeTimer>0){
      ctx.fillStyle='#8cf';
      ctx.beginPath();
      ctx.arc(b.x,b.y,3,0,Math.PI*2);
      ctx.fill();
      ctx.shadowBlur=0;
      continue;
    }
    ctx.fillStyle=b.color;
    ctx.beginPath();
    if(b.gravity){
      ctx.arc(b.x,b.y,4,0,Math.PI*2);
      ctx.fillStyle='#fa0';
      ctx.fill();
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(b.x,b.y,2,0,Math.PI*2);ctx.fill();
    }else{
      ctx.arc(b.x,b.y,3,0,Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur=0;
  }
}

// ===================== ASTEROIDS =====================
let asteroids=[];
let asteroidTimer=3000;

function spawnAsteroid(wave){
  const sizes=[{r:8,pts:50,speed:1},{r:14,pts:100,speed:0.8},{r:22,pts:200,speed:0.6}];
  const s=sizes[randInt(0,Math.min(2,Math.floor(wave/2)))];
  const vertCount=6+randInt(0,2);
  const verts=[];
  for(let i=0;i<vertCount;i++){
    verts.push(s.r*(i%2===0?1:0.8+rand(-0.1,0.1)));
  }
  asteroids.push({
    x:rand(20,W-20),y:-20,
    r:s.r,vx:rand(-0.5,0.5),vy:s.speed+rand(0,0.3)+wave*0.02,
    pts:s.pts,rotation:rand(0,Math.PI*2),rotSpeed:rand(-0.02,0.02),
    hp:Math.ceil(s.r/6),alive:true,
    color:s.r>15?'#876':'#987',verts,vertCount
  });
}

function updateAsteroids(dt){
  const freezeMult=freezeTimer>0?0.3:1;
  asteroidTimer-=dt*freezeMult;
  if(asteroidTimer<=0&&asteroids.length<8&&enemies.some(e=>e.alive)){
    spawnAsteroid(wave);
    asteroidTimer=rand(3000,8000)-wave*100;
    if(asteroidTimer<1500)asteroidTimer=1500;
  }
  for(let i=asteroids.length-1;i>=0;i--){
    const a=asteroids[i];
    if(!a.alive){asteroids.splice(i,1);continue;}
    a.x+=a.vx;a.y+=a.vy*freezeMult;a.rotation+=a.rotSpeed;
    if(a.y>H+30||a.x<-30||a.x>W+30){asteroids.splice(i,1);continue;}

    for(let j=pBullets.length-1;j>=0;j--){
      const b=pBullets[j];
      if(dist(b.x,b.y,a.x,a.y)<a.r+5){
        if(!b.pierce){pBullets.splice(j,1);}
        a.hp--;
        spawnParticles(a.x,a.y,5,'#ba9',2,15,2);
        if(a.hp<=0){
          a.alive=false;
          score+=a.pts;
          spawnDebris(a.x,a.y,'#ba9');
          spawnParticles(a.x,a.y,15,'#ba9',4,25,3);
          spawnRing(a.x,a.y,'#ba9',8,20);
          addPopup(a.x,a.y,'+'+a.pts,'#ba9');
          playAsteroidHit();
        }
        break;
      }
    }

    if(player.active&&player.invuln<=0&&dist(a.x,a.y,player.x,player.y)<a.r+12){
      if(hasShield){hasShield=false;spawnParticles(player.x,player.y,10,'#08f',4,20);playHit();addPopup(player.x,player.y-20,'SHIELD BROKEN!','#f44');a.alive=false;spawnParticles(a.x,a.y,10,'#ba9',3,20);continue;}
      spawnParticles(a.x,a.y,10,'#ba9',3,20);a.alive=false;playerHit();
    }
  }
}

function drawAsteroids(){
  for(const a of asteroids){
    if(!a.alive)continue;
    ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rotation);
    ctx.shadowBlur=10;ctx.shadowColor='rgba(150,120,100,0.5)';
    ctx.fillStyle=freezeTimer>0?'#8af':a.color;
    ctx.beginPath();
    for(let i=0;i<a.vertCount;i++){
      const ang=(Math.PI*2/a.vertCount)*i,rad=a.verts[i];
      i===0?ctx.moveTo(Math.cos(ang)*rad,Math.sin(ang)*rad):ctx.lineTo(Math.cos(ang)*rad,Math.sin(ang)*rad);
    }
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(200,180,160,0.3)';ctx.lineWidth=1;ctx.stroke();
    ctx.shadowBlur=0;
    ctx.restore();
  }
}

// ===================== POWERUPS =====================
const POWERUP_TYPES=['rapid','spread','double','laser','shield','bomb','homing','drone','pierce','gravity','tesla','freeze'];
const POWERUP_COLORS={rapid:'#ff0',spread:'#0ff',double:'#0f0',laser:'#f0f',shield:'#08f',bomb:'#f44',homing:'#f80',drone:'#0fa',pierce:'#ff8',gravity:'#0f8',tesla:'#fe0',freeze:'#8cf'};
let powerups=[];
let powerup=null,powerupTimer=0;
let hasShield=false;

function spawnPowerup(x,y){
  if(Math.random()>0.15)return;
  const type=POWERUP_TYPES[randInt(0,POWERUP_TYPES.length-1)];
  powerups.push({x,y,type,vy:1.2,life:600,size:12,pulse:0});
}

function updatePowerups(dt){
  const freezeMult=freezeTimer>0?0.3:1;
  for(let i=powerups.length-1;i>=0;i--){
    const pu=powerups[i];
    pu.y+=pu.vy*freezeMult;pu.life--;pu.pulse+=dt*0.005;
    if(pu.y>H+20||pu.life<=0){powerups.splice(i,1);continue;}

    // Magnet attraction when close
    if(player.active&&dist(pu.x,pu.y,player.x,player.y)<120){
      const dx=player.x-pu.x,dy=player.y-pu.y;
      const d=Math.hypot(dx,dy)||1;
      const pull=0.04*(120-d)/120;
      pu.x+=dx/d*pull;
      pu.y+=dy/d*pull;
    }

    if(player.active&&dist(pu.x,pu.y,player.x,player.y)<35){
      collectPowerup(pu);powerups.splice(i,1);continue;
    }
  }
  if(powerupTimer>0){
    powerupTimer-=dt;
    if(powerupTimer<=0){
      if(powerup==='freeze')freezeTimer=0;
      powerup=null;powerupTimer=0;
      player.drones=[];
    }
  }
  if(freezeTimer>0){
    freezeTimer-=dt;
    if(freezeTimer<=0)freezeTimer=0;
  }
}

function collectPowerup(pu){
  playPowerup();
  const t=pu.type;
  if(t==='shield'){hasShield=true;addPopup(pu.x,pu.y,'SHIELD!','#08f');return}
  if(t==='bomb'){
    playBomb();
    for(const e of enemies){if(e.alive){e.alive=false;spawnParticles(e.x,e.y,15,e.color,5,30);score+=e.pts;}}
    eBullets=[];
    for(const a of asteroids){a.alive=false;spawnParticles(a.x,a.y,10,'#ba9',3,20);score+=a.pts;}
    shake(10);flash(0.4,'#f44');
    addPopup(pu.x,pu.y,'BOMB!','#f44');
    return;
  }
  if(t==='drone'){
    powerup=t;powerupTimer=10000;
    player.drones=[{angle:0,shootTimer:0},{angle:Math.PI,shootTimer:500}];
    addPopup(pu.x,pu.y,'DRONES!',POWERUP_COLORS[t]);
    return;
  }
  if(t==='gravity'){
    powerup=t;powerupTimer=8000;
    player.drones=[];
    playGravity();
    addPopup(pu.x,pu.y,'GRAVITY!',POWERUP_COLORS[t]);
    return;
  }
  if(t==='tesla'){
    powerup=t;powerupTimer=8000;
    player.drones=[];player.teslaTimer=0;
    addPopup(pu.x,pu.y,'TESLA!',POWERUP_COLORS[t]);
    return;
  }
  if(t==='freeze'){
    powerup=t;powerupTimer=8000;
    freezeTimer=5000;
    player.drones=[];
    playFreeze();
    addPopup(pu.x,pu.y,'FREEZE!',POWERUP_COLORS[t]);
    return;
  }
  powerup=t;powerupTimer=8000;
  player.drones=[];
  addPopup(pu.x,pu.y,t.toUpperCase()+'!',POWERUP_COLORS[t]);
}

function drawPowerups(){
  for(const pu of powerups){
    const s=pu.size+Math.sin(pu.pulse)*3;
    const col=POWERUP_COLORS[pu.type];
    ctx.save();ctx.translate(pu.x,pu.y);
    ctx.shadowBlur=15;ctx.shadowColor=col;
    ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=col;ctx.globalAlpha=0.3;
    ctx.beginPath();ctx.arc(0,0,s-2,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.fillStyle='#fff';ctx.font='bold 10px monospace';ctx.textAlign='center';

    if(pu.type==='pierce'){ctx.fillText('P',0,4)}
    else if(pu.type==='gravity'){ctx.fillText('G',0,4)}
    else if(pu.type==='tesla'){ctx.fillText('T',0,4)}
    else if(pu.type==='freeze'){ctx.fillText('F',0,4)}
    else{ctx.fillText(pu.type[0].toUpperCase(),0,4)}

    ctx.shadowBlur=0;
    ctx.restore();
  }
}

// ===================== DRONES =====================
function updateDrones(dt){
  if(!player.active||!player.drones||player.drones.length===0)return;
  for(const d of player.drones){
    d.angle+=dt*0.003;
    d.shootTimer-=dt;
    if(d.shootTimer<=0){
      let best=null,bestD=Infinity;
      for(const e of enemies){
        if(!e.alive)continue;
        const dd=dist(player.x,player.y,e.x,e.y);
        if(dd<bestD){bestD=dd;best=e;}
      }
      if(best){
        const dx=best.x-(player.x+Math.cos(d.angle)*30);
        const dy=best.y-(player.y+Math.sin(d.angle)*30);
        const len=Math.hypot(dx,dy);
        if(len>0)fireBullet(player.x+Math.cos(d.angle)*30,player.y+Math.sin(d.angle)*30,(dx/len)*5,(dy/len)*5,false,'#0fa',{silent:true});
        playDroneFire();
      }
      d.shootTimer=600;
    }
  }
}

function drawDrones(){
  if(!player.active||!player.drones||player.drones.length===0)return;
  for(const d of player.drones){
    const dx=player.x+Math.cos(d.angle)*30;
    const dy=player.y+Math.sin(d.angle)*30;
    ctx.save();ctx.translate(dx,dy);
    ctx.shadowBlur=12;ctx.shadowColor='#0fa';
    ctx.fillStyle='#0fa';
    ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.beginPath();ctx.arc(-1,-1,2,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();
  }
}

// ===================== ENEMIES =====================
const COLS=5,ROWS=5,ESX=38,ESY=30,FORMY=60;
let enemies=[],formAngle=0,diveTimer=0,formationPattern=0,formationPatternTimer=0;
let sideSpawnTimer=0;
let swarmTimer=0;

function createEnemies(wave,isBossWave){
  const arr=[];
  if(isBossWave){
    const bossType=Math.floor(wave/3)%2===0?0:1;
    if(bossType===1){
      arr.push({x:cx,y:-60,fx:cx,fy:80,type:3,col:2,row:0,state:'enter',alive:true,diveP:0,startX:cx,startY:-60,targetX:cx,targetY:80,amp:0,diveSpd:0,retP:0,retSpd:0,shootT:0,pts:1200,color:'#f80',boss:true,bossHP:15+wave*5,bossMaxHP:15+wave*5,bossPhase:0,bossTimer:0,enterP:0,minionTimer:2000,bossType:1});
    }else{
      arr.push({x:cx,y:-60,fx:cx,fy:80,type:3,col:2,row:0,state:'enter',alive:true,diveP:0,startX:cx,startY:-60,targetX:cx,targetY:80,amp:0,diveSpd:0,retP:0,retSpd:0,shootT:0,pts:1000,color:'#f44',boss:true,bossHP:20+wave*5,bossMaxHP:20+wave*5,bossPhase:0,bossTimer:0,enterP:0,minionTimer:3000,bossType:0});
    }
    return arr;
  }
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const fx=cx+(c-(COLS-1)/2)*ESX;
      const fy=FORMY+r*ESY;
      const type=r===0?0:r<=2?1:2;
      const pts=type===0?200:type===1?150:100;
      const colors=['#f64','#0df','#f0f'];
      const e={
        x:fx,y:fy,fx,fy,type,col:c,row:r,
        state:'formation',alive:true,
        diveP:0,startX:fx,startY:fy,targetX:cx,targetY:400+rand(0,60),
        amp:rand(40,80),diveSpd:0.0003+rand(0,0.0002)*Math.min(wave,5),
        retP:0,retSpd:0.001+rand(0,0.0005),
        shootT:rand(0.5,2)*1000,
        pts,color:colors[type],
        divePattern:type===0?0:type===1?randInt(0,2):randInt(0,3),
        wingPhase:rand(0,Math.PI*2),
        formationOffset:{x:0,y:0}
      };
      if(wave>=4&&r===0&&(c===0||c===COLS-1)){
        e.carrier=true;
        e.pts=500;
        e.color='#8f0';
        e.minionTimer=3000;
        e.minionCount=0;
      }
      arr.push(e);
    }
  }
  return arr;
}

function startDive(e,px){
  if(!e.alive||e.state!=='formation')return;
  e.state='dive';e.diveP=0;
  e.startX=e.x;e.startY=e.y;
  e.targetX=clamp(px+rand(-80,80),40,W-40);
  e.targetY=rand(400,520);
  e.amp=rand(40,90);
  e.shootT=rand(0.3,1)*1000;
}

function spawnSideEnemies(wave,px){
  if(!player.active)return;
  const types=[
    {type:5,color:'#fa0',pts:150,hp:1},
    {type:6,color:'#f8f',pts:250,hp:3}
  ];
  const chosen=types[randInt(0,types.length-1)];
  const side=Math.random()>0.5?1:-1;
  const x=side===1?W+20:-20;
  const y=rand(80,300);
  const targetX=px+rand(-100,100);
  enemies.push({
    x,y,fx:0,fy:0,type:chosen.type,col:0,row:0,
    state:'dive',alive:true,diveP:0,
    startX:x,startY:y,
    targetX:clamp(targetX,40,W-40),targetY:H+40,
    amp:rand(40,80),diveSpd:0.0006+wave*0.00005,retP:0,retSpd:0,
    shootT:3000,pts:chosen.pts,color:chosen.color,
    divePattern:randInt(0,3),wingPhase:0,
    formationOffset:{x:0,y:0},
    hp:chosen.hp,split:chosen.type===6
  });
}

function spawnSwarm(wave,px){
  if(!player.active)return;
  const count=3+Math.min(wave,5);
  const side=Math.random()>0.5?1:-1;
  playSwarm();
  for(let i=0;i<count;i++){
    const x=side===1?W+30:-30;
    const y=rand(50,200)+i*40;
    enemies.push({
      x,y,fx:0,fy:0,type:7,col:0,row:0,
      state:'dive',alive:true,diveP:i/count,
      startX:x,startY:y,
      targetX:clamp(px+rand(-120,120),40,W-40),targetY:H+50,
      amp:rand(20,40),diveSpd:0.0012+wave*0.00005,retP:0,retSpd:0,
      shootT:99999,pts:80,color:'#0f8',
      divePattern:randInt(0,1),wingPhase:rand(0,Math.PI*2),
      formationOffset:{x:0,y:0},
      hp:1,swarm:true
    });
  }
}

function spawnBeamer(wave){
  if(!player.active)return;
  const side=Math.random()>0.5?1:-1;
  const x=side===1?W+20:-20;
  const y=rand(100,250);
  enemies.push({
    x,y,fx:0,fy:0,type:8,col:0,row:0,
    state:'dive',alive:true,diveP:0,
    startX:x,startY:y,
    targetX:clamp(cx,40,W-40),targetY:rand(150,250),
    amp:0,diveSpd:0.0005,retP:0,retSpd:0,
    shootT:3000,pts:300,color:'#f4f',
    divePattern:3,wingPhase:0,
    formationOffset:{x:0,y:0},
    hp:3,beamer:true,chargeT:0,charging:false
  });
}

function updateEnemies(dt,px,wave){
  const freezeMult=freezeTimer>0?0.4:1;
  formAngle+=dt*0.001*freezeMult;
  const fOff=Math.sin(formAngle)*30;
  formationPatternTimer+=dt*freezeMult;
  if(formationPatternTimer>5000){
    formationPattern=(formationPattern+1)%3;
    formationPatternTimer=0;
  }

  const diving=enemies.some(e=>e.alive&&e.state==='dive');

  // Side spawns during wave
  sideSpawnTimer-=dt*freezeMult;
  if(sideSpawnTimer<=0&&!diving&&wave>=2&&enemies.some(e=>e.alive&&e.state==='formation')){
    if(Math.random()<0.4)spawnSideEnemies(wave,px);
    sideSpawnTimer=rand(4000,8000)-wave*200;
    if(sideSpawnTimer<2000)sideSpawnTimer=2000;
  }

  // Swarm spawns
  if(wave>=3&&!diving){
    swarmTimer-=dt*freezeMult;
    if(swarmTimer<=0&&enemies.some(e=>e.alive&&e.state==='formation')){
      if(Math.random()<0.3)spawnSwarm(wave,px);
      swarmTimer=rand(8000,15000)-wave*300;
      if(swarmTimer<5000)swarmTimer=5000;
    }
  }

  // Beamer spawns
  if(wave>=5&&!diving&&!enemies.some(e=>e.beamer)){
    if(Math.random()<0.002*freezeMult)spawnBeamer(wave);
  }

  for(const e of enemies){
    if(!e.alive)continue;
    e.wingPhase+=dt*0.004*freezeMult;

    if(e.boss){
      if(e.state==='enter'){
        e.enterP=Math.min(1,e.enterP+dt*0.0008);
        e.y=lerp(-60,80,e.enterP*e.enterP);
        if(e.enterP>=1)e.state='formation';
        continue;
      }
      const hpRatio=e.bossHP/e.bossMaxHP;
      e.bossPhase=hpRatio>0.66?0:hpRatio>0.33?1:2;

      e.bossTimer+=dt*freezeMult;
      if(e.bossTimer>(1200-e.bossPhase*200)){
        const patterns=e.bossPhase===0?[0,1]:e.bossPhase===1?[0,1,2]:[0,1,2,3];
        bossFirePattern(e.x,e.y,patterns[randInt(0,patterns.length-1)],e.bossPhase,px,player.y,e.bossType);
        e.bossTimer=0;

        if(e.bossPhase>=1){
          e.minionTimer-=dt*freezeMult;
          if(e.minionTimer<=0){
            e.minionTimer=(3000-e.bossPhase*800);
            const minion={
              x:e.x+rand(-40,40),y:e.y+20,
              fx:0,fy:0,type:4,col:0,row:0,
              state:'dive',alive:true,diveP:0,
              startX:e.x+rand(-40,40),startY:e.y+20,
              targetX:px+rand(-60,60),targetY:H+50,
              amp:rand(20,40),diveSpd:0.0008,retP:0,retSpd:0,
              shootT:2000,pts:200,color:e.bossType===1?'#fa0':'#f80',
              divePattern:randInt(0,2),wingPhase:0,
              formationOffset:{x:0,y:0}
            };
            enemies.push(minion);
            playCarrierSpawn();
          }
        }
      }

      const yOff=e.bossPhase===0?0:e.bossPhase===1?Math.sin(e.bossTimer*0.005*freezeMult)*15:Math.sin(e.bossTimer*0.008*freezeMult)*25;
      e.y=e.fy+Math.sin(e.bossTimer*0.003*freezeMult)*20+yOff;
      continue;
    }

    if(e.state==='formation'){
      const fp=formationPattern;
      let ox=0,oy=0;
      if(fp===1){ox=Math.sin(formationPatternTimer*0.002+e.col*0.5)*20}
      else if(fp===2){
        const a=formationPatternTimer*0.001+(e.row*0.8+e.col*0.6);
        ox=Math.cos(a)*25;oy=Math.sin(a)*15;
      }
      e.x=e.fx+fOff+ox;
      e.y=e.fy+oy;

      if(e.carrier){
        e.minionTimer-=dt*freezeMult;
        if(e.minionTimer<=0&&e.minionCount<5){
          e.minionTimer=3000;
          e.minionCount++;
          const minion={
            x:e.x+rand(-15,15),y:e.y+10,
            fx:0,fy:0,type:4,col:0,row:0,
            state:'dive',alive:true,diveP:0,
            startX:e.x+rand(-15,15),startY:e.y+10,
            targetX:px+rand(-40,40),targetY:H+20,
            amp:rand(20,40),diveSpd:0.0008,retP:0,retSpd:0,
            shootT:2000,pts:150,color:'#fa0',
            divePattern:2,wingPhase:0,
            formationOffset:{x:0,y:0}
          };
          enemies.push(minion);
          playCarrierSpawn();
        }
      }
    }
    else if(e.state==='dive'){
      e.diveP+=e.diveSpd*dt*freezeMult;
      if(e.diveP>=1){
        e.diveP=1;
        if(e.type===4||e.type===5||e.type===7){e.alive=false;continue;}
        if(e.beamer){e.retP=0;e.startX=e.x;e.startY=e.y;e.state='return';continue;}
        e.retP=0;e.startX=e.x;e.startY=e.y;
        e.state='return';continue;
      }
      const t=e.diveP;
      if(e.divePattern===0){
        e.x=e.startX+(e.targetX-e.startX)*t+Math.sin(t*Math.PI*2)*e.amp*(1-t*0.8);
        e.y=e.startY+(e.targetY-e.startY)*t*t;
      }else if(e.divePattern===1){
        e.x=e.startX+(e.targetX-e.startX)*t+Math.sin(t*Math.PI*4)*e.amp*0.6*(1-t);
        e.y=e.startY+(e.targetY-e.startY)*t+Math.sin(t*Math.PI*2)*40*(1-t);
      }else if(e.divePattern===2){
        e.x=e.startX+(e.targetX-e.startX)*t+Math.sin(t*Math.PI*8)*e.amp*0.4;
        e.y=e.startY+(e.targetY-e.startY)*t*t;
      }else if(e.divePattern===3){
        const arc=1-Math.cos(t*Math.PI*0.5);
        e.x=e.startX+(e.targetX-e.startX)*arc;
        e.y=e.startY+(e.targetY-e.startY)*t-Math.sin(t*Math.PI)*50;
      }

      // Beamer enemy - charges and fires laser
      if(e.beamer){
        e.targetX=player.x;
        if(t>0.3&&t<0.9){
          e.chargeT+=dt*freezeMult;
          if(!e.charging&&e.chargeT>1500){
            e.charging=true;
            e.chargeT=0;
          }
          if(e.charging){
            e.chargeT+=dt*freezeMult;
            if(e.chargeT>300){
              spawnLaserBeam(e.x,e.y,player.x,player.y,'#f4f');
              e.chargeT=0;
              e.charging=false;
            }
          }
        }
        continue;
      }

      if(e.swarm&&t<0.1){
        e.targetX=player.x+rand(-80,80);
        e.targetY=player.y+rand(-50,50);
      }

      if(e.type!==4&&e.type!==5&&e.type!==6&&e.type!==7&&e.type!==8&&eBullets.length<8&&t>0.15&&t<0.85){
        e.shootT-=dt*freezeMult;
        if(e.shootT<=0){
          const grav=wave>=2?Math.random()<0.15:false;
          fireBullet(e.x,e.y+8,rand(-0.5,0.5),2.5+wave*0.2,true,'#f44',grav?{gravity:true,gravityStrength:0.0003}:undefined);
          e.shootT=rand(0.8,2)*1000;
        }
      }else if(e.type===5&&t>0.3){
        e.targetX=player.x;
        e.targetY=player.y;
      }
    }
    else if(e.state==='return'){
      e.retP+=e.retSpd*dt*freezeMult;
      if(e.retP>=1){
        e.retP=1;e.x=e.fx+fOff;e.y=e.fy;
        e.state='formation';e.diveP=0;continue;
      }
      const t=e.retP;
      e.x=lerp(e.startX,e.fx+fOff,t);
      e.y=lerp(e.startY,e.fy,t);
    }
  }

  diveTimer-=dt*freezeMult;
  if(!diving&&diveTimer<=0&&!enemies.some(e=>e.boss)){
    const ava=enemies.filter(e=>e.alive&&e.state==='formation'&&!e.carrier);
    if(ava.length>0){
      const cnt=Math.min(1+(wave>1&&Math.random()<0.4?1:0)+(wave>3&&Math.random()<0.3?1:0),ava.length);
      for(let i=0;i<cnt;i++){
        if(ava.length===0)break;
        const idx=randInt(0,ava.length-1);
        startDive(ava[idx],px);
        ava.splice(idx,1);
      }
      diveTimer=rand(1.5,4)*1000;
    }
  }
}

// ===================== TESLA EFFECT =====================
let teslaBolts=[];

function triggerTesla(){
  if(powerup!=='tesla'||!player.active)return;
  const targets=[];
  for(const e of enemies){
    if(!e.alive)continue;
    if(dist(player.x,player.y,e.x,e.y)<150){
      targets.push(e);
    }
  }
  if(targets.length===0)return;
  const hit=targets.slice(0,3);
  for(const e of hit){
    const pts=Math.floor(e.pts*0.3);
    score+=pts;
    if(e.boss){e.bossHP=Math.max(0,e.bossHP-2);spawnParticles(e.x,e.y,8,'#fe0',3,15);}
    else{e.alive=false;spawnExplosion(e.x,e.y,'#fe0',12);shake(2);}
    addPopup(e.x,e.y-10,'+'+pts,'#fe0');
    teslaBolts.push({x1:player.x,y1:player.y-16,x2:e.x,y2:e.y,life:8,maxLife:8});
    playZap();
  }
  flash(0.2,'#fe0');
}

function drawTeslaBolts(){
  for(let i=teslaBolts.length-1;i>=0;i--){
    const tb=teslaBolts[i];
    tb.life--;
    const alpha=tb.life/tb.maxLife;
    ctx.globalAlpha=alpha;
    ctx.shadowBlur=15;ctx.shadowColor='#fe0';
    ctx.strokeStyle='#fe0';ctx.lineWidth=2*alpha;
    ctx.beginPath();ctx.moveTo(tb.x1,tb.y1);
    const steps=5;
    for(let s=1;s<=steps;s++){
      const t=s/steps;
      const x=tb.x1+(tb.x2-tb.x1)*t+rand(-10,10)*(1-t);
      const y=tb.y1+(tb.y2-tb.y1)*t+rand(-10,10)*(1-t);
      ctx.lineTo(x,y);
    }
    ctx.stroke();
    ctx.strokeStyle='#fff';ctx.lineWidth=1*alpha;
    ctx.beginPath();ctx.moveTo(tb.x1,tb.y1);
    for(let s=1;s<=steps;s++){
      const t=s/steps;
      const x=tb.x1+(tb.x2-tb.x1)*t+rand(-10,10)*(1-t);
      const y=tb.y1+(tb.y2-tb.y1)*t+rand(-10,10)*(1-t);
      ctx.lineTo(x,y);
    }
    ctx.stroke();
    ctx.shadowBlur=0;
    ctx.globalAlpha=1;
    if(tb.life<=0)teslaBolts.splice(i,1);
  }
}

// ===================== ENEMY DRAWING =====================
function drawEnemies(){
  for(const e of enemies){
    if(!e.alive)continue;

    // Freeze visual
    if(freezeTimer>0&&e.state!=='formation'){
      ctx.fillStyle='rgba(136,200,255,0.08)';
      ctx.fillRect(e.x-16,e.y-16,32,32);
    }

    ctx.save();ctx.translate(e.x,e.y);

    if(e.boss){
      drawBoss(e);ctx.restore();continue;
    }

    if(e.type===4){
      ctx.fillStyle=freezeTimer>0?'#8cf':'#fa0';ctx.shadowBlur=8;ctx.shadowColor=freezeTimer>0?'#8cf':'#fa0';
      ctx.beginPath();
      ctx.moveTo(0,-8);ctx.lineTo(-6,4);ctx.lineTo(0,6);ctx.lineTo(6,4);
      ctx.closePath();ctx.fill();
      ctx.shadowBlur=0;ctx.restore();continue;
    }

    if(e.type===5){
      ctx.fillStyle=freezeTimer>0?'#8cf':(e.color||'#fa0');ctx.shadowBlur=10;ctx.shadowColor=freezeTimer>0?'#8cf':(e.color||'#fa0');
      ctx.beginPath();
      ctx.moveTo(0,-10);ctx.lineTo(-8,-2);ctx.lineTo(-6,8);
      ctx.lineTo(-2,6);ctx.lineTo(0,10);ctx.lineTo(2,6);
      ctx.lineTo(6,8);ctx.lineTo(8,-2);
      ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.fillRect(-2,-2,4,4);
      ctx.shadowBlur=0;ctx.restore();continue;
    }

    if(e.type===6){
      ctx.fillStyle=freezeTimer>0?'#8cf':(e.color||'#f8f');ctx.shadowBlur=12;ctx.shadowColor=freezeTimer>0?'#8cf':(e.color||'#f8f');
      ctx.beginPath();
      const wf=Math.sin(e.wingPhase)*2;
      ctx.moveTo(0,-14-wf);ctx.lineTo(-12,0);ctx.lineTo(-10,10);
      ctx.lineTo(-4,8);ctx.lineTo(0,12);ctx.lineTo(4,8);
      ctx.lineTo(10,10);ctx.lineTo(12,0);
      ctx.closePath();ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(0,-14-wf);ctx.lineTo(-12,0);ctx.lineTo(-10,10);
      ctx.lineTo(-4,8);ctx.lineTo(0,12);ctx.lineTo(4,8);
      ctx.lineTo(10,10);ctx.lineTo(12,0);
      ctx.closePath();ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.2)';
      ctx.fillRect(-2,-3,4,6);
      if(e.hp>1){
        ctx.fillStyle='#fff';ctx.font='8px monospace';ctx.textAlign='center';
        ctx.fillText(e.hp+'',0,4);
      }
      ctx.shadowBlur=0;ctx.restore();continue;
    }

    if(e.type===7){
      ctx.fillStyle=freezeTimer>0?'#8cf':'#0f8';ctx.shadowBlur=8;ctx.shadowColor=freezeTimer>0?'#8cf':'#0f8';
      ctx.beginPath();
      ctx.moveTo(0,-7);ctx.lineTo(-5,4);ctx.lineTo(-2,6);ctx.lineTo(2,6);ctx.lineTo(5,4);
      ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.beginPath();ctx.arc(0,1,2,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;ctx.restore();continue;
    }

    if(e.type===8){
      const col=freezeTimer>0?'#8cf':'#f4f';
      ctx.fillStyle=col;ctx.shadowBlur=12;ctx.shadowColor=col;
      ctx.beginPath();
      ctx.moveTo(0,-12);ctx.lineTo(-8,6);ctx.lineTo(-3,12);ctx.lineTo(3,12);ctx.lineTo(8,6);
      ctx.closePath();ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(0,-12);ctx.lineTo(-8,6);ctx.lineTo(-3,12);ctx.lineTo(3,12);ctx.lineTo(8,6);
      ctx.closePath();ctx.stroke();
      // Charging indicator
      if(e.charging){
        ctx.fillStyle='#fff';ctx.globalAlpha=0.5+0.5*Math.sin(Date.now()*0.01);
        ctx.beginPath();ctx.arc(0,3,4,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
      }
      ctx.fillStyle='rgba(255,255,255,0.2)';
      ctx.fillRect(-2,0,4,6);
      if(e.hp>1){
        ctx.fillStyle='#fff';ctx.font='8px monospace';ctx.textAlign='center';
        ctx.fillText(e.hp+'',0,14);
      }
      ctx.shadowBlur=0;ctx.restore();continue;
    }

    const col=freezeTimer>0?'#8cf':e.color;
    ctx.shadowBlur=10;ctx.shadowColor=col;
    ctx.fillStyle=col;ctx.strokeStyle='#fff';ctx.lineWidth=1;

    const wf=Math.sin(e.wingPhase)*3;

    if(e.carrier){
      ctx.fillStyle=freezeTimer>0?'#8cf':'#8f0';ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(0,-18);ctx.lineTo(-14,0);ctx.lineTo(-16,12);
      ctx.lineTo(-10,8);ctx.lineTo(-6,14);ctx.lineTo(-3,10);
      ctx.lineTo(3,10);ctx.lineTo(6,14);ctx.lineTo(10,8);
      ctx.lineTo(16,12);ctx.lineTo(14,0);
      ctx.closePath();ctx.fill();ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.2)';
      ctx.fillRect(-6,-4,12,8);
      ctx.fillStyle='#0f0';ctx.shadowBlur=4;ctx.shadowColor='#0f0';
      ctx.fillRect(-8,14,4,2);ctx.fillRect(4,14,4,2);
      ctx.shadowBlur=0;ctx.restore();continue;
    }

    if(e.type===0){
      ctx.beginPath();
      ctx.moveTo(0,-16);ctx.lineTo(-10-wf,4);ctx.lineTo(-14,8);
      ctx.lineTo(-7,6);ctx.lineTo(-5,14);ctx.lineTo(-2,10);
      ctx.lineTo(2,10);ctx.lineTo(5,14);ctx.lineTo(7,6);
      ctx.lineTo(14,8);ctx.lineTo(10+wf,4);
      ctx.closePath();ctx.fill();ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();
    }else if(e.type===1){
      ctx.beginPath();
      ctx.moveTo(0,-14-wf);ctx.lineTo(-12,2);ctx.lineTo(-10,12);
      ctx.lineTo(-4,8);ctx.lineTo(4,8);ctx.lineTo(10,12);
      ctx.lineTo(12,2);ctx.closePath();
      ctx.fill();ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.25)';
      ctx.fillRect(-2,-4,4,6);
    }else{
      ctx.beginPath();
      ctx.moveTo(0,-12-wf);ctx.lineTo(-10,4);ctx.lineTo(-8,10);
      ctx.lineTo(-3,6);ctx.lineTo(3,6);ctx.lineTo(8,10);
      ctx.lineTo(10,4);ctx.closePath();
      ctx.fill();ctx.stroke();
    }
    ctx.shadowBlur=0;
    ctx.restore();
  }
}

// ===================== BOSS =====================
function drawBoss(b){
  const hpRatio=b.bossHP/b.bossMaxHP;
  const phase=b.bossPhase;
  const wf=Math.sin(Date.now()*0.003)*3;

  if(b.bossType===1){
    // Hive Boss
    let baseCol,eyeCol,glowCol;
    if(phase===0){baseCol='#f80';eyeCol='#ff0';glowCol='#f80'}
    else if(phase===1){baseCol='#fa0';eyeCol='#f44';glowCol='#fa0'}
    else{baseCol='#f0f';eyeCol='#f00';glowCol='#f0f'}

    ctx.shadowBlur=phase===2?40:25;
    ctx.shadowColor=glowCol;

    const grad=ctx.createRadialGradient(0,0,5,0,0,30);
    grad.addColorStop(0,'#ff8');
    grad.addColorStop(0.3,baseCol);
    grad.addColorStop(1,phase===2?'#500':'#800');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.moveTo(0,-24-wf);ctx.lineTo(-18,4);ctx.lineTo(-24,14);
    ctx.lineTo(-18,20);ctx.lineTo(-14,12);ctx.lineTo(-10,22);
    ctx.lineTo(-5,16);ctx.lineTo(0,18);ctx.lineTo(5,16);
    ctx.lineTo(10,22);ctx.lineTo(14,12);ctx.lineTo(18,20);
    ctx.lineTo(24,14);ctx.lineTo(18,4);
    ctx.closePath();ctx.fill();

    ctx.strokeStyle=phase===2?'#f0f':'#f80';ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(0,-24);ctx.lineTo(-18,4);ctx.lineTo(-24,14);
    ctx.lineTo(-18,20);ctx.lineTo(-14,12);ctx.lineTo(-10,22);
    ctx.lineTo(-5,16);ctx.lineTo(0,18);ctx.lineTo(5,16);
    ctx.lineTo(10,22);ctx.lineTo(14,12);ctx.lineTo(18,20);
    ctx.lineTo(24,14);ctx.lineTo(18,4);
    ctx.closePath();ctx.stroke();

    ctx.fillStyle=eyeCol;
    const eyeSize=phase===2?10:8;
    ctx.beginPath();ctx.arc(0,2,eyeSize,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=phase===2?'#fff':'#ff0';
    ctx.beginPath();ctx.arc(0,2,phase===2?5:4,0,Math.PI*2);ctx.fill();

    if(phase===2){
      ctx.fillStyle='rgba(255,136,0,0.3)';
      ctx.beginPath();ctx.arc(0,2,14,0,Math.PI*2);ctx.fill();
    }

    // Side wings
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.beginPath();ctx.arc(-12,-6,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(12,-6,4,0,Math.PI*2);ctx.fill();

    ctx.shadowBlur=0;

    ctx.strokeStyle='#f80';ctx.lineWidth=3;
    ctx.fillStyle='#800';
    ctx.fillRect(-28,32,56,6);
    ctx.strokeRect(-28,32,56,6);
    ctx.fillStyle=hpRatio>0.5?'#0f0':hpRatio>0.25?'#ff0':'#f00';
    ctx.fillRect(-27,33,54*hpRatio,4);

    ctx.fillStyle='#fff';ctx.font='8px monospace';ctx.textAlign='center';
    const phaseNames=['PHASE 1','PHASE 2','PHASE 3'];
    ctx.fillText('HIVE '+phaseNames[phase],0,46);
    return;
  }

  // Original boss
  let baseCol,eyeCol,glowCol;
  if(phase===0){baseCol='#f44';eyeCol='#ff0';glowCol='#f44'}
  else if(phase===1){baseCol='#f84';eyeCol='#f44';glowCol='#f80'}
  else{baseCol='#f0f';eyeCol='#f00';glowCol='#f0f'}

  ctx.shadowBlur=phase===2?40:25;
  ctx.shadowColor=glowCol;

  const grad=ctx.createRadialGradient(0,0,5,0,0,30);
  grad.addColorStop(0,'#ff6');
  grad.addColorStop(0.3,baseCol);
  grad.addColorStop(1,phase===2?'#400':'#800');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.moveTo(0,-30-wf);ctx.lineTo(-20,0);ctx.lineTo(-28,10);
  ctx.lineTo(-22,18);ctx.lineTo(-16,14);ctx.lineTo(-12,24);
  ctx.lineTo(-6,18);ctx.lineTo(0,20);ctx.lineTo(6,18);
  ctx.lineTo(12,24);ctx.lineTo(16,14);ctx.lineTo(22,18);
  ctx.lineTo(28,10);ctx.lineTo(20,0);
  ctx.closePath();ctx.fill();

  ctx.strokeStyle=phase===2?'#f0f':'#fa0';ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(0,-30);ctx.lineTo(-20,0);ctx.lineTo(-28,10);
  ctx.lineTo(-22,18);ctx.lineTo(-16,14);ctx.lineTo(-12,24);
  ctx.lineTo(-6,18);ctx.lineTo(0,20);ctx.lineTo(6,18);
  ctx.lineTo(12,24);ctx.lineTo(16,14);ctx.lineTo(22,18);
  ctx.lineTo(28,10);ctx.lineTo(20,0);
  ctx.closePath();ctx.stroke();

  ctx.fillStyle=eyeCol;
  const eyeSize=phase===2?10:8;
  ctx.beginPath();ctx.arc(0,2,eyeSize,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=phase===2?'#fff':'#ff0';
  ctx.beginPath();ctx.arc(0,2,phase===2?5:4,0,Math.PI*2);ctx.fill();

  if(phase===2){
    ctx.fillStyle='rgba(255,0,0,0.3)';
    ctx.beginPath();ctx.arc(0,2,14,0,Math.PI*2);ctx.fill();
  }

  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath();ctx.arc(-8,-8,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(8,-8,5,0,Math.PI*2);ctx.fill();

  if(phase>=1){
    ctx.fillStyle='rgba(255,200,0,0.1)';
    ctx.beginPath();ctx.arc(-20,5,8,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(20,5,8,0,Math.PI*2);ctx.fill();
  }

  ctx.shadowBlur=0;

  ctx.strokeStyle='#f44';ctx.lineWidth=3;
  ctx.fillStyle='#800';
  ctx.fillRect(-28,32,56,6);
  ctx.strokeRect(-28,32,56,6);
  ctx.fillStyle=hpRatio>0.5?'#0f0':hpRatio>0.25?'#ff0':'#f00';
  ctx.fillRect(-27,33,54*hpRatio,4);

  ctx.fillStyle='#fff';ctx.font='8px monospace';ctx.textAlign='center';
  const phaseNames=['PHASE 1','PHASE 2','PHASE 3'];
  ctx.fillText(phaseNames[phase],0,46);
}

// ===================== PLAYER =====================
let player={x:cx,y:560,w:26,h:22,lives:3,invuln:0,cooldown:0,active:true,thrust:0,trail:[],drones:[],boostEnergy:100,teslaTimer:0};
let nextLifeScore=10000;

function resetPlayer(){
  player.x=cx;player.y=560;player.lives=3;
  player.invuln=0;player.cooldown=0;player.active=true;
  player.thrust=0;player.trail=[];player.drones=[];
  player.boostEnergy=100;player.teslaTimer=0;
  powerup=null;powerupTimer=0;hasShield=false;
  freezeTimer=0;teslaBolts=[];
  nextLifeScore=10000;
}

function updatePlayer(dt){
  if(!player.active)return;

  // Boost mechanic
  const boosting=K.ShiftLeft||K.ShiftRight;
  const boostSpeed=boosting&&player.boostEnergy>0?2.5:1;
  if(boosting&&player.boostEnergy>0){
    player.boostEnergy=Math.max(0,player.boostEnergy-dt*0.02);
    if(player.boostEnergy<=0&&Math.random()<0.1)playHit();
  }else{
    player.boostEnergy=Math.min(100,player.boostEnergy+dt*0.008);
  }

  if(K.ArrowLeft&&player.x>20)player.x-=4.5*boostSpeed;
  if(K.ArrowRight&&player.x<W-20)player.x+=4.5*boostSpeed;
  player.x=clamp(player.x,16,W-16);
  if(player.invuln>0)player.invuln-=dt;
  if(player.cooldown>0)player.cooldown-=dt;

  // Engine exhaust particles
  const exhaustRate=boosting&&player.boostEnergy>0?0.9:0.6;
  if(Math.random()<exhaustRate){
    const boostSize=boosting&&player.boostEnergy>0?4:2;
    particles.push({
      x:player.x+rand(-4,4),y:player.y+12,
      vx:rand(-0.5,0.5),vy:rand(0.8,2.5)*boostSpeed,
      life:rand(8,22),maxLife:22,
      color:boosting&&player.boostEnergy>0?'#fff':'#f80',size:rand(1,boostSize),
      decay:0.96,spark:boosting,ring:false,glow:false
    });
  }

  // Boost trail
  if(boosting&&player.boostEnergy>0){
    for(let i=0;i<3;i++){
      particles.push({
        x:player.x+rand(-8,8),y:player.y+rand(8,14),
        vx:rand(-0.8,0.8),vy:rand(1,3),
        life:rand(5,12),maxLife:12,
        color:'#f60',size:rand(1,3),
        decay:0.95,spark:false,ring:false,glow:true
      });
    }
  }

  player.trail.push({x:player.x+rand(-2,2),y:player.y+12});
  if(player.trail.length>8)player.trail.shift();

  const cd=powerup==='rapid'?120:powerup==='laser'?100:powerup==='homing'?200:powerup==='pierce'?200:powerup==='tesla'?150:250;
  if((K.Space||K.ArrowUp)&&player.cooldown<=0){
    playerFire(player.x,player.y-16);
    player.cooldown=cd;
  }
  player.thrust+=dt*0.005;

  updateDrones(dt);

  // Tesla powerup - periodic zap
  if(powerup==='tesla'&&powerupTimer>0){
    player.teslaTimer+=dt;
    if(player.teslaTimer>2000){
      player.teslaTimer=0;
      triggerTesla();
    }
  }

  // Gravity well
  if(powerup==='gravity'&&powerupTimer>0){
    for(let i=eBullets.length-1;i>=0;i--){
      const b=eBullets[i];
      const d=dist(player.x,player.y,b.x,b.y);
      if(d<80&&d>5){
        const pull=0.08*(80-d)/80;
        b.vx+=(player.x-b.x)/d*pull;
        b.vy+=(player.y-b.y)/d*pull;
      }
      if(d<12){
        eBullets.splice(i,1);
        spawnParticles(b.x,b.y,3,'#0f8',1,12,2);
      }
    }
  }

  if(K.KeyX&&hasShield){
    K.KeyX=0;
    for(const e of enemies){
      if(!e.alive)continue;
      const d=dist(player.x,player.y,e.x,e.y);
      if(d<120){
        if(e.boss){
          e.bossHP-=5;
          spawnParticles(e.x,e.y,10,'#f44',4,20);
          playBossHit();
          if(e.bossHP<=0){
            e.alive=false;
            score+=e.pts;
            spawnExplosion(e.x,e.y,'#f44',40);
            shake(12);
            addPopup(e.x,e.y,'+'+e.pts,'#ff0');
            addPopup(e.x,e.y-20,'BOSS DEFEATED!','#f44');
          }
        }else{
          e.alive=false;
          score+=e.pts;
          spawnExplosion(e.x,e.y,e.color,20);
          shake(3);
        }
      }
    }
    eBullets=[];
    for(const a of asteroids){if(dist(player.x,player.y,a.x,a.y)<120){a.alive=false;spawnParticles(a.x,a.y,10,'#ba9',4,20);score+=Math.floor(a.pts/2);}}
    spawnRing(player.x,player.y,'#08f',30,120);
    spawnRing(player.x,player.y,'#fff',20,80);
    shake(6);
    hasShield=false;
    playBomb();
    addPopup(player.x,player.y-20,'FORCE BURST!','#08f');
  }
}

function drawPlayer(){
  if(!player.active)return;
  if(player.invuln>0&&Math.floor(Date.now()/80)%2)return;

  const boosting=K.ShiftLeft||K.ShiftRight;

  for(let i=0;i<player.trail.length;i++){
    const t=player.trail[i],alpha=(i/player.trail.length)*0.3;
    const size=(i/player.trail.length)*10;
    ctx.globalAlpha=alpha;
    ctx.fillStyle='#f80';
    ctx.beginPath();
    ctx.moveTo(t.x-size/2,t.y);ctx.lineTo(t.x,t.y+size);ctx.lineTo(t.x+size/2,t.y);
    ctx.closePath();ctx.fill();
  }
  ctx.globalAlpha=1;

  ctx.save();ctx.translate(player.x,player.y);

  // Shadow glow
  ctx.shadowBlur=boosting?30:20;ctx.shadowColor=boosting?'#f80':'#0cf';

  // Ship body gradient
  const grad=ctx.createLinearGradient(0,-15,0,15);
  grad.addColorStop(0,'#0cf');grad.addColorStop(0.5,'#08e');grad.addColorStop(1,'#046');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.moveTo(0,-15);ctx.lineTo(-16,12);
  ctx.lineTo(-8,9);ctx.lineTo(-4,15);
  ctx.lineTo(0,12);ctx.lineTo(4,15);
  ctx.lineTo(8,9);ctx.lineTo(16,12);
  ctx.closePath();ctx.fill();

  // Ship outline
  ctx.strokeStyle='#aff';ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(0,-15);ctx.lineTo(-16,12);
  ctx.lineTo(-8,9);ctx.lineTo(-4,15);
  ctx.lineTo(0,12);ctx.lineTo(4,15);
  ctx.lineTo(8,9);ctx.lineTo(16,12);
  ctx.closePath();ctx.stroke();

  // Cockpit
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath();ctx.arc(-4,-2,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(4,-2,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.beginPath();ctx.arc(0,-5,2,0,Math.PI*2);ctx.fill();

  // Boost glow
  if(boosting&&player.boostEnergy>0){
    ctx.shadowBlur=25;ctx.shadowColor='#f80';
    ctx.strokeStyle='rgba(255,136,0,0.3)';ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(-18,12);ctx.lineTo(-18,16);ctx.lineTo(18,16);ctx.lineTo(18,12);
    ctx.stroke();
  }

  // Engine flame
  const tf=boosting?0.8+0.4*Math.sin(player.thrust*6):0.5+0.5*Math.sin(player.thrust*3);
  const flameLen=boosting?12+20*tf:20*tf;
  const grad2=ctx.createLinearGradient(0,12,0,12+flameLen);
  grad2.addColorStop(0,boosting?'rgba(255,255,255,0.9)':'rgba(255,200,100,0.8)');
  grad2.addColorStop(0.5,boosting?'rgba(255,200,0,0.6)':'rgba(255,100,0,0.4)');
  grad2.addColorStop(1,'rgba(255,50,0,0)');
  ctx.shadowBlur=boosting?20:0;ctx.shadowColor='#f80';
  ctx.fillStyle=grad2;
  ctx.beginPath();
  ctx.moveTo(-6,12);ctx.lineTo(0,12+flameLen);ctx.lineTo(6,12);
  ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;

  // Shield
  if(hasShield){
    ctx.strokeStyle='rgba(0,136,255,0.5)';
    ctx.lineWidth=2;
    ctx.shadowBlur=15;ctx.shadowColor='#08f';
    ctx.beginPath();ctx.arc(0,0,22,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(0,136,255,0.2)';
    ctx.beginPath();ctx.arc(0,0,24,0,Math.PI*2);ctx.stroke();
  }

  // Gravity visual
  if(powerup==='gravity'&&powerupTimer>0){
    const pulse=0.5+0.5*Math.sin(Date.now()*0.005);
    ctx.strokeStyle=`rgba(0,255,136,${0.15*pulse})`;
    ctx.lineWidth=1.5;
    ctx.shadowBlur=10;ctx.shadowColor='#0f8';
    ctx.beginPath();ctx.arc(0,0,60+Math.sin(Date.now()*0.003)*8,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle=`rgba(0,255,136,${0.08*pulse})`;
    ctx.beginPath();ctx.arc(0,0,40+Math.sin(Date.now()*0.004)*5,0,Math.PI*2);ctx.stroke();
  }

  // Tesla visual
  if(powerup==='tesla'&&powerupTimer>0){
    const pulse=0.3+0.3*Math.sin(Date.now()*0.006);
    ctx.strokeStyle=`rgba(255,238,0,${pulse})`;
    ctx.lineWidth=1;
    ctx.shadowBlur=8;ctx.shadowColor='#fe0';
    ctx.beginPath();ctx.arc(0,0,30+Math.sin(Date.now()*0.004)*5,0,Math.PI*2);
    for(let i=0;i<6;i++){
      const a=i/6*Math.PI*2+Date.now()*0.002;
      const rx=Math.cos(a)*(28+Math.sin(Date.now()*0.005+i)*4);
      const ry=Math.sin(a)*(28+Math.sin(Date.now()*0.005+i)*4);
      i===0?ctx.moveTo(rx,ry):ctx.lineTo(rx,ry);
    }
    ctx.closePath();ctx.stroke();
  }

  ctx.shadowBlur=0;
  ctx.restore();

  drawDrones();
}

// ===================== UPGRADE SCREEN =====================
let upgradeOptions=[];

function generateUpgrades(){
  const pool=['rapid','spread','double','laser','shield','homing','drone','pierce','gravity','tesla','freeze'];
  const shuffled=[...pool].sort(()=>Math.random()-0.5);
  upgradeOptions=shuffled.slice(0,3);
}

function drawUpgradeScreen(){
  ctx.fillStyle='rgba(0,0,0,0.75)';
  ctx.fillRect(0,0,W,H);

  ctx.shadowBlur=20;ctx.shadowColor='#ff0';
  ctx.fillStyle='#ff0';
  ctx.font='bold 28px monospace';
  ctx.textAlign='center';
  ctx.fillText('CHOOSE UPGRADE',cx,120);

  ctx.shadowBlur=0;
  ctx.fillStyle='#aaa';
  ctx.font='13px monospace';
  ctx.fillText('(Press 1, 2, or 3)',cx,150);

  const labels=['[1]','[2]','[3]'];
  const descriptions={
    rapid:'FAST FIRE RATE',spread:'5-WAY SPREAD',double:'DUAL SHOT',
    laser:'HIGH SPEED LASER',shield:'ABSORB HITS',homing:'TRACKING SHOT',
    drone:'ORBITING DRONES',pierce:'PIERCING SHOT',gravity:'GRAVITY WELL',
    tesla:'CHAIN LIGHTNING',freeze:'SLOW TIME'
  };

  for(let i=0;i<3;i++){
    const t=upgradeOptions[i];
    const x=cx+(i-1)*140;
    const y=260;
    const col=POWERUP_COLORS[t]||'#fff';

    ctx.shadowBlur=20;ctx.shadowColor=col;
    ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.fillRect(x-50,y-30,100,60);
    ctx.strokeRect(x-50,y-30,100,60);

    ctx.fillStyle='#fff';
    ctx.font='bold 13px monospace';
    ctx.textAlign='center';
    ctx.fillText(labels[i],x,y-8);
    ctx.fillStyle=col;
    ctx.font='bold 14px monospace';
    ctx.fillText(t.toUpperCase(),x,y+12);
    ctx.fillStyle='#888';
    ctx.font='9px monospace';
    ctx.fillText(descriptions[t]||'',x,y+28);
    ctx.shadowBlur=0;
  }

  ctx.fillStyle='#666';
  ctx.font='10px monospace';
  ctx.fillText('CURRENT POWERUP',cx,370);
  if(powerup){
    ctx.fillStyle=POWERUP_COLORS[powerup]||'#fff';
    ctx.font='bold 14px monospace';
    ctx.fillText(powerup.toUpperCase(),cx,388);
  }else{
    ctx.fillStyle='#888';
    ctx.font='13px monospace';
    ctx.fillText('NONE',cx,388);
  }
}

// ===================== GAME STATE =====================
let state='title',score=0,hi=0,wave=1;
let goTimer=0,combo=0,comboTimer=0,lastKillTime=0;
let waveTransitionTimer=0,transitionProgress=0;
let bossEntranceFlash=0;

function startGame(){
  state='playing';score=0;wave=1;combo=0;comboTimer=0;
  resetPlayer();
  enemies=createEnemies(wave,false);
  pBullets=[];eBullets=[];particles=[];powerups=[];asteroids=[];
  laserBeams=[];teslaBolts=[];
  formAngle=0;diveTimer=rand(1,3)*1000;
  formationPattern=0;formationPatternTimer=0;
  asteroidTimer=3000;transitionProgress=0;
  sideSpawnTimer=4000;swarmTimer=10000;bossEntranceFlash=0;
  freezeTimer=0;
  initPlanets();
}

function nextWave(){
  wave++;
  const isBoss=wave%3===0;
  if(isBoss){
    playBossWarn();
    addPopup(cx,200,'BOSS INCOMING!','#f44');
    bossEntranceFlash=20;
  }
  enemies=createEnemies(wave,isBoss);
  pBullets=[];eBullets=[];formAngle=0;
  laserBeams=[];teslaBolts=[];
  diveTimer=isBoss?10000:rand(1,2)*1000;
  formationPattern=0;formationPatternTimer=0;
  sideSpawnTimer=4000;swarmTimer=10000;
  state='playing';transitionProgress=0;
}

function update(dt){
  updateStars();updateShake(dt);updateFlash(dt);updatePopups();
  updateLaserBeams(dt);
  if(bossEntranceFlash>0)bossEntranceFlash-=dt*0.02;

  if(state==='title'){
    if(K.Space){K.Space=0;initAudio();startGame()}
    return;
  }
  if(state==='gameOver'){
    goTimer+=dt;
    if(goTimer>1000&&K.Space){K.Space=0;state='title';initStars()}
    return;
  }
  if(state==='upgrade'){
    if(K.Digit1||K.Numpad1){K.Digit1=0;K.Numpad1=0;applyUpgrade(0)}
    if(K.Digit2||K.Numpad2){K.Digit2=0;K.Numpad2=0;applyUpgrade(1)}
    if(K.Digit3||K.Numpad3){K.Digit3=0;K.Numpad3=0;applyUpgrade(2)}
    updateParticles();updatePowerups(dt);
    return;
  }
  if(state==='waveClear'){
    transitionProgress=Math.min(1,transitionProgress+dt*0.002);
    updateParticles();updatePowerups(dt);
    updateAsteroids(dt);
    waveTransitionTimer+=dt;
    if(waveTransitionTimer>1500){
      transitionProgress=0;
      generateUpgrades();
      state='upgrade';
      waveTransitionTimer=0;
      playUpgrade();
    }
    return;
  }

  updatePlayer(dt);
  updateBullets(dt);
  updateEnemies(dt,player.x,wave);
  updateParticles();
  updatePowerups(dt);
  updateAsteroids(dt);

  // Extra life check
  while(score>=nextLifeScore){
    player.lives=Math.min(player.lives+1,5);
    nextLifeScore+=20000;
    addPopup(cx,300,'EXTRA LIFE!','#0cf');
    playPowerup();
  }

  // Player bullets hit enemies
  for(let i=pBullets.length-1;i>=0;i--){
    const b=pBullets[i];let hit=false;
    for(const e of enemies){
      if(!e.alive)continue;
      const hitR=e.boss?28:e.type===4?10:e.type===5?10:e.type===6?14:e.type===7?8:e.type===8?12:14;
      if(Math.abs(b.x-e.x)<hitR&&Math.abs(b.y-e.y)<hitR){
        hit=true;
        if(e.boss){
          e.bossHP--;playBossHit();
          spawnParticles(b.x,b.y,5,'#f44',3,15);
          if(e.bossHP<=0){
            e.alive=false;
            const pts=e.pts;
            score+=pts;
            spawnExplosion(e.x,e.y,'#f44',40);
            shake(12);
            playExplosion();
            flash(0.5,'#f44');
            addPopup(e.x,e.y,'+'+pts,'#ff0');
            addPopup(e.x,e.y-20,'BOSS DEFEATED!','#f44');
            powerups.push({x:e.x,y:e.y,type:'bomb',vy:0,life:200,size:12,pulse:0});
          }
        }else if(e.type===6){
          e.hp=(e.hp||3)-1;
          spawnParticles(b.x,b.y,5,'#f8f',3,15);
          if(e.hp<=0){
            e.alive=false;
            const pts=e.pts;
            score+=pts;
            spawnExplosion(e.x,e.y,e.color||'#f8f',15);
            shake(4);
            playSplit();
            addPopup(e.x,e.y,'+'+pts,'#f8f');
            for(let s=0;s<2;s++){
              enemies.push({
                x:e.x+rand(-10,10),y:e.y+rand(-5,5),
                fx:0,fy:0,type:5,col:0,row:0,
                state:'dive',alive:true,diveP:e.diveP||0.3,
                startX:e.x+rand(-10,10),startY:e.y+rand(-5,5),
                targetX:player.x+rand(-80,80),targetY:H+40,
                amp:rand(20,40),diveSpd:0.0009,retP:0,retSpd:0,
                shootT:99999,pts:100,color:'#f4f',
                divePattern:randInt(0,2),wingPhase:0,
                formationOffset:{x:0,y:0}
              });
            }
            spawnPowerup(e.x,e.y);
          }
          if(!b.pierce)break;
          continue;
        }else if(e.type===7){
          e.alive=false;
          spawnParticles(e.x,e.y,8,'#0f8',3,15,2);
          const pts=e.pts;
          score+=pts;
          addPopup(e.x,e.y,'+'+pts,'#0f8');
          if(!b.pierce)break;
          continue;
        }else if(e.type===8){
          e.hp=(e.hp||3)-1;
          spawnParticles(b.x,b.y,5,'#f4f',3,15);
          if(e.hp<=0){
            e.alive=false;
            score+=e.pts;
            spawnExplosion(e.x,e.y,'#f4f',15);
            shake(3);
            addPopup(e.x,e.y,'+'+e.pts,'#f4f');
            spawnPowerup(e.x,e.y);
          }
          if(!b.pierce)break;
          continue;
        }else{
          e.alive=false;
          const pts=e.pts;
          const now=Date.now();
          if(now-lastKillTime<2000){combo++;}else{combo=0;}
          lastKillTime=now;
          const mult=1+combo*0.5;
          const totalPts=Math.floor(pts*mult);
          score+=totalPts;
          if(combo>=2)addPopup(e.x,e.y-10,combo+'x COMBO!','#ff0');
          addPopup(e.x,e.y,'+'+totalPts,'#fff');
          spawnExplosion(e.x,e.y,e.color,20);
          shake(3);
          playExplosion();
          spawnPowerup(e.x,e.y);
        }
        if(!b.pierce)break;
      }
    }
    if(hit&&!b.pierce)pBullets.splice(i,1);
  }

  // Enemy bullets hit player
  if(player.active&&player.invuln<=0){
    for(let i=eBullets.length-1;i>=0;i--){
      const b=eBullets[i];
      if(Math.abs(b.x-player.x)<12&&Math.abs(b.y-player.y)<14){
        eBullets.splice(i,1);
        if(hasShield){hasShield=false;spawnParticles(player.x,player.y,10,'#08f',4,20);playHit();addPopup(player.x,player.y-20,'SHIELD BROKEN!','#f44');break;}
        playerHit();break;
      }
    }
  }

  // Enemies collide with player
  if(player.active&&player.invuln<=0){
    for(const e of enemies){
      if(!e.alive||e.state==='formation')continue;
      if(Math.abs(e.x-player.x)<16&&Math.abs(e.y-player.y)<16){
        if(hasShield){hasShield=false;spawnParticles(player.x,player.y,10,'#08f',4,20);e.alive=false;spawnParticles(e.x,e.y,10,e.color,3,25);playHit();addPopup(player.x,player.y-20,'SHIELD BROKEN!','#f44');break;}
        spawnParticles(e.x,e.y,10,e.color,3,25);
        e.alive=false;
        playerHit();break;
      }
    }
  }

  // Wave clear check
  if(player.active&&enemies.length>0&&!enemies.some(e=>e.alive)){
    state='waveClear';waveTransitionTimer=0;transitionProgress=0;
    spawnRing(cx,200,'#ff0',30,80);
    spawnRing(cx,200,'#fff',20,100);
    addPopup(cx,160,'WAVE CLEAR!','#0f0');
    addPopup(cx,180,'+'+1000*wave,'#ff0');
    score+=1000*wave;
    shake(6);flash(0.3,'#0f0');
  }
}

function applyUpgrade(idx){
  const t=upgradeOptions[idx];
  powerup=t;
  powerupTimer=powerup==='drone'?10000:powerup==='gravity'?8000:powerup==='tesla'?8000:powerup==='freeze'?8000:8000;
  if(t==='freeze')freezeTimer=5000;
  if(t==='drone'){
    player.drones=[{angle:0,shootTimer:0},{angle:Math.PI,shootTimer:500}];
  }else{
    player.drones=[];
  }
  if(t==='tesla')player.teslaTimer=0;
  if(t==='shield')hasShield=true;
  addPopup(cx,420,t.toUpperCase()+'!',POWERUP_COLORS[t],18);
  playPowerup();
  transitionProgress=0;
  nextWave();
}

function playerHit(){
  if(!player.active||player.invuln>0)return;
  player.lives--;
  spawnExplosion(player.x,player.y,'#0cf',25);
  shake(8);flash(0.3,'#f44');
  playHit();
  player.trail=[];
  player.drones=[];
  if(player.lives<=0){
    player.active=false;
    setTimeout(()=>{state='gameOver';if(score>hi)hi=score;goTimer=0},1500);
  }else{
    player.invuln=2000;player.x=cx;
    pBullets=[];
  }
}

// ===================== DRAW =====================
function draw(){
  ctx.drawImage(nebCanvas,0,0);
  drawPlanets();
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.fillRect(0,0,W,H);
  drawStars();

  ctx.save();
  ctx.translate(shakeX,shakeY);

  // Screen flash
  if(flashAlpha>0){
    ctx.fillStyle=flashColor;
    ctx.globalAlpha=flashAlpha*0.3;
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
  }

  // Boss entrance flash
  if(bossEntranceFlash>0){
    const a=clamp(bossEntranceFlash/20,0,1);
    ctx.fillStyle=`rgba(255,0,0,${a*0.15})`;
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle=`rgba(255,68,68,${a*0.5})`;
    ctx.lineWidth=3;
    ctx.strokeRect(4,4,W-8,H-8);
  }

  if(state==='title'){drawTitle();ctx.restore();crtOverlay();return}
  if(state==='gameOver'){drawHUD();drawEnemies();drawParticles();drawPowerups();drawAsteroids();drawLaserBeams();drawGO();ctx.restore();crtOverlay();return}
  if(state==='upgrade'){drawHUD();drawEnemies();drawParticles();drawPowerups();drawAsteroids();drawLaserBeams();drawUpgradeScreen();ctx.restore();crtOverlay();return}
  if(state==='waveClear'){
    drawHUD();drawEnemies();drawParticles();drawPowerups();drawAsteroids();drawLaserBeams();
    drawWarpTransition();
    drawWC();ctx.restore();crtOverlay();return;
  }

  drawHUD();drawPlayer();drawBullets();drawEnemies();
  drawParticles();drawPowerups();drawPopups();drawAsteroids();
  drawLaserBeams();drawTeslaBolts();

  ctx.restore();
  crtOverlay();
}

function crtOverlay(){
  ctx.fillStyle='rgba(0,0,0,0.03)';
  for(let i=0;i<H;i+=3){ctx.fillRect(0,i,W,1);}
  const vg=ctx.createRadialGradient(cx,cy,H*0.4,cx,cy,H*0.7);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,0.3)');
  ctx.fillStyle=vg;
  ctx.fillRect(0,0,W,H);
}

function drawWarpTransition(){
  if(transitionProgress<=0)return;
  ctx.save();
  const p=transitionProgress;
  ctx.globalAlpha=p*0.5;
  ctx.strokeStyle='#0ff';
  ctx.lineWidth=2;
  for(let i=0;i<20;i++){
    const t=i/20;
    const sx=cx+Math.cos(t*Math.PI*2)*W;
    const sy=cy+Math.sin(t*Math.PI*2)*H;
    const ex=lerp(sx,cx,p);
    const ey=lerp(sy,cy,p);
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();
  }
  ctx.globalAlpha=1;
  ctx.restore();
}

function drawHUD(){
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';
  ctx.font='bold 14px monospace';
  ctx.textAlign='left';ctx.fillText('SCORE: '+score,10,22);
  ctx.textAlign='right';ctx.fillText('HI: '+hi,W-10,22);
  ctx.textAlign='left';ctx.fillText('WAVE '+wave,10,40);

  // Combo display
  if(combo>=2){
    ctx.fillStyle='#ff0';
    ctx.textAlign='left';
    ctx.font='bold 12px monospace';
    ctx.fillText(combo+'x COMBO',10,56);
  }

  // Powerup timer bar
  if(powerup&&powerupTimer>0){
    const maxDur=powerup==='drone'?10000:8000;
    const pct=powerupTimer/maxDur;
    ctx.fillStyle=POWERUP_COLORS[powerup];
    ctx.textAlign='center';
    ctx.font='bold 11px monospace';
    ctx.fillText(powerup.toUpperCase()+' '+Math.ceil(powerupTimer/1000)+'s',cx,40);
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.fillRect(cx-40,42,80,3);
    ctx.fillStyle=POWERUP_COLORS[powerup];
    ctx.fillRect(cx-40,42,80*pct,3);
  }

  // Freeze indicator
  if(freezeTimer>0){
    ctx.fillStyle='#8cf';
    ctx.textAlign='center';
    ctx.font='bold 10px monospace';
    ctx.fillText('SLOW '+Math.ceil(freezeTimer/1000)+'s',cx,58);
  }

  // Boost bar
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.fillRect(10,H-20,W-20,8);
  const boostPct=player.boostEnergy/100;
  ctx.fillStyle=boostPct>0.3?'#f80':boostPct>0.1?'#f44':'#f00';
  ctx.fillRect(10,H-20,(W-20)*boostPct,8);
  ctx.strokeStyle='rgba(255,255,255,0.2)';
  ctx.lineWidth=1;
  ctx.strokeRect(10,H-20,W-20,8);
  ctx.fillStyle='#fff';
  ctx.font='7px monospace';
  ctx.textAlign='center';
  ctx.fillText('BOOST [SHIFT]',cx,H-13);

  if(hasShield){
    ctx.fillStyle='#08f';
    ctx.textAlign='right';
    ctx.font='bold 11px monospace';
    ctx.fillText('SHIELD [X]',W-10,58);
  }

  ctx.textAlign='right';ctx.fillStyle='#0cf';
  for(let i=0;i<player.lives;i++){
    const lx=W-16-i*22,ly=568;
    ctx.shadowBlur=0;
    ctx.beginPath();
    ctx.moveTo(lx,ly-8);ctx.lineTo(lx-8,ly+4);
    ctx.lineTo(lx+8,ly+4);ctx.closePath();ctx.fill();
  }
  ctx.shadowBlur=0;
}

function drawTitle(){
  ctx.shadowBlur=30;ctx.shadowColor='#f44';
  ctx.fillStyle='#f44';
  ctx.font='bold 60px monospace';
  ctx.textAlign='center';
  ctx.fillText('GALAGA',cx,170);
  ctx.shadowBlur=20;ctx.shadowColor='#f84';
  ctx.fillStyle='#f84';
  ctx.font='bold 60px monospace';
  ctx.fillText('GALAGA',cx-2,169);

  // Subtitle glow
  ctx.shadowBlur=15;ctx.shadowColor='#0cf';
  ctx.fillStyle='#0cf';
  ctx.font='bold 14px monospace';
  ctx.fillText('ENHANCED EDITION',cx,198);

  ctx.shadowBlur=0;
  ctx.fillStyle='#0cf';
  ctx.font='16px monospace';
  const blink=Math.sin(Date.now()*0.004)>0;
  if(blink)ctx.fillText('PRESS SPACE TO START',cx,290);

  ctx.fillStyle='#888';
  ctx.font='12px monospace';
  ctx.fillText('ARROWS: MOVE | SPACE: FIRE',cx,330);
  ctx.fillText('X = FORCE BURST (SHIELD) | SHIFT = BOOST',cx,348);

  ctx.fillStyle='#666';
  ctx.font='10px monospace';
  ctx.fillText('POWERUPS: RAPID SPREAD DOUBLE LASER SHIELD BOMB HOMING',cx,390);
  ctx.fillText('DRONE PIERCE GRAVITY TESLA FREEZE',cx,406);
  ctx.fillText('BOSS EVERY 3 WAVES | SWARM + BEAMER ENEMIES',cx,422);
  ctx.fillText('NEW: BOOST MECHANIC, LASER BEAMERS, HIVE BOSS, TESLA',cx,440);

  // Ship preview
  ctx.save();
  ctx.translate(cx,490);
  const grad=ctx.createLinearGradient(0,-15,0,15);
  grad.addColorStop(0,'#0cf');grad.addColorStop(0.5,'#08e');grad.addColorStop(1,'#046');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.moveTo(0,-15);ctx.lineTo(-16,12);ctx.lineTo(-8,9);
  ctx.lineTo(-4,15);ctx.lineTo(0,12);ctx.lineTo(4,15);
  ctx.lineTo(8,9);ctx.lineTo(16,12);ctx.closePath();
  ctx.fill();ctx.strokeStyle='#aff';ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(0,-15);ctx.lineTo(-16,12);ctx.lineTo(-8,9);
  ctx.lineTo(-4,15);ctx.lineTo(0,12);ctx.lineTo(4,15);
  ctx.lineTo(8,9);ctx.lineTo(16,12);ctx.closePath();
  ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.beginPath();ctx.arc(-4,-2,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(4,-2,3,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=15;ctx.shadowColor='#f80';
  ctx.fillStyle='rgba(255,200,100,0.6)';
  ctx.beginPath();
  ctx.moveTo(-6,12);ctx.lineTo(0,12+12+6*Math.sin(Date.now()*0.005));ctx.lineTo(6,12);
  ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
  ctx.restore();

  ctx.fillStyle='#444';
  ctx.font='9px monospace';
  ctx.fillText('v3.0',cx,570);
}

function drawGO(){
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(0,200,W,130);
  ctx.shadowBlur=20;ctx.shadowColor='#f44';
  ctx.fillStyle='#f44';
  ctx.font='bold 50px monospace';
  ctx.textAlign='center';
  ctx.fillText('GAME OVER',cx,275);
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';
  ctx.font='18px monospace';
  ctx.fillText('SCORE: '+score,cx,310);
  if(goTimer>1000){
    const blink=Math.sin(Date.now()*0.005)>0;
    if(blink){ctx.fillStyle='#0cf';ctx.font='14px monospace';ctx.fillText('PRESS SPACE TO RESTART',cx,350)}
  }
}

function drawWC(){
  ctx.shadowBlur=20;ctx.shadowColor='#0f0';
  ctx.fillStyle='#0f0';
  ctx.font='bold 40px monospace';
  ctx.textAlign='center';
  ctx.fillText('WAVE CLEAR!',cx,300);
  ctx.shadowBlur=0;
}

// ===================== MAIN LOOP =====================
let lastTime=0;
function loop(t){
  const dt=t-lastTime;lastTime=t;
  if(dt<100&&dt>0){update(dt);draw()}
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
